name: 👓 Review Auto
on:
  push:
    branches:
      - "**"
      - "!renovate/**"
      - "!dependabot/**"
      - "!main"

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.ref }}

jobs:
  build-api:
    permissions:
      contents: read
      id-token: write # OIDC identity for buildkit-operator /route auth
    environment: build-review-auto
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
    runs-on: ubuntu-latest
    steps:
      - name: ⏬ Checkout code repository
        uses: actions/checkout@v4

      - name: 📌 Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.REGISTRY_URL }}/${{ vars.PROJECT_NAME }}/${{ github.event.repository.name }}/api
          tags: |
            type=sha,prefix=persist-,format=long,enable=${{ 
              github.ref_name == 'dev' || 
              github.ref_name == 'develop' || 
              github.ref_name == 'preprod' || 
              github.ref_name == 'main' || 
              github.ref_name == 'master'
            }},priority=840
            type=sha,prefix=sha-,format=long,priority=890
            type=ref,event=branch,priority=600

      - name: Env
        id: env
        uses: socialgouv/kontinuous/.github/actions/env@v1

      - name: 🔑 Login to registry
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: 📦 Build and push Docker image for api
        uses: socialgouv/buildkit-operator@v1
        with:
          buildd-url: ${{ vars.BUILDKIT_OPERATOR_BUILDD_URL }}
          gateway-host: ${{ vars.BUILDKIT_OPERATOR_GATEWAY_HOST }}
          ca: ${{ secrets.BUILDKIT_OPERATOR_CA }}
          cert: ${{ secrets.BUILDKIT_OPERATOR_CERT }}
          key: ${{ secrets.BUILDKIT_OPERATOR_KEY }}
          context: "api"
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: true

  build-web:
    permissions:
      contents: read
      id-token: write # OIDC identity for buildkit-operator /route auth
    environment: build-review-auto
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
    runs-on: ubuntu-latest
    steps:
      - name: ⏬ Checkout code repository
        uses: actions/checkout@v4

      - name: 📌 Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.REGISTRY_URL }}/${{ vars.PROJECT_NAME }}/${{ github.event.repository.name }}/web
          tags: |
            type=sha,prefix=persist-,format=long,enable=${{ 
              github.ref_name == 'dev' || 
              github.ref_name == 'develop' || 
              github.ref_name == 'preprod' || 
              github.ref_name == 'main' || 
              github.ref_name == 'master'
            }},priority=840
            type=sha,prefix=sha-,format=long,priority=890
            type=ref,event=branch,priority=600

      - name: Env
        id: env
        uses: socialgouv/kontinuous/.github/actions/env@v1

      - name: 🔑 Login to registry
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: 📦 Build and push Docker image for web
        uses: socialgouv/buildkit-operator@v1
        with:
          buildd-url: ${{ vars.BUILDKIT_OPERATOR_BUILDD_URL }}
          gateway-host: ${{ vars.BUILDKIT_OPERATOR_GATEWAY_HOST }}
          ca: ${{ secrets.BUILDKIT_OPERATOR_CA }}
          cert: ${{ secrets.BUILDKIT_OPERATOR_CERT }}
          key: ${{ secrets.BUILDKIT_OPERATOR_KEY }}
          context: "web"
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
          push: true

  kontinuous:
    needs: [build-api, build-web]
    name: "Deploy on Kubernetes 🐳"
    uses: socialgouv/workflows/.github/workflows/use-ks-gh-review-auto-atlas.yaml@v1
    secrets: inherit
