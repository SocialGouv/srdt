e la réception mensuelle lorsque l'entreprise ne comporte qu'un seul délégué du personnel, l'inobservation de cette obligation ne peut être justifiée, hors le cas de force majeure, que si elle a pour cause le refus ou la défection du délégué lui-même (Cass crim, 25 septembre 2007, n°06-84.599, Bull. crim. n°222) ;\n- la pratique consistant, pour le chef d'établissement, lors de la réception mensuelle des délégués du personnel, à imposer la présence, en surnombre, d'un tiers choisi par lui est de nature à porter atteinte à l'exercice des fonctions représentatives ;\n- le chef d'établissement est tenu, hors le cas de force majeure, de mettre à la disposition des délégués du personnel, un local adapté à l'exercice de leur mission ;\nCes éléments sont constitutifs d’un délit d’entrave au fonctionnement régulier de l’instance représentative du personnel.\n\nCordialement,"}, {"id": "id_37", "question": "Bonjour,\nJe cherche à connaitre mes droits en tant que CSE : en effet, cela fait\nbientôt 2 mois que nous n'avons pas fait de réunion CSE avec notre\nemployeur : Quel moyen ai-je à ma disposition pour obliger mon\nemployeur à tenir ces réunions ? Dois-je obligatoirement convoqué\nl'inspection du travail pour non-respect des réunions ?\nMerci par avance pour votre retour,\nBien cordialement.", "reponse": "Bonjour,\n\nVotre demande de renseignement en droit du travail porte sur l'organisation des réunions du CSE.\n\nIl semblerait que les réunions CSE, dans votre entreprise, ne soient pas organisées.\n\nCi-après ce que rappelle la loi :\n\nLa convocation des membres du comité est de la responsabilité de l'employeur ou de son représentant.\nC. trav., art. L. 2315-27 et L. 2315-28\n\nL'article L. 2315-27 fixe un certain nombre de règles d'ordre public auxquelles il est impossible de déroger.\n\nLorsque l'employeur est défaillant, et à la demande d'au moins la moitié des membres du CSE, celui-ci peut être convoqué par l'agent de contrôle de l'inspection du travail mentionné à l'article L. 8112-1 et siéger sous sa présidence.\nC. trav., art. L. 2315-27, al. 3\n\nEn pratique, cette procédure est rarement utilisée, l'inspecteur du travail se bornant à intervenir auprès de l'employeur, afin qu'il respecte son obligation et régularise la situation.\nPour l'administration, l'inspecteur du travail reste d'ailleurs juge de la question de savoir s'il doit intervenir pour convoquer ou non le comité (Circ. n° 104/46, 7 oct. 1946).\n\nJe vous conseille de réclamer cette réunion par écrit à votre employeur en adressant copie de votre correspondance à votre inspecteur du travail, lui demandant une intervention.\n\nBien à vous, \n\nBonjour Madame Bourdon, \n\nVotre question porte sur le fait que vous n'avez pas de réunion avec votre employeur depuis 2 mois.\n\nAu vu des éléments dont vous me faites part, sous réserve de l'appréciation souveraine des tribunaux, voici ma réponse.\n\nComment fonctionne, et avec quels moyens, le CSE dans les entreprises d'au moins 11 salariés et de moins de 50 salariés ?\n.../...\nRéunions avec l'employeur\nLes membres de la délégation du personnel du CSE sont reçus collectivement par l'employeur au moins une fois par mois. En cas d'urgence, ils sont reçus sur leur demande. L'employeur peut se faire assister par des collaborateurs. Ensemble, ils ne peuvent être en nombre supérieur à celui des représentants du personnel titulaires.\nLes membres de la délégation du personnel du CSE sont également reçus par l'employeur, sur leur demande, soit individuellement, soit par catégorie, soit par atelier, service ou spécialité professionnelle selon les questions qu'ils ont à traiter.\n\nComment, et avec quels moyens, le CSE fonctionne-t-il dans les entreprises d'au moins 50 salariés ?\n.../...\nRéunions avec l'employeur\nUn accord fixe le nombre de réunions annuelles du comité prévues qui ne peut être inférieur à six. Cet accord est un accord d'entreprise majoritaire au sens du 1er alinéa de l'article L. 2232-12 (donc, sans possibilité de validation d'un accord minoritaire par référendum) ou, en l'absence de délégué syndical, un accord entre l'employeur et le CSE, adopté à la majorité des membres titulaires de la délégation du personnel du comité.\nEn l'absence d'un tel accord :\n-    Dans les entreprises d'au moins 300 salariés, le CSE se réunit au moins une fois par mois sur convocation de l'employeur ou de son représentant ;\n-    Dans les entreprises de moins de 300 salariés, le comité se réunit au moins une fois tous les deux mois.\nLe comité peut tenir une seconde réunion à la demande de la majorité de ses membres. Dans ce cas, les questions jointes à la demande de convocation sont inscrites à l'ordre du jour de la réunion.\n\n\nVous lirez plus en détails la fiche pratique en droit du travail relative au fonctionnement du CSE en cliquant sur ce lien  :  https://travail-emploi.gouv.fr/le-fonctionnement-et-les-moyens-dactions-du-cse#anchor-navigation-711\n\nJe vous invite à faire une demande écrite à votre employeur en inscrivant qu'une copie de ce courrier est transmise à l'inspection du travail dont vous dépendez :\nBeauvais.................................................ddets-uc1@oise.gouv.fr\nCreil........................................................ddets-uc2@oise.gouv.fr\nCompiègne.............................................ddets-uc3@oise.gouv.fr\n\n\nBien cordialement\n"}, {"id": "id_38", "question": "Bonjour,\nJe cherche à connaitre mes droits en tant que CSE : en effet, cela fait\nbientôt 2 mois que nous n'avons pas fait de réunion CSE avec notre\nemployeur : Quel moyen ai-je à ma disposition pour obliger mon\nemployeur à tenir ces réunions ? Dois-je obligatoirement convoqué\nl'inspection du travail pour non-respect des réunions ?\nMerci par avance pour votre retour,\nBien cordialement.", "reponse": "Bonjour,\n\nLe CSE doit être réuni au moins 4 fois par an comme prévu par le code du\ntravail. Un calendrier peut être mis en place en début d'année, ou\nsemestriellement afin d'organiser les réunions obligatoires. Si ces\nréunions ne sont pas programmées par l'employeur, alors, vous pouvez, en\nqualité d'élus CSE, en demander la mise en place par un mail, puis par\nun courrier recommandé avec accusé de réception (si le mail reste sans\nréponse) mentionnant l'article du code du travail, avec copie à\nl'inspection du travail du secteur concerné.\n\nhttps://travail-emploi.gouv.fr/le-fonctionnement-et-les-moyens-dactions-du-cse\n\nhttps://www.legifrance.gouv.fr/codes/section_lc/LEGITEXT000006072050/LEGISCTA000035624847/\n\nL'inspecteur du travail est invité lors des formations CSSCT, au moins\n15 jours avant la réunion.\n\nhttps://travail-emploi.gouv.fr/les-commissions-de-sante-securite-et-conditions-de-travail-cssct-du-cse\n\nBonne réception"}, {"id": "id_39", "question": "Bonjour,\nJe cherche à connaitre mes droits en tant que CSE : en effet, cela fait\nbientôt 2 mois que nous n'avons pas fait de réunion CSE avec notre\nemployeur : Quel moyen ai-je à ma disposition pour obliger mon\nemployeur à tenir ces réunions ? Dois-je obligatoirement convoqué\nl'inspection du travail pour non-respect des réunions ?\nMerci par avance pour votre retour,\nBien cordialement.", "reponse": "Bonjour,\n\nLe CSE doit être réuni au moins 4 fois par an comme prévu par le code du\ntravail. Un calendrier peut être mis en place en début d'année, ou\nsemestriellement afin d'organiser les réunions obligatoires. Si ces\nréunions ne sont pas programmées par l'employeur, alors, vous pouvez, en\nqualité d'élus CSE, en demander la mise en place par un mail, puis par\nun courrier recommandé avec accusé de réception (si le mail reste sans\nréponse) mentionnant l'article du code du travail, avec copie à\nl'inspection du travail du secteur concerné.\n\nhttps://travail-emploi.gouv.fr/le-fonctionnement-et-les-moyens-dactions-du-cse\n\nhttps://www.legifrance.gouv.fr/codes/section_lc/LEGITEXT000006072050/LEGISCTA000035624847/\n\nL'inspecteur du travail est invité lors des formations CSSCT, au moins\n15 jours avant la réunion.\n\nhttps://travail-emploi.gouv.fr/les-commissions-de-sante-securite-et-conditions-de-travail-cssct-du-cse\n\nBonne réception\n"}, {"id": "id_40", "question": "Bonjour,\nJe cherche à connaitre mes droits en tant que CSE : en effet, cela fait\nbientôt 2 mois que nous n'avons pas fait de réunion CSE avec notre\nemployeur : Quel moyen ai-je à ma disposition pour obliger mon\nemployeur à tenir ces réunions ? Dois-je obligatoirement convoqué\nl'inspection du travail pour non-respect des réunions ?\nMerci par avance pour votre retour,\nBien cordialement.", "reponse": "Bonjour,\n\nVotre signalement est soumis à confidentialité, votre employeur ne sera pas informé de votre démarche, sauf levée de confidentialité faite à votre initiative. Les entreprises étant réparties entre les sections de l'inspection du travail par zone géographique, nous avons besoin de l'adresse de l'entreprise afin de pouvoir orienter votre demande à l'inspecteur territorialement compétent.\n\nCordialement,"}, {"id": "id_41", "question": "Bonjour,\nJe cherche à connaitre mes droits en tant que CSE : en effet, cela fait\nbientôt 2 mois que nous n'avons pas fait de réunion CSE avec notre\nemployeur : Quel moyen ai-je à ma disposition pour obliger mon\nemployeur à tenir ces réunions ? Dois-je obligatoirement convoqué\nl'inspection du travail pour non-respect des réunions ?\nMerci par avance pour votre retour,\nBien cordialement.", "reponse": "Madame, Monsieur,\n\nVotre courriel manque de précisions.\n\nNous vous invitons à prendre connaissance de ce lien d'information :\n\n=> Comment se déroulent les réunions du comité social et économique (CSE) ? | Service Public\nVous lirez notamment le nombre de réunions prévues en fonction de l'effectif de l'entreprise.\n\nLa périodicité des réunions du comité doit être obligatoirement respectée par l'employeur, qui ne peut pas la modifier unilatéralement.\nIl doit respecter l'accord conclu le cas échéant ou les dispositions d'ordre public et/ou supplétives.\nLe non-respect de cette périodicité est susceptible de constituer un délit d'entrave.\n\nLorsque l'employeur est défaillant, et à la demande d'au moins la moitié des membres du CSE, celui-ci peut être convoqué par l'agent de contrôle de l'inspection du travail mentionné à l'article L. 8112-1 et siéger sous sa présidence.\nC. trav., art. L. 2315-27, al. 3\nEn pratique, l'inspecteur du travail peut intervenir auprès de l'employeur, afin qu'il respecte son obligation et régularise la situation.\nPour l'administration, l'inspecteur du travail reste d'ailleurs juge de la question de savoir s'il doit intervenir pour convoquer ou non le comité\n(Circ. n° 104/46, 7 oct. 1946).\n\nCordialement."}, {"id": "id_42", "question": "Bonjour,\nJe cherche à connaitre mes droits en tant que CSE : en effet, cela fait\nbientôt 2 mois que nous n'avons pas fait de réunion CSE avec notre\nemployeur : Quel moyen ai-je à ma disposition pour obliger mon\nemployeur à tenir ces réunions ? Dois-je obligatoirement convoqué\nl'inspection du travail pour non-respect des réunions ?\nMerci par avance pour votre retour,\nBien cordialement.", "reponse": "Madame,\n\nSuite à votre courriel, en effet vous pourriez vous rapprocher de l'agent de contrôle compétent du secteur de l'entreprise. Le service des renseignements en droit du travail ne donne que des informations juridiques générales relatives au Code du travail, aux conventions collectives et à la jurisprudence.\n\nSelon les effectifs de l'établissement (- de 50 ou + de 50 salariés), les articles du code du travail pour la périodicité de réunion diffèrent :\n\nDispositions pour les établissements de moins de 50 salariés :\n\nArticle L. 2315-21 du code du travail : \"Les membres de la délégation du personnel du comité social et économique sont reçus collectivement par l'employeur ou son représentant au moins une fois par mois. En cas d'urgence, ils sont reçus sur leur demande.\n L'employeur peut se faire assister par des collaborateurs. Ensemble, ils ne peuvent être en nombre supérieur à celui des représentants du personnel titulaires.\n Les membres de la délégation du personnel du comité social et économique sont également reçus par l'employeur, sur leur demande, soit individuellement, soit par catégorie, soit par atelier, service ou spécialité professionnelle selon les questions qu'ils ont à traiter.\"\n\nArticle L. 2315-22 du code du travail : \"Sauf circonstances exceptionnelles, les membres de la délégation du personnel du comité social et économique remettent à l'employeur une note écrite exposant l'objet des demandes présentées, deux jours ouvrables avant la date à laquelle ils doivent être reçus.\nL'employeur répond par écrit à ces demandes, au plus tard dans les six jours ouvrables suivant la réunion.\nLes demandes des membres de la délégation du personnel du comité social et économique et les réponses motivées de l'employeur sont, soit transcrites sur un registre spécial, soit annexées à ce registre.\nCe registre, ainsi que les documents annexés, sont tenus à la disposition des salariés de l'entreprise désirant en prendre connaissance, pendant un jour ouvrable par quinzaine et en dehors de leur temps de travail.\nIls sont également tenus à la disposition de l'agent de contrôle de l'inspection du travail mentionné à l'article L. 8112-1 et des membres de la délégation du personnel du comité social et économique.\"\nDispositions pour les établissements de plus de 50 salariés :\n\nArticle L. 2315-27 du code du travail : \"Au moins quatre réunions du comité social et économique portent annuellement en tout ou partie sur les attributions du comité en matière de santé, sécurité et conditions de travail, plus fréquemment en cas de besoin, notamment dans les branches d'activité présentant des risques particuliers.\nLe comité est en outre réuni à la suite de tout accident ayant entraîné ou ayant pu entraîner des conséquences graves, ainsi qu'en cas d'événement grave lié à l'activité de l'entreprise, ayant porté atteinte ou ayant pu porter atteinte à la santé publique ou à l'environnement ou à la demande motivée de deux de ses membres représentants du personnel, sur les sujets relevant de la santé, de la sécurité ou des conditions de travail.\nLorsque l'employeur est défaillant, et à la demande d'au moins la moitié des membres du comité social et économique, celui-ci peut être convoqué par l'agent de contrôle de l'inspection du travail mentionné à l'article L. 8112-1 et siéger sous sa présidence.\nL'employeur informe annuellement l'agent de contrôle de l'inspection du travail mentionné à l'article L. 8112-1, le médecin du travail et l'agent des services de prévention des organismes de sécurité sociale du calendrier retenu pour les réunions consacrées aux sujets relevant de la santé, de la sécurité ou des conditions de travail, et leur confirme par écrit au moins quinze jours à l'avance la tenue de ces réunions.\"\n\nArticle L. 2315-28 du code du travail : \"A défaut d'accord prévu à l'article 2312-19, dans les entreprises d'au moins trois cents salariés, le comité social et économique se réunit au moins une fois par mois sur convocation de l'employeur ou de son représentant.\nDans les entreprises de moins de trois cents salariés, le comité se réunit au moins une fois tous les deux mois.\nLe comité peut tenir une seconde réunion à la demande de la majorité de ses membres.\"\n\n\nInformations complémentaires sur ce lien : https://www.service-public.gouv.fr/particuliers/vosdroits/F33778\n\nTous ces éléments sont donnés sous réserve de l’appréciation souveraine des juges du fond.\n\nJe vous prie de croire, Mada"}, {"id": "id_43", "question": "Bonjour,\nJe cherche à connaitre mes droits en tant que CSE : en effet, cela fait\nbientôt 2 mois que nous n'avons pas fait de réunion CSE avec notre\nemployeur : Quel moyen ai-je à ma disposition pour obliger mon\nemployeur à tenir ces réunions ? Dois-je obligatoirement convoqué\nl'inspection du travail pour non-respect des réunions ?\nMerci par avance pour votre retour,\nBien cordialement.", "reponse": "Bonjour,\n\nLe service Renseignement droit du travail ne prend pas en charge les questions relatives aux élections, mandats, réunions... des représentants du personnel.\nCes questions sont traitées directement par le service Inspection du travail.\nOr les agents de contrôle sont répartis selon des secteurs géographiques en fonction de l'adresse de l'entreprise.\nSans connaitre l'adresse de l'entreprise, nous ne sommes pas en mesure de transmettre votre demande à l'agent de contrôle compétent.\n\nCordialement,"}, {"id": "id_44", "question": "Bonjour,\nJe cherche à connaitre mes droits en tant que CSE : en effet, cela fait\nbientôt 2 mois que nous n'avons pas fait de réunion CSE avec notre\nemployeur : Quel moyen ai-je à ma disposition pour obliger mon\nemployeur à tenir ces réunions ? Dois-je obligatoirement convoqué\nl'inspection du travail pour non-respect des réunions ?\nMerci par avance pour votre retour,\nBien cordialement.", "reponse": "Bonjour,\n\nS'agissant d'une question relative au fonctionnement du CSE, je vous invite à vous adresser directement à l'inspecteur du travail à l'adresse ddetspp-uc1@orne.gouv.fr en précisant bien le nom et l'adresse de votre entreprise.\n\nJe reste à votre disposition pour toute précision.\n\nRespectueusement,"}, {"id": "id_45", "question": "Bonjour,\nJe cherche à connaitre mes droits en tant que CSE : en effet, cela fait\nbientôt 2 mois que nous n'avons pas fait de réunion CSE avec notre\nemployeur : Quel moyen ai-je à ma disposition pour obliger mon\nemployeur à tenir ces réunions ? Dois-je obligatoirement convoqué\nl'inspection du travail pour non-respect des réunions ?\nMerci par avance pour votre retour,\nBien cordialement.", "reponse": "Bonjour,\n\nLa fréquence dépend de la taille de l’entreprise :\nEntreprises de moins de 50 salariés\nRéunion au moins 1 fois par mois.\n\nEntreprises de 50 salariés ou plus\nRéunion au moins 1 fois tous les 2 mois.\n\nL’employeur doit organiser les réunions du CSE au minimum une fois tous les deux mois (article L2315-27 du Code du travail).\nSi cela fait presque deux mois sans réunion, vous pouvez :\n\nDemander officiellement à l’employeur la tenue d’une réunion, par écrit, en rappelant l’obligation légale.\nSi l’employeur ne répond pas ou refuse, au moins deux membres titulaires du CSE peuvent exiger la convocation d’une réunion.\n\nEn cas de persistance du manquement, vous pouvez saisir l’inspection du travail, mais ce n’est pas obligatoire immédiatement. Cette démarche peut être utilisée en dernier recours pour non-respect des obligations légales."}, {"id": "id_46", "question": "Bonjour,\nJe cherche à connaitre mes droits en tant que CSE : en effet, cela fait\nbientôt 2 mois que nous n'avons pas fait de réunion CSE avec notre\nemployeur : Quel moyen ai-je à ma disposition pour obliger mon\nemployeur à tenir ces réunions ? Dois-je obligatoirement convoqué\nl'inspection du travail pour non-respect des réunions ?\nMerci par avance pour votre retour,\nBien cordialement.", "reponse": "Bonjour,\n\nLa convocation des membres du comité est de la responsabilité de l'employeur ou de son représentant.\nC. trav., art. L. 2315-27 et L. 2315-28\nEn cas de carence de l'employeur, le comité peut à la demande de la moitié au moins de ses membres être convoqué par l'inspecteur du travail et siéger sous sa présidence (C. trav., art. L. 2315-27, al. 3).\n\nJe vous invite à adresser votre service au service de l'inspection du travail: ddetspp-uc@charente.gouv.fr\n\nRespectueusement,"}, {"id": "id_47", "question": "Bonjour,\nJe cherche à connaitre mes droits en tant que CSE : en effet, cela fait\nbientôt 2 mois que nous n'avons pas fait de réunion CSE avec notre\nemployeur : Quel moyen ai-je à ma disposition pour obliger mon\nemployeur à tenir ces réunions ? Dois-je obligatoirement convoqué\nl'inspection du travail pour non-respect des réunions ?\nMerci par avance pour votre retour,\nBien cordialement.", "reponse": "Madame,\n\nvotre question relève de l'inspecteur du travail en charge de votre établissement.\nJe vous invite à formuler votre demande auprès de l'adresse ci-dessous :\n\nddetspp-uc1@dordogne.gouv.fr\n\nVous voudrez bien mettre en objet le nom de l'entreprise et sa localisation afin que votre demande soit correctement orientée.\n\nCordialement"}, {"id": "id_48", "question": "Bonjour,\nJe cherche à connaitre mes droits en tant que CSE : en effet, cela fait\nbientôt 2 mois que nous n'avons pas fait de réunion CSE avec notre\nemployeur : Quel moyen ai-je à ma disposition pour obliger mon\nemployeur à tenir ces réunions ? Dois-je obligatoirement convoqué\nl'inspection du travail pour non-respect des réunions ?\nMerci par avance pour votre retour,\nBien cordialement.", "reponse": "Bonjour,\n\nJe vous transmets via le lien ci-après une fiche d'information reprenant la législation concernant :\nComment se déroulent les réunions du comité social et économique (CSE) ? | Service Public\n\n\nEn tant que membre du CSE, l'employeur a l'obligation légale de convoquer au minimum une réunion tous les deux mois dans les entreprises de 50 à 299 salariés.\nAprès prés de 2 mois sans réunion, cela constitue un manquement caractérisant un potentiel délit d'entrave (art.L2317-1), passible d’une amende de 7500  et d'un an d'emprisonnement.\nPar ailleurs, vous pouvez écrire à l'agent de contrôle compétent géographiquement (coordonnées des sections d’inspection du travail accessibles sur la cartographie via le lien suivant :  Annuaire de l'inspection du travail en Normandie (arcgis.com)"}, {"id": "id_49", "question": "Bonjour,\nJe cherche à connaitre mes droits en tant que CSE : en effet, cela fait\nbientôt 2 mois que nous n'avons pas fait de réunion CSE avec notre\nemployeur : Quel moyen ai-je à ma disposition pour obliger mon\nemployeur à tenir ces réunions ? Dois-je obligatoirement convoqué\nl'inspection du travail pour non-respect des réunions ?\nMerci par avance pour votre retour,\nBien cordialement.", "reponse": "Bonjour,\n\nPour faire suite à votre mail et sous réserve de l’appréciation souveraine des tribunaux, veuillez trouver les informations suivantes :\n\nS’agissant des réunions ordinaires,\n\nDans les entreprises de 11 à 49 salariés, les membres du CSE sont reçus collectivement par l’employeur ou son représentant au moins une fois par mois (L. 2315-21).\n\nPar ailleurs, et sur leur demande, ils sont reçus par l’employeur ou son représentant (L. 2315-21) :\n\n*collectivement en cas d’urgence,\n\n*soit individuellement, soit par catégorie, soit par atelier, par service ou par spécialité professionnelle, selon les questions qu’ils ont à traiter.\n\nC’est à l’employeur d’en prendre l’initiative : il doit convoquer les membres de la délégation du personnel et organiser la réunion (Cass. Crim. 17 décembre 1996, n°95-84938, publié). Cette obligation lui incombe même si les membres du comité social et économique ne lui ont pas adressé la note écrite exposant l’objet de leurs demandes conformément à l’article L. 2315-22 (Cass. Crim. 22 octobre 1975, n°74-93478, publié).\n\n\n\nDans les entreprises d’au moins 50 salariés, l’employeur réunit le comité selon la périodicité négociée par accord majoritaire conclu avec les délégués syndicaux, ou en l’absence de délégué syndical, avec la majorité des élus titulaires du CSE, avec un minimum de 6 réunions par an (L. 2312-19).\nÀ défaut d’accord, la périodicité minimale dépend de l’effectif de l’entreprise, et non de celui de l’établissement (L. 2315-28) :\n\neffectif d’au moins 300 salariés : l’employeur doit réunir le comité une fois par mois ;\n\neffectif inférieur à 300 salariés : l’employeur doit réunir le comité une fois tous les deux mois.\n\nParmi ces réunions, au moins 4 réunions par an doivent porter, en tout ou partie, sur ses attributions en matière de santé, sécurité et conditions de travail (L. 2315-27).\n\n\n\nLe défaut de convocation régulière du CSE est susceptible de constituer un délit d'entrave.\nAfin de préserver le dialogue social dans l’entreprise, vous avez la possibilité ,dans un premier temps, de rappeler les échéances prévues à votre employeur.\n\nEn cas de difficultés récurrentes ou d’absence de dialogue, vous avez également la possibilité d’échanger sur la ou les problématiques de fonctionnement des instances avec l’inspecteur du travail compétent sur le secteur.\n\nVous trouverez l’adresse mail via ce lien : https://hauts-de-france.dreets.gouv.fr/Inspection-du-travail-je-trouve-mon-unite-de-controle-en-ligne\n\nCordialement,"}, {"id": "id_50", "question": "Madame, Monsieur, Bonjour,\nJe suis copropriétaire dans une résidence et je voudrais\nsavoir s’il est normalement prévu de verser une prime de départ à la\nretraite pour une employée, à savoir une Concierge.\nDans le cas où une loi prévoit cette prime, pouvez-vous me donner les\nréférences de celle-ci.\nPouvez-vous me renseigner à ce sujet SVP.\nAvec mes remerciements\nCordialement\n\nconvention collectice : conciergerie et gardien d'immeuble", "reponse": "Monsieur,\n\nPourriez-vous me préciser l'ancienneté précise de votre salarié ainsi que sa catégorie (A ou B), en effet la convention des gardiens, concierges et employés d'immeubles prévoit des modalités de calcul différentes en fonction de la catégorie, voir ci-dessous.\nDéfinition des catégories de salariés\n1°Catégorie A (régime de droit commun) :\nles salariés se rattachent à cette catégorie lorsqu'ils travaillent dans un cadre horaire où 151,67 h/mois représentent un temps complet.\n2°Catégorie B (régime dérogatoire) :\nles salariés se rattachent à cette catégorie lorsqu'ils ne travaillent pas dans un cadre horaire et lorsque leur emploi répond à la définition légale du concierge et employé d'immeubles à usage d'habitation ( C. trav., art. L. 7211-1 et L. 7211-2 ) , c'est-à-dire lorsqu'ils logent dans l'immeuble (au titre d'accessoire au contrat de travail) et sont chargés d'en assurer la garde, la surveillance et/ou l'entretien.\n\n\nCordialement\nClément VILBERT"}, {"id": "id_51", "question": "Madame, Monsieur, Bonjour,\nJe suis copropriétaire dans une résidence et je voudrais\nsavoir s’il est normalement prévu de verser une prime de départ à la\nretraite pour une employée, à savoir une Concierge.\nDans le cas où une loi prévoit cette prime, pouvez-vous me donner les\nréférences de celle-ci.\nPouvez-vous me renseigner à ce sujet SVP.\nAvec mes remerciements\nCordialement\n\nconvention collectice : conciergerie et gardien d'immeuble", "reponse": "Bonjour,\n\nJe suis copropriétaire dans une résidence et je voudrais savoir s'il est normalement prévu de verser une prime de départ à la retraite pour une employée, à savoir une Concierge.\nDans le cas où une loi prévoit cette prime, pouvez-vous me donner les références de celle-ci ?\n\nGardiens, concierges et employés d'immeubles\nDate d'arrêt des textes : 01 novembre 2025\nConvention collective        Signature        Extension        JO        Révision        Extension        JO        Brochure JO        IDCC\nGardiens, concierges et employés d'immeubles\n11-12-79\n15-4-81\n16-5-81\n11-1-2016  \n4-5-2017\n6-5-2017\n3144\n1043\n(1) Avenant no 88 portant actualisation de la CCN, applicable en France métropolitaire à compter du 1-6-2017 (1er jour du mois suivant la publication de son arrêté d'extension au Journal officiel) et dans les départements d'outre-mer à compter du 1-1-2018.\n\nIndemnité de départ à la retraite\n1°Montant\na)Indemnité de départ volontaire à la retraite\n1.\nSalariés de catégorie A\nAncienneté        Après 10 ans\nAprès 15 ans\nAprès 20 ans\nAprès 30 ans\nMontant        0,5 mois\n1 mois\n1,5 mois\n2 mois\n2.\nSalariés de catégorie B\nAncienneté        Montant de l'indemnité\n1 à 7 ans\n1/5 mois par année de service sur la totalité des années de service\nAu-delà de 7 ans\n1/5 mois par année de service sur la totalité des années de service + 2/15 mois par année de service au-delà de la 7e année\nAu-delà de 19 ans\n1/5 mois par année de service sur la totalité des années de service + 2/15 mois par année de service au-delà de la 7e année + 1/10 mois par année de service au-delà de la 19e année\nb)Indemnité de mise à la retraite (salariés de catégorie A ou B) :\nindemnité égale à l'indemnité de départ volontaire à la retraite des salariés de catégorie B (v. ci-avant).\n2°Base de calcul :\négale à celle prévue pour l'indemnité de licenciement :\nArt. 17\n\nArticle 17 - Départ et mise à la retraite\n\n\nA - Procédure de départ et de mise à la retraite\n\n\n1 - Départ à sa demande\n\nLe départ du salarié souhaitant bénéficier de ses droits à la retraite même avec abattement ne constitue pas une démission.\n\nLe salarié est tenu au respect d'un délai de prévenance identique à celui prévu à l'article 14 en matière de démission.\n\n\n2 - Mise à la retraite\n\nL'employeur ne peut mettre fin au contrat de travail du salarié âgé entre 65 et 69 ans, qu'avec l'assentiment, expresse ou tacite, de ce dernier et en respectant la procédure prévue à l'article L. 1237-5 du code du travail. La mise à la retraite d'office par l'employeur redevant possible, une fois que le salarié a atteint 70 ans.\n\nSi la mise à la retraite intervient à l'initiative de l'employeur, celui-ci est tenu de respecter la procédure de l'entretien préalable prévu par l'article L. 1232-2 à L 1232-4 du Code du travail.\n\nPour les salariés catégorie A, le préavis est celui fixé par l'article 14 de la CCN, en matière de licenciement.\n\nPour les salariés catégorie B le préavis est de 6 mois à compter de la signification de la mise à la retraite. Le logement de fonction devra être libéré au terme du préavis.\n\n\nB - Indemnités de rupture (Avenant n° 80 16 mars 2012, étendu)\n\n\n1 - En cas de départ en retraite à sa demande\n\n1. Le salarié catégorie A perçoit, en application de l'article L. 1237-9 du code du travail, l'indemnité de départ en retraite prévue aux articles D. 1237-1 et 2 du code du travail relatifs à la mensualisation, soit :\n\n1.  un demi-mois de salaire après dix ans d'ancienneté dans l'entreprise ;\n2.  un mois de salaire après quinze ans d'ancienneté dans l'entreprise ;\n3.  un mois et demi de salaire après vingt ans d'ancienneté dans l'entreprise ;\n4.  deux mois de salaire près trente ans d'ancienneté dans l'entreprise.\n\n\n2. Le salarié catégorie B perçoit :\n•  1/5ème de mois par année de service, sur la totalité des années de service ;\n•  À laquelle s'ajoute, à l'issue de la 7ème année d'ancienneté une majoration de 2/15ème de mois par année de service calculée au delà de la 7ème année ;\n•  Auxquelles s'ajoute, à l'issue de la 19ème année d'ancienneté une majoration supplémentaire de 1/10ème de mois par année de service calculée au delà de la 19ème année.\n\n\nLa valeur du mois de salaire à prendre en compte est la même que celle définie à l'article 16 .\n\n\n2 - En cas de mise à la retraite\n\nL'indemnité de départ en retraite, pour le salarié de catégorie A ou B, est établie de la manière suivante :\n\n•  1/5ème de mois par année de service, sur la totalité des années de service ;\n•  À laquelle s'ajoute, à l'issue de la 7ème année d'ancienneté une majoration de 2/15ème de mois par année de service calculée au delà de la 7ème année ;\n•  Auxquelles s'ajoute, à l'issue de la 19ème année d'ancienneté une majoration supplémentaire de 1/10ème de mois par année de service calculée au delà de la 19ème année.\n\n\nLa valeur du mois de salaire à prendre en compte est la même que celle définie à l'article 16 .\n\nBase de calcul :\nselon la formule la plus avantageuse pour le salarié :\nsoit la rémunération globale brute mensuelle contractuelle ;\nsoit 1/12 de la rémunération des 12 derniers mois précédant le licenciement ;\nsoit 1/3 des 3 derniers mois (primes ou gratifications de caractère annuel ou exceptionnel prises en compte prorata temporis).\nArt. 16\nCordialement,"}, {"id": "id_52", "question": "Madame, Monsieur, Bonjour,\nJe suis copropriétaire dans une résidence et je voudrais\nsavoir s’il est normalement prévu de verser une prime de départ à la\nretraite pour une employée, à savoir une Concierge.\nDans le cas où une loi prévoit cette prime, pouvez-vous me donner les\nréférences de celle-ci.\nPouvez-vous me renseigner à ce sujet SVP.\nAvec mes remerciements\nCordialement\n\nconvention collectice : conciergerie et gardien d'immeuble", "reponse": "Bonjour monsieur,\n\nSuite à votre demande, veuillez trouver ci-dessous l'extrait de la convention collective « gardiens, concierges et employés d'immeuble » concernant les indemnités de rupture en cas de départ et de mise à la retraite.\n\nCordialement.\n\n\n\nArticle 17\n\nDépart et mise à la retraite\n\n(mod. par https://www.elnet.fr/documentation/hulkStatic/EL/sharp_TRANSVERSE/www/html/icons/losangeDP15.gif)\n\n\nA - Procédure de départ et de mise à la retraite\n\n\n\n\n1 - Départ à sa demande\n\nLe départ du salarié souhaitant bénéficier de ses droits à la retraite même avec abattement ne constitue pas une démission.\n\nLe salarié est tenu au respect d'un délai de prévenance identique à celui prévu à l'article 14 en matière de démission.\n\n\n\n2 - Mise à la retraite\n\nL'employeur ne peut mettre fin au contrat de travail du salarié âgé entre 65 et 69 ans, qu'avec l'assentiment, expresse ou tacite, de ce dernier et en respectant la procédure prévue à l'article L. 1237-5 du code du travail. La mise à la retraite d'office par l'employeur redevant possible, une fois que le salarié a atteint 70 ans.\n\nSi la mise à la retraite intervient à l'initiative de l'employeur, celui-ci est tenu de respecter la procédure de l'entretien préalable prévu par l'article L. 1232-2 à L 1232-4 du Code du travail.\n\nPour les salariés catégorie A, le préavis est celui fixé par l'article 14 de la CCN, en matière de licenciement.\n\nPour les salariés catégorie B le préavis est de 6 mois à compter de la signification de la mise à la retraite. Le logement de fonction devra être libéré au terme du préavis.\n\n\n\nB - Indemnités de rupture (Avenant n° 80 16 mars 2012, étendu)\n\n\n\n\n1 - En cas de départ en retraite à sa demande\n\n1. Le salarié catégorie A perçoit, en application de l'article L. 1237-9 du code du travail, l'indemnité de départ en retraite prévue aux articles D. 1237-1 et 2 du code du travail relatifs à la mensualisation, soit :\n\n1.  un demi-mois de salaire après dix ans d'ancienneté dans l'entreprise ;\n\n2.  un mois de salaire après quinze ans d'ancienneté dans l'entreprise ;\n\n3.  un mois et demi de salaire après vingt ans d'ancienneté dans l'entreprise ;\n\n4.  deux mois de salaire près trente ans d'ancienneté dans l'entreprise.\n\n\n\n2. Le salarié catégorie B perçoit :\n\n•  1/5ème de mois par année de service, sur la totalité des années de service ;\n\n•  À laquelle s'ajoute, à l'issue de la 7ème année d'ancienneté une majoration de 2/15ème de mois par année de service calculée au delà de la 7ème année ;\n\n•  Auxquelles s'ajoute, à l'issue de la 19ème année d'ancienneté une majoration supplémentaire de 1/10ème de mois par année de service calculée au delà de la 19ème année.\n\n\n\nLa valeur du mois de salaire à prendre en compte est la même que celle définie à l'article 16 .\n\n\n\n\n2 - En cas de mise à la retraite\n\nL'indemnité de départ en retraite, pour le salarié de catégorie A ou B, est établie de la manière suivante :\n\n•  1/5ème de mois par année de service, sur la totalité des années de service ;\n\n•  À laquelle s'ajoute, à l'issue de la 7ème année d'ancienneté une majoration de 2/15ème de mois par année de service calculée au delà de la 7ème année ;\n\n•  Auxquelles s'ajoute, à l'issue de la 19ème année d'ancienneté une majoration supplémentaire de 1/10ème de mois par année de service calculée au delà de la 19ème année.\n\n\n\nLa valeur du mois de salaire à prendre en compte est la même que celle définie à l'article 16 .\n\n\n\nArticle 16\n\nIndemnité de licenciement\n\n(mod. par https://www.elnet.fr/documentation/hulkStatic/EL/sharp_TRANSVERSE/www/html/icons/losangeDP15.gif)\n\nLe salarié licencié (sauf pour faute grave ou lourde) recevra, après un an d'ancienneté chez le même employeur, une indemnité égale à :\n\n•  1/5ème de mois par année de service, sur la totalité des années de service\n\n•  À laquelle s'ajoute, à l'issue de la 7ème année d'ancienneté une majoration de 2/15ème de mois par année de service calculée au-delà de la 7ème année ;\n\n•  Auxquelles s'ajoute, à l'issue de la 19ème année d'ancienneté une majoration supplémentaire de 1/10ème de mois par année de service calculée au delà de la 19ème année.\n\n\n\nAu delà de la première année, toute année incomplète sera calculée au prorata temporis entre le mois anniversaire et le mois de départ du salarié.\n\nLe salaire à prendre en considération pour le calcul de l'indemnité est :\n\n•  soit la rémunération globale brute mensuelle contractuelle visée à l'article 22-2 ;\n(Avenant n° 88, 11 janv. 2016, étendu)\n\n•  soit le douzième de la rémunération des douze derniers mois précédent le licenciement ;\n\n•  soit un tiers des trois derniers mois, étant entendu que dans ce cas toute prime ou gratification de caractère annuel ou exceptionnel qui aurait été versée au salarié pendant cette période ne serait pris en compte que prorata temporis,\n\n\n\nselon la formule la plus avantageuse pour l'intéressé, étant entendu que cette indemnité de licenciement ne se cumule pas avec toute autre indemnité de même nature."}, {"id": "id_53", "question": "Madame, Monsieur, Bonjour,\nJe suis copropriétaire dans une résidence et je voudrais\nsavoir s’il est normalement prévu de verser une prime de départ à la\nretraite pour une employée, à savoir une Concierge.\nDans le cas où une loi prévoit cette prime, pouvez-vous me donner les\nréférences de celle-ci.\nPouvez-vous me renseigner à ce sujet SVP.\nAvec mes remerciements\nCordialement\n\nconvention collectice : conciergerie et gardien d'immeuble", "reponse": "Bonjour,\n\nLa convention collective prévoit en effet le versement d'une indemnité de départ à la retraite dans deux cas :\n1. indemnité de départ volontaire :\nLe salarié catégorie A perçoit une indemnité de départ en retraite de :\nun demi-mois de salaire après dix ans d'ancienneté dans l'entreprise\nun mois de salaire après quinze ans d'ancienneté dans l'entreprise\nun mois et demi de salaire après vingt ans d'ancienneté dans l'entreprise\ndeux mois de salaire près trente ans d'ancienneté dans l'entreprise\nLe salarié catégorie B perçoit :\n1/5ème de mois par année de service, sur la totalité des années de service\nÀ laquelle s'ajoute, à l'issue de la 7ème année d'ancienneté une majoration de 2/15ème de mois par année de service calculée au delà de la 7ème année\nAuxquelles s'ajoute, à l'issue de la 19ème année d'ancienneté une majoration supplémentaire de 1/10ème de mois par année de service calculée au delà de la 19ème année\n2. En cas de mise à la retraite, l'indemnité de départ en retraite, pour le salarié de catégorie A ou B, est établie de la manière suivante :\n1/5ème de mois par année de service, sur la totalité des années de service\nÀ laquelle s'ajoute, à l'issue de la 7ème année d'ancienneté une majoration de 2/15ème de mois par année de service calculée au delà de la 7ème année\nAuxquelles s'ajoute, à l'issue de la 19ème année d'ancienneté une majoration supplémentaire de 1/10ème de mois par année de service calculée au delà de la 19ème année.\nLa valeur du mois de salaire à prendre en compte est la même que pour une indemnité de licenciement (article 16 de la convention collective).\n\nConcernant les catégories :\n\nCatégorie A (régime de droit commun) : les salariés se rattachent à cette catégorie lorsqu'ils travaillent dans un cadre horaire où 151,67 h/mois représentent un temps complet.\nCatégorie B (régime dérogatoire) :l es salariés se rattachent à cette catégorie lorsqu'ils ne travaillent pas dans un cadre horaire et lorsque leur emploi répond à la définition légale du concierge et employé d'immeubles à usage d'habitation (articles L.7211-1 et L.7211-2 du Code du travail), c'est-à-dire lorsqu'ils logent dans l'immeuble (au titre d'accessoire au contrat de travail) et sont chargés d'en assurer la garde, la surveillance et/ou l'entretien.\nCes éléments vous sont donnés sous réserve de l'appréciation souveraine des juridictions compétentes.\n\nJe reste à votre disposition pour toute précision,\n\nRespectueusement,"}, {"id": "id_54", "question": "Madame, Monsieur, Bonjour,\nJe suis copropriétaire dans une résidence et je voudrais\nsavoir s’il est normalement prévu de verser une prime de départ à la\nretraite pour une employée, à savoir une Concierge.\nDans le cas où une loi prévoit cette prime, pouvez-vous me donner les\nréférences de celle-ci.\nPouvez-vous me renseigner à ce sujet SVP.\nAvec mes remerciements\nCordialement\n\nconvention collectice : conciergerie et gardien d'immeuble", "reponse": "Monsieur,\n\nNous vous communiquons les dispositions de la CCN Gardiens, concierges et employés d'immeubles :\n\nEn synthèse :\n=> Indemnités départ à la retraite - Gardiens, concierges et employés d'immeubles - Code du travail numérique\n\nDétail des articles de la CCN :\nArticle 17 Départ et mise à la retraite\n\nA - Procédure de départ et de mise à la retraite\n1 - Départ à sa demande\nLe départ du salarié souhaitant bénéficier de ses droits à la retraite même avec abattement ne constitue pas une démission.\nLe salarié est tenu au respect d'un délai de prévenance identique à celui prévu à l'article 14 en matière de démission.\n\nDont cet extrait de l'article 14 cité ci-dessus : (Avenant n° 88, 11 janv. 2016, étendu)\n\n- en cas de démission :\n-  salarié non logé dont le coefficient hiérarchique est inférieur ou égal à 602 : 8 jours ;\n-  salarié dont le coefficient hiérarchique est supérieur à 602 ou salarié logé : 1 mois.\n\n\nB - Indemnités de rupture (Avenant n° 80 16 mars 2012, étendu)\n1 - En cas de départ en retraite à sa demande\n\n1. Le salarié catégorie A perçoit, en application de l'article L. 1237-9 du code du travail, l'indemnité de départ en retraite prévue aux articles D. 1237-1 et 2 du code du travail relatifs à la mensualisation, soit :\n\n1.  un demi-mois de salaire après dix ans d'ancienneté dans l'entreprise ;\n2.  un mois de salaire après quinze ans d'ancienneté dans l'entreprise ;\n3.  un mois et demi de salaire après vingt ans d'ancienneté dans l'entreprise ;\n4.  deux mois de salaire près trente ans d'ancienneté dans l'entreprise.\n2. Le salarié catégorie B perçoit :\n•  1/5ème de mois par année de service, sur la totalité des années de service ;\n•  À laquelle s'ajoute, à l'issue de la 7ème année d'ancienneté une majoration de 2/15ème de mois par année de service calculée au delà de la 7ème année ;\n•  Auxquelles s'ajoute, à l'issue de la 19ème année d'ancienneté une majoration supplémentaire de 1/10ème de mois par année de service calculée au delà de la 19ème année.\nLa valeur du mois de salaire à prendre en compte est la même que celle définie à l'article 16 .\n\nDont cet extrait de l'article 16 cité ci-dessus :\n\nLe salaire à prendre en considération pour le calcul de l'indemnité est :\n•  soit la rémunération globale brute mensuelle contractuelle visée à l'article 22-2 ;\n(Avenant n° 88, 11 janv. 2016, étendu)\n•  soit le douzième de la rémunération des douze derniers mois précédent le licenciement ;\n•  soit un tiers des trois derniers mois, étant entendu que dans ce cas toute prime ou gratification de caractère annuel ou exceptionnel qui aurait été versée au salarié pendant cette période ne serait pris en compte que prorata temporis,\nselon la formule la plus avantageuse pour l'intéressé,\n\nCordialement.\n"}, {"id": "id_55", "question": "Madame, Monsieur, Bonjour,\nJe suis copropriétaire dans une résidence et je voudrais\nsavoir s’il est normalement prévu de verser une prime de départ à la\nretraite pour une employée, à savoir une Concierge.\nDans le cas où une loi prévoit cette prime, pouvez-vous me donner les\nréférences de celle-ci.\nPouvez-vous me renseigner à ce sujet SVP.\nAvec mes remerciements\nCordialement\n\nconvention collectice : conciergerie et gardien d'immeuble", "reponse": "Monsieur,\n\nSuite à votre courriel, veuillez trouver ci-après des éléments de réponse à vos questions, sous réserve de l'appréciation souveraine des juges de fond.\n\nLa convention collective \"Gardiens, concierges et employés d'immeubles\" prévoit à l'article 17 l'indemnité de départ à la retraite. En voici le texte ci-après :\n\n\nDépart et mise à la retraite\n\n\nA - Procédure de départ et de mise à la retraite\n\n\n\n1 - Départ à sa demande\n\nLe départ du salarié souhaitant bénéficier de ses droits à la retraite même avec abattement ne constitue pas une démission.\n\nLe salarié est tenu au respect d'un délai de prévenance identique à celui prévu à l'article 14 en matière de démission.\n\n\n\n2 - Mise à la retraite\n\nL'employeur ne peut mettre fin au contrat de travail du salarié âgé entre 65 et 69 ans, qu'avec l'assentiment, expresse ou tacite, de ce dernier et en respectant la procédure prévue à l'article L. 1237-5 du code du travail. La mise à la retraite d'office par l'employeur redevant possible, une fois que le salarié a atteint 70 ans.\n\nSi la mise à la retraite intervient à l'initiative de l'employeur, celui-ci est tenu de respecter la procédure de l'entretien préalable prévu par l'article L. 1232-2 à L 1232-4 du Code du travail.\n\nPour les salariés catégorie A, le préavis est celui fixé par l'article 14 de la CCN, en matière de licenciement.\n\nPour les salariés catégorie B le préavis est de 6 mois à compter de la signification de la mise à la retraite. Le logement de fonction devra être libéré au terme du préavis.\n\n\n\nB - Indemnités de rupture (Avenant n° 80 16 mars 2012, étendu)\n\n\n\n1 - En cas de départ en retraite à sa demande\n\n1. Le salarié catégorie A perçoit, en application de l'article L. 1237-9 du code du travail, l'indemnité de départ en retraite prévue aux articles D. 1237-1 et 2 du code du travail relatifs à la mensualisation, soit :\n\n1.  un demi-mois de salaire après dix ans d'ancienneté dans l'entreprise ;\n2.  un mois de salaire après quinze ans d'ancienneté dans l'entreprise ;\n3.  un mois et demi de salaire après vingt ans d'ancienneté dans l'entreprise ;\n4.  deux mois de salaire près trente ans d'ancienneté dans l'entreprise.\n\n\n2. Le salarié catégorie B perçoit :\n•  1/5ème de mois par année de service, sur la totalité des années de service ;\n•  À laquelle s'ajoute, à l'issue de la 7ème année d'ancienneté une majoration de 2/15ème de mois par année de service calculée au delà de la 7ème année ;\n•  Auxquelles s'ajoute, à l'issue de la 19ème année d'ancienneté une majoration supplémentaire de 1/10ème de mois par année de service calculée au delà de la 19ème année.\n\nLa valeur du mois de salaire à prendre en compte est la même que celle définie à l'article 16 .\n\n\n2 - En cas de mise à la retraite\n\nL'indemnité de départ en retraite, pour le salarié de catégorie A ou B, est établie de la manière suivante :\n\n•  1/5ème de mois par année de service, sur la totalité des années de service ;\n•  À laquelle s'ajoute, à l'issue de la 7ème année d'ancienneté une majoration de 2/15ème de mois par année de service calculée au delà de la 7ème année ;\n•  Auxquelles s'ajoute, à l'issue de la 19ème année d'ancienneté une majoration supplémentaire de 1/10ème de mois par année de service calculée au delà de la 19ème année.\n\nLa valeur du mois de salaire à prendre en compte est la même que celle définie à l'article 16 .\nJe vous prie de croire, Monsieur, à l'assurance de ma considération distinguée."}, {"id": "id_56", "question": "Madame, Monsieur, Bonjour,\nJe suis copropriétaire dans une résidence et je voudrais\nsavoir s’il est normalement prévu de verser une prime de départ à la\nretraite pour une employée, à savoir une Concierge.\nDans le cas où une loi prévoit cette prime, pouvez-vous me donner les\nréférences de celle-ci.\nPouvez-vous me renseigner à ce sujet SVP.\nAvec mes remerciements\nCordialement\n\nconvention collectice : conciergerie et gardien d'immeuble", "reponse": "Bonjour,\n\nAprès vérification, la convention collective applicable aux concierges d'immeubles ne prévoit pas de prime de départ à la retraite.\n\nIl n'existe donc pas d'obligation légale ou conventionnelle de verser une telle prime à la salariée ."}, {"id": "id_57", "question": "Madame, Monsieur, Bonjour,\nJe suis copropriétaire dans une résidence et je voudrais\nsavoir s’il est normalement prévu de verser une prime de départ à la\nretraite pour une employée, à savoir une Concierge.\nDans le cas où une loi prévoit cette prime, pouvez-vous me donner les\nréférences de celle-ci.\nPouvez-vous me renseigner à ce sujet SVP.\nAvec mes remerciements\nCordialement\n\nconvention collectice : conciergerie et gardien d'immeuble", "reponse": "Bonjour Monsieur,\n\nEn réponse à votre requête et au vu des éléments fournis ;\n\nJe vous invite a consulter la fiche pratique sur ce point en cliquant sur le lien ci-après : https://www.service-public.gouv.fr/particuliers/vosdroits/F13965\nVous pouvez retrouver les articles du code de travail dans l'onglet \"Textes de loi et références\" en bas de la fiche.\n\nJe reste à votre disposition pour tout renseignement complémentaire.\n\nCordialement."}, {"id": "id_58", "question": "Madame, Monsieur, Bonjour,\nJe suis copropriétaire dans une résidence et je voudrais\nsavoir s’il est normalement prévu de verser une prime de départ à la\nretraite pour une employée, à savoir une Concierge.\nDans le cas où une loi prévoit cette prime, pouvez-vous me donner les\nréférences de celle-ci.\nPouvez-vous me renseigner à ce sujet SVP.\nAvec mes remerciements\nCordialement\n\nconvention collectice : conciergerie et gardien d'immeuble", "reponse": "Bonjour Monsieur,\n\nsuite à votre demande, je vous prie de trouver ci-dessous le montant de la prime à verser selon la catégorie à laquelle appartient le salarié selon les dispositions de la convention collective :\n\n\n8\nÉcrire à la rédaction\nIndemnité de départ à la retraite\n1°Montant\na)Indemnité de départ volontaire à la retraite\n1.\nSalariés de catégorie A\nAncienneté        Après 10 ans\nAprès 15 ans\nAprès 20 ans\nAprès 30 ans\nMontant        0,5 mois\n1 mois\n1,5 mois\n2 mois\n2.\nSalariés de catégorie B\nAncienneté        Montant de l'indemnité\n1 à 7 ans\n1/5 mois par année de service sur la totalité des années de service\nAu-delà de 7 ans\n1/5 mois par année de service sur la totalité des années de service + 2/15 mois par année de service au-delà de la 7e année\nAu-delà de 19 ans\n1/5 mois par année de service sur la totalité des années de service + 2/15 mois par année de service au-delà de la 7e année + 1/10 mois par année de service au-delà de la 19e année\nb)Indemnité de mise à la retraite (salariés de catégorie A ou B) :\nindemnité égale à l'indemnité de départ volontaire à la retraite des salariés de catégorie B (v. ci-avant).\n2°Base de calcul :\négale à celle prévue pour l'indemnité de licenciement (v. n° 7).\nArt. 17\nSection 4 : Congés et jours fériés\n\nSection 3 : Licenciement et départ à la retraite\n7\nÉcrire à la rédaction\nIndemnité de licenciement\nIndemnité due, sauf faute grave ou lourde, après 1 an d'ancienneté chez le même employeur.\n1°Montant\nAncienneté          Montant de l'indemnité\n1 à 7 ans\n1/5 mois par année de service sur la totalité des années de service\nAu-delà de 7 ans\n1/5 mois par année de service sur la totalité des années de service\n+ 2/15 mois par année de service au-delà de la 7e année\nAu-delà de 19 ans\n1/5 mois par année de service sur la totalité des années de service\n+ 2/15 mois par année de service au-delà de la 7e année\n+ 1/10 mois par année de service au-delà de la 19e année\n(1) Au-delà de la 1re année, calcul de l'ancienneté prorata temporis entre le mois anniversaire et le mois de départ du salarié.\n2°Base de calcul :\nselon la formule la plus avantageuse pour le salarié :\nsoit la rémunération globale brute mensuelle contractuelle (v. n° 29) ;\nsoit 1/12 de la rémunération des 12 derniers mois précédant le licenciement ;\nsoit 1/3 des 3 derniers mois (primes ou gratifications de caractère annuel ou exceptionnel prises en compte prorata temporis).\nCordialement"}, {"id": "id_59", "question": "Madame, Monsieur, Bonjour,\nJe suis copropriétaire dans une résidence et je voudrais\nsavoir s’il est normalement prévu de verser une prime de départ à la\nretraite pour une employée, à savoir une Concierge.\nDans le cas où une loi prévoit cette prime, pouvez-vous me donner les\nréférences de celle-ci.\nPouvez-vous me renseigner à ce sujet SVP.\nAvec mes remerciements\nCordialement\n\nconvention collectice : conciergerie et gardien d'immeuble", "reponse": "Monsieur,\n\nJe vous transmets via les liens ci-après :\n- une fiche d'information reprenant la règlementation concernant : Un salarié qui part à la retraite a-t-il droit à une indemnité de départ ? | Service Public\n- la convention collective citée : Indemnités départ à la retraite - Gardiens, concierges et employés d'immeubles - Code du travail numérique"}, {"id": "id_60", "question": "Madame, Monsieur, Bonjour,\nJe suis copropriétaire dans une résidence et je voudrais\nsavoir s’il est normalement prévu de verser une prime de départ à la\nretraite pour une employée, à savoir une Concierge.\nDans le cas où une loi prévoit cette prime, pouvez-vous me donner les\nréférences de celle-ci.\nPouvez-vous me renseigner à ce sujet SVP.\nAvec mes remerciements\nCordialement\n\nconvention collectice : conciergerie et gardien d'immeuble", "reponse": "Bonjour,\n\nSuite à votre mail et sous réserve de l'appréciation souveraine des tribunaux, veuillez trouver les éléments de réponse suivants basés sur la législation en vigueur :\n\nExtrait de la CCN Gardien d'immeuble :\n\n« B - Indemnités de rupture (Avenant n° 80 16 mars 2012, étendu)\n\n1 - En cas de départ en retraite à sa demande\n\n\n1. Le salarié catégorie A perçoit, en application de l'article L. 1237-9 du code du travail, l'indemnité de départ en retraite prévue aux articles D. 1237-1 et 2 du code du travail relatifs à la mensualisation, soit :\n\n un demi-mois de salaire après dix ans d'ancienneté dans l'entreprise ;\n un mois de salaire après quinze ans d'ancienneté dans l'entreprise ;\n un mois et demi de salaire après vingt ans d'ancienneté dans l'entreprise ;\ndeux mois de salaire après trente ans d'ancienneté dans l'entreprise.\n\n2. Le salarié catégorie B perçoit :\n\n\n•  1/5ème de mois par année de service, sur la totalité des années de service ;\n•  À laquelle s'ajoute, à l'issue de la 7ème année d'ancienneté une majoration de 2/15ème de mois par année de service calculée au delà de la 7ème année ;\n•  Auxquelles s'ajoute, à l'issue de la 19ème année d'ancienneté une majoration supplémentaire de 1/10ème de mois par année de service calculée au delà de la 19ème année.\n\nLa valeur du mois de salaire à prendre en compte est la même que celle définie à l'article 16 . »\n\n\n\n\nArticle 16 : (pour la valeur du mois) :\n\n\n\n« Indemnité de licenciement\n\n(mod. par )\n\nLe salarié licencié (sauf pour faute grave ou lourde) recevra, après un an d'ancienneté chez le même employeur, une indemnité égale à :\n\n• 1/5ème de mois par année de service, sur la totalité des années de service\n\n• À laquelle s'ajoute, à l'issue de la 7ème année d'ancienneté une majoration de 2/15ème de mois par année de service calculée au-delà de la 7ème année ;\n\n• Auxquelles s'ajoute, à l'issue de la 19ème année d'ancienneté une majoration supplémentaire de 1/10ème de mois par année de service calculée au delà de la 19ème année.\n\n\nAu delà de la première année, toute année incomplète sera calculée au prorata temporis entre le mois anniversaire et le mois de départ du salarié.\n\nLe salaire à prendre en considération pour le calcul de l'indemnité est :\n\n• soit la rémunération globale brute mensuelle contractuelle visée à l'article 22-2 ;\n\n(Avenant n° 88, 11 janv. 2016, étendu)\n\n• soit le douzième de la rémunération des douze derniers mois précédent le licenciement ;\n\n• soit un tiers des trois derniers mois, étant entendu que dans ce cas toute prime ou gratification de caractère annuel ou exceptionnel qui aurait été versée au salarié pendant cette période ne serait pris en compte que prorata temporis,\n\nselon la formule la plus avantageuse pour l'intéressé, étant entendu que cette indemnité de licenciement ne se cumule pas avec toute autre indemnité de même nature. »\n\n\n\n\n\nCordialement,\nCL"}, {"id": "id_61", "question": "Madame, Monsieur, Bonjour,\nJe suis copropriétaire dans une résidence et je voudrais\nsavoir s’il est normalement prévu de verser une prime de départ à la\nretraite pour une employée, à savoir une Concierge.\nDans le cas où une loi prévoit cette prime, pouvez-vous me donner les\nréférences de celle-ci.\nPouvez-vous me renseigner à ce sujet SVP.\nAvec mes remerciements\nCordialement\n\nconvention collectice : conciergerie et gardien d'immeuble", "reponse": "Bonjour,\n\nLe salarié qui quitte volontairement l'entreprise pour bénéficier de son droit à une pension de vieillesse a droit à une indemnité de départ en retraite, dans les conditions mentionnées ci-dessous.\nChaque salarié ne peut bénéficier que d'une seule indemnité de départ en retraite. L'indemnité est attribuée lors de la première liquidation complète de la retraite.\nLe montant de l'indemnité légale de départ en retraite, calculé à partir de la rémunération brute dont le salarié bénéficiait antérieurement, est fixé à : \n\n1/2 mois du salaire de référence après 10 ans d'ancienneté dans l'entreprise ;\n1 mois après 15 ans d'ancienneté ;\n1 mois 1/2 après 20 ans d'ancienneté ;\n2 mois après 30 ans d'ancienneté.\nSi la convention collective applicable dans l'entreprise ou le contrat de travail prévoit une indemnité de départ en retraite d'un montant supérieur, c'est elle qui sera versée (pas de cumul entre les différentes indemnités)\nLa convention collective gardiens concierge et employé d'immeuble prévoit :\n\n\"1. Le salarié catégorie A perçoit, en application de l'article L. 1237-9 du code du travail, l'indemnité de départ en retraite prévue aux articles D. 1237-1 et 2 du code du travail relatifs à la mensualisation, soit :\n\n1.  un demi-mois de salaire après dix ans d'ancienneté dans l'entreprise ;\n2.  un mois de salaire après quinze ans d'ancienneté dans l'entreprise ;\n3.  un mois et demi de salaire après vingt ans d'ancienneté dans l'entreprise ;\n4.  deux mois de salaire près trente ans d'ancienneté dans l'entreprise.\n\n\n2. Le salarié catégorie B perçoit :\n•  1/5ème de mois par année de service, sur la totalité des années de service ;\n•  À laquelle s'ajoute, à l'issue de la 7ème année d'ancienneté une majoration de 2/15ème de mois par année de service calculée au delà de la 7ème année ;\n•  Auxquelles s'ajoute, à l'issue de la 19ème année d'ancienneté une majoration supplémentaire de 1/10ème de mois par année de service calculée au delà de la 19ème année.\"\nCordialement."}, {"id": "id_62", "question": "Quelle est la procédure pour demander une dérogation permettant à mes techniciens de travailler ponctuellement 60 heures par semaine pour un chantier ?", "reponse": "Bonjour,\n\nLe service des renseignements vous a répondu le 17 décembre (17h01), mais il semble que l'envoi de certains messages ait échoué (plusieurs usagers nous l'ont signalé), nous en sommes désolés.\n\nPour vous répondre sur le fond :\n\nLa limite maximale de 48 heures sur une semaine peut être remise en cause en cas de circonstances exceptionnelles et pour la durée de celles-ci, sans toutefois pouvoir excéder 60 heures par semaine. Elle ne peut l'être qu'en cas de circonstance exceptionnelle entraînant temporairement un surcroît extraordinaire de travail et sur autorisation de l'inspection du travail. Une convention collective peut prévoir des dispositions particulières.\n\n→ Sources : articles L.3121-21 et R.3121-10 du Code du travail.\n\nVous devez donc adresser la demande à l'inspection du travail (la demande doit être accompagnée de l'avis du comité social et économique, s'il existe). Pour trouver les coordonnées de l'inspecteur compétent pour votre entreprise, vous pouvez consulter cet annuaire.\n\nCes éléments vous sont donnés sous réserve de l’appréciation souveraine des juridictions compétentes.\n\nJe reste à votre disposition pour toute précision,\n\nRespectueusement,\n"}, {"id": "id_63", "question": "Quelle est la procédure pour demander une dérogation permettant à mes techniciens de travailler ponctuellement 60 heures par semaine pour un chantier ?", "reponse": "Bonjour,\n\nPour demander une dérogation au plafond de 48 heures (limite absolue), vous devez adresser une demande motivée à l'Inspection du travail:ddets-uc1@charente-maritime.gouv.fr\nPour connaître les coordonnées précises de l'agent de contrôle, il suffit d'indiquer l'adresse de l'entreprise sur ce lien:https://lespacedescartes.maps.arcgis.com/apps/webappviewer/index.html?id=55726924aa694a9c9bb3fbcef1e765cc\n\n\nProcédure à suivre :\nJustification : Prouvez l'existence de circonstances exceptionnelles entraînant un surcroit temporaire de travail.\n\nConsultation : Recueillez l'avis de votre Comité Social et Économique (CSE) au préalable.\n\nDossier : Envoyez la demande incluant l'avis du CSE et la durée de dérogation souhaitée à l'inspecteur du travail.\n\nValidation : L'inspecteur accorde ou refuse l'autorisation. Sans réponse sous 15 jours (ou 8 jours en cas d'urgence), la demande est considérée comme acceptée.\n\nVous trouverez l'article R 3121-23 du code du Travail prévoyant cette dérogation:https://www.legifrance.gouv.fr/codes/id/LEGIARTI000018486436/2023-11-27/\n\nCordialement,"}, {"id": "id_64", "question": "Quelle est la procédure pour demander une dérogation permettant à mes techniciens de travailler ponctuellement 60 heures par semaine pour un chantier ?", "reponse": "Monsieur,\n\nLes demandes de dérogations à la durée maximale de travail doivent être présentées à l'inspecteur du travail de votre secteur, en indiquant l'adresse de votre entreprise et le lieu du chantier.\n\nVoici les adresses mail des secrétariats des unités de contrôle des Pyrénées-Atlantiques :\n- Pays-Basque : ddets-uc1@pyrenees-atlantiques.gouv.fr\n- Béarn et Soule : ddets-uc2@pyrenees-atlantiques.gouv.fr\n\nVous souhaitant bonne réception,\n\nCordialement."}, {"id": "id_65", "question": "Quelle est la procédure pour demander une dérogation permettant à mes techniciens de travailler ponctuellement 60 heures par semaine pour un chantier ?", "reponse": "Bonjour monsieur,\nIl faut envoyer votre demande à l'inspection du travail.\nVous pouvez joindre l'inspection du travail à l'adresse mail suivante : ddetspp-ucit@correze.gouv.fr\nCordialement."}, {"id": "id_66", "question": "Quelle est la procédure pour demander une dérogation permettant à mes techniciens de travailler ponctuellement 60 heures par semaine pour un chantier ?", "reponse": "Monsieur,\nVous devez envoyer votre demande à l'inspection du travail en charge de l'entreprise compétent pour cette dérogation.\nVous trouverez les coordonnées de celle-ci sur le lien suivant :\nInspection du travail : je trouve mon \"unité de contrôle\" en ligne - Directions régionales de l'économie, de l'emploi, du travail et des solidarités (DREETS)\n\nCordialement,"}, {"id": "id_67", "question": "Quelle est la procédure pour demander une dérogation permettant à mes techniciens de travailler ponctuellement 60 heures par semaine pour un chantier ?", "reponse": "Monsieur,\n\nLa dérogation ne peut être accordée qu’en cas de circonstances exceptionnelles entraînant un surcroît extraordinaire de travail.\nElle doit être temporaire et justifiée par des motifs impérieux (ex. : pic d’activité saisonnier, urgence économique).\nLa demande de l'employeur se fait auprès de l'inspection du travail et doit préciser les circonstances exceptionnelles motivant la demande ainsi que la durée pour laquelle est sollicitée la dérogation.\nUn avis du CSE, s'il existe, doit être joint à la demande.\n\nCordialement"}, {"id": "id_68", "question": "Quelle est la procédure pour demander une dérogation permettant à mes techniciens de travailler ponctuellement 60 heures par semaine pour un chantier ?", "reponse": "Bonjour,\n\n\nPour faire suite à votre demande,\n\n\nVous devez justifier cette demande en contactant les inspecteurs du travail à l'adresse mail suivante :  ddetspp-uc1@orne.gouv.fr\n\n\n\nRestant à votre disposition pour toutes informations supplémentaires.\n\n\nCordialement,"}, {"id": "id_69", "question": "Quelle est la procédure pour demander une dérogation permettant à mes techniciens de travailler ponctuellement 60 heures par semaine pour un chantier ?", "reponse": "Bonjour\n\n\nMerci de nous envoyer une demande écrite de dérogation à la durée maximale de travail hebdomadaire à DDETSPP 79 - Inspection du Travail - 30 rue de l'Hôtel de Ville CS 58434 - 79024 NIORT CEDEX\n\nPour vous aider à faire cette demande, vous pouvez prendre connaissance du :  Paragraphe 2 : Dépassement de la durée maximale hebdomadaire absolue et de la durée hebdomadaire maximale moyenne (Articles R3121-10 à R3121-11) - Légifrance\n\nCordialement"}, {"id": "id_70", "question": "Quelle est la procédure pour demander une dérogation permettant à mes techniciens de travailler ponctuellement 60 heures par semaine pour un chantier ?", "reponse": "Madame, Monsieur;\n\nEn réponse à  votre courriel du 9 décembre 2025, je vous informe qu'il faut adresser votre demande de dérogation auprès des services de la Direction départementale de l'emploi, du travail et des solidarités (DDETS) du lieu du chantier, accompagnée des pièces justificatives:\n - indication des circonstances exceptionnelles justifiant la demande,\n- avis du comité social et économique (CSE), s'il y en a un.\n\nLa demande doit être adressée un mois avant le début de l'intervention de vos salariés puisque nos services ont un mois pour traiter la demande.\n\nLe silence conservé par l'administration au bout de ce mois vaut acceptation de la demande.\n\nSi le chantier se trouve dans l’Aisne, il faut adresser votre demande à l'adresse suivante:\n\nDDETS\nCité administrative\nB.P. 60142\n02000 PPDC LAON\n\nou par courriel à l'adresse suivante: ddets-sct@aisne.gouv.fr\n\nVeuillez agréer, Madame, Monsieur, l’expression de mes salutations distinguées."}, {"id": "id_71", "question": "Quelle est la procédure pour demander une dérogation permettant à mes techniciens de travailler ponctuellement 60 heures par semaine pour un chantier ?", "reponse": "Bonjour,\n\nPour demander une dérogation permettant à vos techniciens de travailler ponctuellement 60 heures par semaine sur un chantier, adressez une demande motivée à la DREETS (Direction régionale de l'économie, de l'emploi, du travail et des solidarités).\nLa procédure repose sur l'article L.3121-21 du Code du travail, sous réserve d'accord administratif et l'avis du CSE (comité social et économique).\n\nCordialement"}, {"id": "id_72", "question": "Quelle est la procédure pour demander une dérogation permettant à mes techniciens de travailler ponctuellement 60 heures par semaine pour un chantier ?", "reponse": "Monsieur,\n\nSuite à votre courriel, pour demander une dérogation permettant à vos salariés de travailler 60 heures par semaine, vous devez obtenir l'approbation de l'inspection du travail. La demande doit être écrite et motivée, accompagnée de l'avis des représentants du personnel (membre CSE) et des justificatifs nécessaires.\n\nConformément à l'article L. 3121-21 du code du travail : \"En cas de circonstances exceptionnelles et pour la durée de celles-ci, le dépassement de la durée maximale définie à l'article L. 3121-20 peut être autorisé par l'autorité administrative, dans des conditions déterminées par décret en Conseil d’État, sans toutefois que ce dépassement puisse avoir pour effet de porter la durée du travail à plus de soixante heures par semaine. Le comité social et économique donne son avis sur les demandes d'autorisation formulées à ce titre. Cet avis est transmis à l'agent de contrôle de l'inspection du travail.\"\n\nN'ayant pas d'informations sur la commune où se situe l'entreprise, je ne peux pas vous orienter vers l'unité de contrôle de l'inspection du travail.\n\nTous ces éléments sont donnés sous réserve de l’appréciation souveraine des juges du fond.\n\nJe vous prie de croire, Monsieur, à l’assurance de ma considération distinguée.\n"}, {"id": "id_73", "question": "Quelle est la procédure pour demander une dérogation permettant à mes techniciens de travailler ponctuellement 60 heures par semaine pour un chantier ?", "reponse": "Bonjour,\n\nJe vous transmets via le lien ci-après une fiche d'information reprenant la législation concernant :\nDurée du travail d'un salarié du secteur privé à temps plein âgé d’au moins 18 ans | Service Public\n\nSi vous justifiez de circonstances exceptionnelles entrainant un surcroit extraordinaire de travail, la durée maximale sur une semaine (48 heures) peut être augmentée jusqu’à 60 heures maximum.\nPour cela, l'inspection du travail doit donner son accord (coordonnées des sections d'inspection du travail accessibles sur la cartographie via le lien suivant : Annuaire de l'inspection du travail en Normandie (arcgis.com)"}, {"id": "id_74", "question": "Je souhaite des renseignements sur les indemnités pour une visite médicale du travail prévue sur mon jour de repos. Que dois-je demander à mon employeur (heures supplémentaires, frais kilométriques, frais d’essence) ?", "reponse": "Madame, Monsieur,\n\nEn réponse à votre courriel, nous vous informons de ces dispositions du code du travail :\n\nArticle R4624-39Version en vigueur depuis le 28 avril 2022\nLe temps nécessité par les visites et les examens médicaux, y compris les examens complémentaires, est soit pris sur les heures de travail des travailleurs sans qu'aucune retenue de salaire puisse être opérée, soit rémunéré comme temps de travail effectif lorsque ces examens ne peuvent avoir lieu pendant les heures de travail.\n\nLe temps et les frais de transport nécessités par ces visites et ces examens sont pris en charge par l'employeur.\n\n\nCordialement."}, {"id": "id_75", "question": "Je souhaite des renseignements sur les indemnités pour une visite médicale du travail prévue sur mon jour de repos. Que dois-je demander à mon employeur (heures supplémentaires, frais kilométriques, frais d’essence) ?", "reponse": "Madame,\n\nle temps passé à la médecine du travail est considéré comme du temps de travail effectif et donc de ce fait payé.\nDe même, les frais de transport sont pris en charge par l'entreprise.\n\n\n97\n\nPrise en charge par l'employeur du temps passé au service de santé et des frais de transport\nLe temps nécessité par les visites et examens médicaux, y compris les examens complémentaires est soit pris sur les heures de travail des salariés sans qu'il puisse pour cela être effectué une retenue de salaire, soit rémunéré comme temps de travail normal lorsque ces examens ne peuvent avoir lieu pendant les heures de travail.\nLes frais de transport nécessités par ces examens sont pris en charge par les employeurs.\nC. trav., art. R. 4624-39\n\nArt. R. 4624-39    (Décr. no 2016-1908 du 27 déc. 2016, art. 1er)  Le temps nécessité par les visites et les examens médicaux, y compris les examens complémentaires, est soit pris sur les heures de travail des travailleurs sans qu'aucune retenue de salaire puisse être opérée, soit rémunéré comme temps de travail effectif lorsque ces examens ne peuvent avoir lieu pendant les heures de travail.\nLe temps et les frais de transport nécessités par ces visites et ces examens sont pris en charge par l'employeur.\n\nCordialement"}, {"id": "id_76", "question": "Je souhaite des renseignements sur les indemnités pour une visite médicale du travail prévue sur mon jour de repos. Que dois-je demander à mon employeur (heures supplémentaires, frais kilométriques, frais d’essence) ?", "reponse": "Bonjour,\n\n\nPour faire suite à votre demande, et sous réserve de l'appréciation souveraine des juges du fond;\n\n\nAu regard des dispositions de l'article R. 4624-3 du Code du travail, le temps nécessité par les visites et les examens médicaux, y compris les examens complémentaires, est rémunéré comme du temps de travail effectif lorsque ces examens ne peuvent avoir lieu pendant les horaires de travail. Par ailleurs, les temps et les frais de transport nécessités par ces visites et examens sont pris en charge par l'employeur.\n\n\n\nRestant à votre disposition pour toutes informations supplémentaires.\n\n\nCordialement,"}, {"id": "id_77", "question": "Je souhaite des renseignements sur les indemnités pour une visite médicale du travail prévue sur mon jour de repos. Que dois-je demander à mon employeur (heures supplémentaires, frais kilométriques, frais d’essence) ?", "reponse": "Madame,\n\nLorsque la visite est organisée hors temps de travail, le temps passé pour la visite doit être considéré comme du temps de travail effectif.\nLes frais engagés doivent être indemnisés par l'employeur.\n\nhttps://www.service-public.gouv.fr/particuliers/vosdroits/F2211\n\nCordialement,"}, {"id": "id_78", "question": "Je souhaite des renseignements sur les indemnités pour une visite médicale du travail prévue sur mon jour de repos. Que dois-je demander à mon employeur (heures supplémentaires, frais kilométriques, frais d’essence) ?", "reponse": "Bonjour madame,\nLe temps pour la visite médicale du travail est assimilé à du temps de travail.\nLe temps nécessité par les visites, est soit pris sur les heures de travail sans qu'aucune retenue de salaire puisse être opérée,\nsoit rémunéré comme temps de travail effectif lorsque ces rendez-vous ne peuvent pas avoir lieu pendant les heures de travail.\nLe temps et les frais de transport sont pris en charge par l'employeur.\n(sous réserve de l'appréciation souveraine des tribunaux)\nCordialement.\n\nhttps://travail-emploi.gouv.fr/le-suivi-de-letat-de-sante-des-salaries"}, {"id": "id_79", "question": "Je souhaite des renseignements sur les indemnités pour une visite médicale du travail prévue sur mon jour de repos. Que dois-je demander à mon employeur (heures supplémentaires, frais kilométriques, frais d’essence) ?", "reponse": "Madame,\n\nSelon l’article R4624-39 du Code du travail, le temps passé aux visites médicales obligatoires est considéré comme du temps de travail effectif.\n\nSur un jour de repos, ce temps devient : des heures supplémentaires si vous êtes à temps complet, des heures complémentaires si vous êtes à temps partiel.\nCes heures doivent être majorées comme toute heure supplémentaire.\n\nArticle R4624-39\nLe temps nécessité par les visites et les examens médicaux, y compris les examens complémentaires, est soit pris sur les heures de travail des travailleurs sans qu'aucune retenue de salaire puisse être opérée, soit rémunéré comme temps de travail effectif lorsque ces examens ne peuvent avoir lieu pendant les heures de travail.\nLe temps et les frais de transport nécessités par ces visites et ces examens sont pris en charge par l'employeur.\n\nL’employeur doit donc prendre en charge les frais kilométriques, le carburant, les frais de transport nécessaires pour se rendre à la visite médicale.\n\nC’est une obligation légale : les frais engagés pour une visite médicale ne doivent pas rester à votre charge.\n\nCordialement"}, {"id": "id_80", "question": "Je souhaite des renseignements sur les indemnités pour une visite médicale du travail prévue sur mon jour de repos. Que dois-je demander à mon employeur (heures supplémentaires, frais kilométriques, frais d’essence) ?", "reponse": "Bonjour,\n\nSi votre visite médicale du travail est fixée sur un jour de repos, votre employeur vous devra en paiement le temps passé à la visite médicale obligatoire qui est considéré comme du temps de travail effectif.\nLes frais engagés pour vous rendre à la visite (essence) doivent être remboursés par l’employeur.\n\nRespectueusement,"}, {"id": "id_81", "question": "Je souhaite des renseignements sur les indemnités pour une visite médicale du travail prévue sur mon jour de repos. Que dois-je demander à mon employeur (heures supplémentaires, frais kilométriques, frais d’essence) ?", "reponse": "Bonjour,\n\nLe temps de la visite médicale est considéré comme du temps de travail effectif et doit être rémunéré comme tel. Le temps de transport et les frais engendrés sont également pris en charge par l'employeur.\n \nVous trouverez plus d'informations en suivant ce lien : https://www.service-public.gouv.fr/particuliers/vosdroits/F2211\n\nCordialement,"}, {"id": "id_82", "question": "Je souhaite des renseignements sur les indemnités pour une visite médicale du travail prévue sur mon jour de repos. Que dois-je demander à mon employeur (heures supplémentaires, frais kilométriques, frais d’essence) ?", "reponse": "Madame, Monsieur,\n\nPour faire suite à votre message du 5 décembre 2025, vous trouverez ci-après les éléments de réponse, sous réserve de l'appréciation souveraine des tribunaux.\n\nLes examens médicaux sont réalisés sur le temps de travail et la rémunération est maintenue.\n\nLorsque ces examens ne peuvent pas avoir lieu pendant les heures de travail, ils sont rémunérés comme du temps de travail effectif.\n\nLe temps et les frais de transport nécessités par ces visites sont pris en charge par l'employeur.\n\nCordialement,"}, {"id": "id_83", "question": "Je souhaite des renseignements sur les indemnités pour une visite médicale du travail prévue sur mon jour de repos. Que dois-je demander à mon employeur (heures supplémentaires, frais kilométriques, frais d’essence) ?", "reponse": "Bonjour,\n\nSuite à votre mail, j'ai l'honneur de vous apporter les éléments de réponse suivants.\n\nLes examens médicaux sont réalisés sur le temps de travail et la rémunération est maintenue.\n\nLorsque ces examens ne peuvent pas avoir lieu pendant les heures de travail, ils sont rémunérés comme du temps de travail effectif. Si cela engendre des heures supplémentaires, ces heures devront être indemnisées comme telles.\n\nLe temps et les frais de transport nécessités par ces visites sont pris en charge par l'employeur.\n\nVotre employeur doit également, dans votre cas, reporter votre jour de repos afin que vous puissiez en bénéficier.\n\nVous souhaitant bonne réception,\n\nCordialement,"}, {"id": "id_84", "question": "Je souhaite des renseignements sur les indemnités pour une visite médicale du travail prévue sur mon jour de repos. Que dois-je demander à mon employeur (heures supplémentaires, frais kilométriques, frais d’essence) ?", "reponse": "Bonjour,\n\nSuite à votre mail et sous réserve de l’appréciation souveraine des tribunaux, veuillez trouver les éléments de réponse suivants basés sur la législation en vigueur :\n\nVous trouvez sur la fiche issue du service public la réponse à votre question (les textes figurent en bas de cette fiche) : Médecine du travail pour un salarié du secteur privé | Service Public\n\n\nExtrait :\n\n\n\n« Le temps consacré aux visites et examens médicaux, y compris les examens complémentaires, est :\n\nSoit pris sur les heures de travail. Dans ce cas, le salarié est payé comme s'il avait travaillé.\n\nSoit rémunéré comme du temps de travail effectif lorsque ces examens ne peuvent pas avoir lieu pendant les heures de travail.\n\nLe temps de transport et les frais rendus nécessaires pour ces visites et examens sont pris en charge par l'employeur. »\n\n\n\n\nCordialement,"}, {"id": "id_85", "question": "Je souhaite des renseignements sur les indemnités pour une visite médicale du travail prévue sur mon jour de repos. Que dois-je demander à mon employeur (heures s
