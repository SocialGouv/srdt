ur n'a pas l'obligation d'envoyer les documents de fin de contrat au salarié.\n\n=> Jurisprudence :\nLe certificat de travail est « quérable et non portable » (Cass. soc., 26 mars 2014, nº 12-27.028). La seule obligation de l’employeur est de le tenir à disposition du salarié et de l’en informer (Cass. soc., 5 oct. 2004, nº 02-44.487). Le salarié ne peut exiger que le certificat lui soit envoyé à son domicile, notamment lorsqu’il ne démontre pas qu’il a été dans l’impossibilité médicale de venir le retirer (Cass. soc., 1er juill. 2015, nº 13-26.850).\n\n\nEn résumé, nous vous invitons à envoyer à votre ancien employeur un courrier recommandé avec accusé de réception pour lui rappeler ses obligations et lui réclamer les documents de fin de contrat.\nEt ce, en fixant un délai de réponse que vous déterminerez (par exemple, 8 jours).\n\nA défaut de régularisation de sa part dans ce délai fixé, vous serez en droit de saisir le Conseil de Prud'hommes (seul compétent pour trancher ce litige).\nPour cela, veuillez trouver en pièces jointes le cerfa de saisine, sa notice explicative ainsi que la liste des défenseurs syndicaux qui pourront vous assister gratuitement dans cette démarche.\n\n\n\nPour plus de détails, nous vous invitons à cliquer sur le(s) lien(s) suivant(s) :\n    => Solde de tout compte - Code du travail numérique\n\n\n\n\nTous ces éléments sont donnés sous réserve de l'appréciation souveraine des juges du fond.\n\n\nVeuillez agréer, Monsieur, l'expression de nos salutations distinguées."}, {"id": "id_191", "question": "J’ai effectué un remplacement en CDD dans une micro-crèche, fini le 22 septembre 2025, et je n’ai toujours pas reçu mon salaire malgré relances. Est-elle en droit de me faire patienter ? Quels sont les délais ?", "reponse": "Bonjour,\n\nL'employeur n'est pas en droit de retarder le paiement de votre salaire. Le Code du travail et la jurisprudence imposent des délais pour le versement des salaires (une fois par mois, à date fixe) et du solde de tout compte à la fin du contrat (délai \"raisonnable\").\n\n​Le salaire doit donc être payé au moins mensuellement et, à la fin d'un CDD, le solde de tout compte (incluant salaire restant dû, indemnité de fin de contrat et solde des congés payés) doit être versé dès la cessation effective du contrat. un délai de quelques jours peut être toléré, mais il ne peut en aucun cas être de plus de deux mois.\n\nEn cas de retard, il est conseillé d’envoyer une mise en demeure à l'employeur par lettre recommandée avec accusé de réception exigeant le paiement des sommes dues, en précisant un délai de réponse attendue. En l'absence de réponse favorable, vous pouvez saisir le conseil de prud'hommes (CPH) afin de faire valoir vos droits.\n\nCes éléments vous sont donnés sous réserve de l’appréciation souveraine des juridictions compétentes.\n\nJe reste à votre disposition pour toute précision,\n\nRespectueusement,\n​"}, {"id": "id_192", "question": "J’ai effectué un remplacement en CDD dans une micro-crèche, fini le 22 septembre 2025, et je n’ai toujours pas reçu mon salaire malgré relances. Est-elle en droit de me faire patienter ? Quels sont les délais ?", "reponse": "Monsieur,\n\nJ'ai bien reçu votre message du 16/01/2026.\nVous m'interrogez au sujet des documents de fin de contrat. Compte tenu des éléments que vous portez à ma connaissance et sous réserve de l'appréciation souveraine des tribunaux, voici ma réponse:\n\nL'employeur doit tenir à la disposition du salarié les documents de fin de contrat dés la fin du contrat de travail.\nCes documents sont quérables, c'est-à-dire que l'employeur doit les tenir à la disposition du salarié dans l'entreprise.\nCode du travail : article L1234-19 Certificat de travail\n\nCode du travail : article L1234-20 Solde de tout compte\n\nCode du travail : articles R1234-5-1 à R1234-12 Documents à remettre par l'employeur\n\nCode du travail : article R1238-3 Dispositions pénales\n\nEn cas de litige, il vous appartiendra de saisir le Conseil de Prud'hommes territorialement compétent.\n\nCordialement"}, {"id": "id_193", "question": "J’ai effectué un remplacement en CDD dans une micro-crèche, fini le 22 septembre 2025, et je n’ai toujours pas reçu mon salaire malgré relances. Est-elle en droit de me faire patienter ? Quels sont les délais ?", "reponse": "Bonjour monsieur,\n\nVous trouverez ci-après les éléments de réponse à votre mail sous réserve de l'appréciation souveraine des tribunaux.\n\nLe paiement de la rémunération est effectué une fois par mois. (article L 3242-1 du code du travail)\n\nEn l'absence de rémunération, vous pouvez adresser un courrier en recommandé avec accusé de réception à votre employeur pour réclamer le paiement des sommes dues, en donnant un délai fixe, et en précisant que vous adressez copie à l'inspection du travail.\n\nEn l'absence de régularisation de la situation, vous avez la possibilité de saisir le Conseil des Prudhommes, en référé, pour non paiement de salaires et demander des dommages et intérêts pour le préjudice subi (par exemple : agios de banque).\n\nVous pouvez contacter un défenseur syndical qui pourra vous aider dans votre démarche prudhommale. Les défenseurs syndicaux sont habilités par arrêté préfectoral pour accompagner les salariés, c'est un service gratuit et vous n'avez pas à adhérer au syndicat. Vous trouverez ci-dessous le lien permettant d'accéder à la liste des défenseurs syndicaux de la région Nouvelle-Aquitaine en PJ.\n\nhttps://nouvelle-aquitaine.dreets.gouv.fr/sites/nouvelle-aquitaine.dreets.gouv.fr/IMG/pdf/2025-t-na-19_arrete_juillet_2025_designation_des_defenseurs_syndicaux_pour_la_region_na.pdf\n\nCordialement."}, {"id": "id_194", "question": "J’ai effectué un remplacement en CDD dans une micro-crèche, fini le 22 septembre 2025, et je n’ai toujours pas reçu mon salaire malgré relances. Est-elle en droit de me faire patienter ? Quels sont les délais ?", "reponse": "Bonjour,\n\nPour faire suite à votre demande, veuillez trouver en suivant quelques éléments de réponse :\n\nhttps://code.travail.gouv.fr/fiche-service-public/paiement-du-salaire\n\nL’employeur doit verser un salaire au salarié en contrepartie du travail fourni. Le salaire doit être versé régulièrement. Des dispositions particulières s'appliquent en cas de retard ou de non-paiement du salaire. Des règles spécifiques existent pour les salariés non mensualisés en raison de la nature de leur emploi.\n\n[capture d'écran]\n\n\nEn cas de retard ou de non-paiement du salaire, le salarié peut adresser un courrier à son employeur (avec RAR de préférence pour éviter tout litige de réception), exigeant le paiement de son salaire.\n\nUn modèle de lettre est disponible :\n\nDemande de paiement de salaire en cas de non-paiement\nLe salarié peut également s’adresser au conseil de prud'hommes (CPH) pour obtenir le paiement de la somme réclamée.\n\nLe salarié dispose d'un délai de 3 ans pour effectuer cette demande, à compter du jour où il aurait dû être payé.\n\nÀ savoir\nQuand une entreprise est en difficulté financière et qu'une procédure de sauvegarde, de redressement ou de liquidation judiciaire est ouverte, tout salarié (même s'il travaille à l'étranger) bénéficie de la garantie de paiement des salaires.\n\n\nSi l'employeur ne paie pas au salarié son salaire ou ne le paie qu'en partie ou avec retard, il commet une infraction pénale.\n\nL'employeur peut alors être condamné à payer jusqu'à 2 250 € d'amende.\n\nLe conseil de prud'hommes (CPH) peut ordonner à l'employeur, éventuellement sous astreinte, de verser les sommes dues au salarié.\n\nDes dommages et intérêts peuvent être versés au salarié.\n\nLe CPH peut aussi prononcer la rupture du contrat de travail du salarié pour non-paiement du salaire à la charge de l'employeur. Dans ce cas, le salarié peut percevoir les indemnités prévues en cas de licenciement sans cause réelle et sérieuse.\n\n\nCordialement"}, {"id": "id_195", "question": "J’ai effectué un remplacement en CDD dans une micro-crèche, fini le 22 septembre 2025, et je n’ai toujours pas reçu mon salaire malgré relances. Est-elle en droit de me faire patienter ? Quels sont les délais ?", "reponse": "Bonjour,\n\nÀ la fin d’un CDD, l’employeur doit vous verser :\n- votre salaire pour la période travaillée.\n- les indemnités de fin de contrat (prime de précarité, indemnité compensatrice de congés payés).\nLe paiement doit intervenir immédiatement à l’échéance normale. L’employeur n’a pas là vous « faire patienter » au-delà.\n\nVous devez réclamer devant le conseil des prud'hommes d’Angoulême en référé ( palais de justice place Francis Louvel-0545371170) :\n- le paiement immédiat des sommes dues.\n- des intérêts de retard.\n- des dommages-intérêts si vous prouvez un préjudice (ex. frais bancaires).\n\nSi ce n'est pas encore fait,au préalable vous devez adresser à votre ancien employeur un courrier en RAR pour exiger la régularisation de votre salaire dû en lui fixant un délai pour régulariser.Si le paiement n’intervient pas rapidement,  alors vous saisirez le conseil de prud’hommes en référé.\n\nRespectueusement,"}, {"id": "id_196", "question": "J’ai effectué un remplacement en CDD dans une micro-crèche, fini le 22 septembre 2025, et je n’ai toujours pas reçu mon salaire malgré relances. Est-elle en droit de me faire patienter ? Quels sont les délais ?", "reponse": "Bonjour,\n\nEn cas de non-paiement du salaire à la date habituelle de versement du salaire, il faut le réclamer par courrier Recommandé AR à votre employeur. Vous pouvez mettre en copie l'Inspection du Travail .\n\nL'inspection du Travail  est joignable selon le secteur géographique de l'entreprise à l'une des 2  adresses suivantes:\nddets-uc1@charente-maritime.gouv.fr\nddets-uc2@charente-maritime.gouv.fr\n\nVous avez un modèle de demande de paiement de salaire sur ce site ( utilisez de préférence le moteur de recherche Google Chrome ou Mozilla): https://code.travail.gouv.fr/modeles-de-courriers/demande-de-paiement-de-salaire\n\nEn cas de non régularisation par l'employeur, il conviendra de saisir le Conseil des Prudhommes lors d'une procédure de référé ( urgence). Vous avez le dossier de saisie ( requête) et la notice. La procédure est gratuite, vous n'avez pas besoin d'un avocat en 1er instance.\n\nLa Procédure de résiliation judiciaire du contrat de travail aux tords de l'employeur  en cas de non paiement répété de salaire est décrite sur ce lien : https://www.service-public.fr/particuliers/vosdroits/F24410\n\nAttention, avant d'engager une procédure de résiliation judiciaire, il convient de vous renseigner auprès du tribunal de commerce afin de vérifier si une procédure collective est déclarée ( redressement judiciaire...). Dans ce cadre, vous bénéficiez d'une garantie de paiement de salaire pris en charge par l'AGS.\n\n\n\nBien cordialement,"}, {"id": "id_197", "question": "J’ai effectué un remplacement en CDD dans une micro-crèche, fini le 22 septembre 2025, et je n’ai toujours pas reçu mon salaire malgré relances. Est-elle en droit de me faire patienter ? Quels sont les délais ?", "reponse": "Monsieur,\n\nPour faire suite à votre interrogation, j'ai l'honneur de porter à votre connaissance les observations suivantes :\n\n1-En application de l'article L 3242-1 du Code du travail, le paiement du salaire est mensuel. Il est versé une fois par mois. Ainsi, votre employeur, dès lors que vous êtes mensualisé, doit régler votre salaire le dernier jour du mois travaillé (ou dans les 5 jours du mois suivant les usages ou les conventions collectives).\nDans votre cas, votre contrat s'étant terminé le 22 septembre, vous auriez dû être rémunéré immédiatement ou dans un délai raisonnable (article L 3242-3 du Code du travail).\n\n2-Vous indiquez avoir effectué des relances. Il doit s'agir d'une lettre recommandée avec accusé de réception. Si tel n'a pas été le cas, vous devez adresser une mise en demeure de régulariser sous les 8 jours en faisant référence à vos précédentes relances (téléphoniques, SMS par exemple).\n\n3-En l'absence de régularisation, il vous reviendra de saisir le conseil des prud'hommes par voie de requête lettre libre ou cliquant sur le lien suivant tout en sollicitant des dommages et intérêts :\n\nhttps://www.service-public.gouv.fr/simulateur/calcul/15586\n\nBien cordialement"}, {"id": "id_198", "question": "J’ai effectué un remplacement en CDD dans une micro-crèche, fini le 22 septembre 2025, et je n’ai toujours pas reçu mon salaire malgré relances. Est-elle en droit de me faire patienter ? Quels sont les délais ?", "reponse": "Monsieur,\n\nLe paiement du salaire doit s'effectuer une fois par mois. En effet, l'employeur est dans l'obligation de payer le salarié à chaque mois et à la même période (le plus souvent, soit en fin de mois, soit au début du mois suivant).\n\nS'il ne le fait pas, l'employeur s'expose à une condamnation à payer jusqu'à 2 250 € d'amende (article R.3246-1 du code du travail).\n\nVous pouvez adresser un courrier à votre employeur, exigeant le paiement de la somme : https://code.travail.gouv.fr/modeles-de-courriers/demande-de-paiement-de-salaire\n\nVous pouvez également vous adresser au conseil des Prud'hommes pour obtenir le paiement de la somme réclamée.\n\nVous bénéficiez d'un délai de 3 ans pour effectuer cette demande, à compter du jour où vous auriez dû être payé.\n\nCordialement,"}, {"id": "id_199", "question": "J’ai effectué un remplacement en CDD dans une micro-crèche, fini le 22 septembre 2025, et je n’ai toujours pas reçu mon salaire malgré relances. Est-elle en droit de me faire patienter ? Quels sont les délais ?", "reponse": "Monsieur,\n\nIl convient d'effectuer une mise en demeure par courrier recommandé avec accusé de réception pour obtenir la régularisation du paiement de votre salaire. Vous trouverez ci-joint un modèle de courrier pour vous aider dans la rédaction. Si vous m'indiquez la commune où se situe l'entreprise je peux vous communiquer les coordonnées de l'inspecteur du travail compétent afin que vous puissiez lui transmettre la copie du courrier et solliciter une intervention de sa part.\n\nSans régularisation de la part de l'employeur sous huitaine,  il vous faudra saisir le conseil de prud'hommes. Vous trouverez ci-joint les documents nécessaires pour la saisine du tribunal.\n\nCordialement,"}, {"id": "id_200", "question": "J’ai effectué un remplacement en CDD dans une micro-crèche, fini le 22 septembre 2025, et je n’ai toujours pas reçu mon salaire malgré relances. Est-elle en droit de me faire patienter ? Quels sont les délais ?", "reponse": "Monsieur,\n\nJe vous transmets via les liens ci-après une fiche d'information reprenant la règlementation concernant :\n- Solde de tout compte | Entreprendre.Service-Public.fr)\n- Fin de contrat : documents à remettre au salarié | Service Public\nainsi que : Modèle de lettre : Réclamation des documents de fin de contrat - Code du travail numérique\n\nL'article L. 1222-1 du code du travail dispose que : \"Le contrat de travail est exécuté de bonne foi.\"\nSi ce n'est pas le cas, le Conseil de prud'hommes* est la juridiction compétente qui règle les litiges individuels entre employeur et salarié survenus à l'occasion de tout contrat de travail.\n\n*la saisine du Conseil des prud'hommes (juridiction compétente pour le règlement des litiges) :\n                - https://travail-emploi.gouv.fr/droit-du-travail/le-reglement-des-conflits-individuels-et-collectifs/article/le-conseil-de-prud-hommes\n                - https://www.service-public.fr/particuliers/vosdroits/R45128\n                - https://normandie.dreets.gouv.fr/Les-defenseurs-syndicaux-modification-de-la-liste-pour-la-Normandie (défenseur syndical)"}, {"id": "id_201", "question": "J’ai effectué un remplacement en CDD dans une micro-crèche, fini le 22 septembre 2025, et je n’ai toujours pas reçu mon salaire malgré relances. Est-elle en droit de me faire patienter ? Quels sont les délais ?", "reponse": "Bonjour,\nNos services ne répondent pas aux demandes anonymes. Vous veillerez à l'avenir à transmettre vos coordonnées, à défaut aucune réponse ne vous sera donnée.\nExceptionnellement toutefois, sous réserve que la gestion de la micro-crèche dans laquelle vous avez travaillé ne soit pas assurée par une collectivité publique, je vous précise que si votre contrat à durée déterminée est arrivé à échéance l’employeur doit vous délivrer le salaire du dernier mois de travail et les documents de fin d'emploi.\nLes textes ne fixent pas de délai légal pour la remise des documents par l'employeur.\nLe code du travail prévoit en son article R1234-9 pour ce qui concerne l'attestation France travail que c'est \"au moment de l'expiration ou de la rupture du contrat de travail\" que ce document est remis ; Aussi, pour ce qui concerne le certificat de travail l'article L1234-19  indique que c'est \"A l'expiration du contrat de travail\" qu'il est délivré, et enfin  l'article L1234-20  dispose que c'est \"lors de la rupture du contrat de travail\" que doit être établi le reçu pour solde de tout compte.\nAinsi, sous réserve de l’appréciation souveraine des tribunaux, l'employeur doit tenir à la disposition du salarié l’ensemble des documents de fin d'emploi dès la fin du contrat de travail.\nJe vous précise que ces documents sont quérables et non portables, ce qui signifie que c’est au salarié à se déplacer pour les récupérer. Il est donc préconisé de convenir d'un rendez-vous avec son employeur. Celui-ci n’a pas l’obligation de les envoyer par courrier.\nEn cas de non délivrance dans un délai raisonnable d'établissement de ces documents et après avoir mis en demeure son employeur de remplir ses obligations par lettre recommandée avec accusé de réception le salarié est en droit d'engager une action en justice devant le conseil de prud'hommes pour obtenir le paiement du salaire dû ainsi que des dommages et intérêts.\nCordialement"}, {"id": "id_202", "question": "J’ai effectué un remplacement en CDD dans une micro-crèche, fini le 22 septembre 2025, et je n’ai toujours pas reçu mon salaire malgré relances. Est-elle en droit de me faire patienter ? Quels sont les délais ?", "reponse": "Bonjour Monsieur,\n\nVotre demande de renseignement porte sur le non paiement du salaire.\n\nAu vu des éléments que vous portez à ma connaissance, sous réserve de l'appréciation souveraine des tribunaux, voici ma réponse.\n\nLa règle est que les salaires doivent être versés au minimum une fois par mois pour les salariés mensualisés. C. trav., art. L. 3242-1\nLa règle du paiement périodique du salaire est considérée comme une règle d'ordre public : il n'est pas possible d'y déroger, même par accord entre l'employeur et le salarié.\n\nLors du paiement de la rémunération l'employeur doit remettre une « pièce justificative » dite bulletin de paie.    C. trav., art. L. 3243-2\nLes dispositions légales relatives au bulletin de paie s'appliquent à toutes les personnes, salariées ou travaillant à quelque titre ou en quelque lieu que ce soit, pour un ou plusieurs employeurs, et quels que soient le montant et la nature de leur rémunération, la forme, la nature ou la validité de leur contrat.    C. trav., art. L. 3243-1\n\nJe vous invite à mettre votre employeur en demeure, par courrier en LR/AR, de lui verser vos salaires, conformément au code du travail.\nS'il ne le fait pas, vous pourrez vous adresser au conseil des prud'hommes territorialement compétent avec la possibilité de se faire assister, soit par un avocat, soit par la protection juridique de son assurance maison, voiture ou téléphone, soit par un défenseur syndical de la région des Hauts de France  :   https://hauts-de-france.dreets.gouv.fr/Les-defenseurs-syndicaux-des-Hauts-de-France\n\nBien cordialement"}, {"id": "id_203", "question": "J’ai effectué un remplacement en CDD dans une micro-crèche, fini le 22 septembre 2025, et je n’ai toujours pas reçu mon salaire malgré relances. Est-elle en droit de me faire patienter ? Quels sont les délais ?", "reponse": "Bonjour,\n\nCompte-tenu des informations et éléments que vous me communiquez, et sous réserve de l’appréciation souveraine des tribunaux, je suis en mesure de vous apporter les éléments de réponse suivants, basée sur la législation en vigueur :\n\n\n\nVotre contrat s’est terminé le 22 septembre 2025. L'employeur doit remettre au salarié le reçu pour solde de tout compte à la fin de son contrat de travail et les documents de fin de contrat.\n\nA l’échéance du contrat, l’employeur doit verser l’ensemble des sommes qui restent dues au salarié Ce versement est accompagné du reçu pour solde de tout compte qui fait l’inventaire des sommes versées( article L1234-20 du code du travail )\n\nVous pouvez réclamer à votre employeur en LRAR la mise à disposition de ces documents et de votre solde de tout compte . Ci joint un modèle de courrier disponible sur le site officiel www.code.travail.gouv.fr\n\nPour saisir le Conseil des Prudhommes ( https://www.justice.fr/notice/idtdb248-saisir-conseil-prud-hommes) et constituer votre dossier , vous pouvez vous défendre seul ou vous faire aider et/ou représenter par un défenseur syndical , un avocat de votre choix ou par le biais de votre assurance protection juridique\nLa DREETS des HAUTS DE FRANCE a mis en ligne la liste des défenseurs syndicaux : https://hauts-de-france.dreets.gouv.fr/Les-defenseurs-syndicaux-des-Hauts-de-France\nCes défenseurs peuvent vous aider dans votre démarche judiciaire. Ils interviennent à titre gratuit.\n\nCordialement"}, {"id": "id_204", "question": "J’ai effectué un remplacement en CDD dans une micro-crèche, fini le 22 septembre 2025, et je n’ai toujours pas reçu mon salaire malgré relances. Est-elle en droit de me faire patienter ? Quels sont les délais ?", "reponse": "Bonjour,\n\nJe peux intervenir auprès de votre ex employeur pour qu'il vous rémunère, mais je suis liée par une obligation de garder confidentielle les plaintes reçues par mon service et il vous faut au préalable lever la confidentialité des plaintes en effectuant la démarche suivante :\n\n1- adresser un mail à votre employeur pour lui réclamer votre salaire.\n2- dans ce mail écrire \"copie à l'inspection du travail pour intervention\"\n3- me mettre en copie (non cachée) de votre mail en précisant le numéro de téléphone et le nom de votre employeur, le numéro de Siret, l'adresse postale de la Crèche.\n\nDans l'attente de votre retour.\n\nCordialement."}, {"id": "id_205", "question": "J’ai effectué un remplacement en CDD dans une micro-crèche, fini le 22 septembre 2025, et je n’ai toujours pas reçu mon salaire malgré relances. Est-elle en droit de me faire patienter ? Quels sont les délais ?", "reponse": "Bonjour,\n\nLe certificat de travail et l'attestation France Travail doivent être mis à disposition du salarié sans délai après la rupture du contrat.\n\nConcernant le solde de tout compte, il est mis à disposition au plus tard à la date habituelle de paiement du salaire suivant la rupture du contrat. Cela signifie que le solde de tout compte peut être remis à la date habituelle de paiement du salaire postérieure à la date de rupture du contrat\n\nSi l'employeur n'a pas mis à disposition du salarié les documents dans les délais mentionnés ci-dessus, le salarié doit effectuer une réclamation en LR/AR auprès de son employeur.\nA défaut de réponse de sa part, la procédure de recours consiste en principe en la saisine du Conseil des Prudhommes:\n\nhttps://www.service-public.fr/particuliers/vosdroits/F2360\n\nCordialement,"}, {"id": "id_206", "question": "\"Ma fille, réceptionniste dans un hôtel, fait face à un manque de personnel. Une personne est partie en septembre, une autre partira en décembre. L’hôtel est en vente. Combien d’heures supplémentaires peut-elle accepter par semaine, mois, et année sans sacrifier sa vie personnelle ? \n\nConvention collective : hôtellerie.\"", "reponse": "Monsieur Mercier,\n\nVous souhaitez des renseignements sur la durée du travail pour votre fille qui travaille dans l'hôtellerie.\n\nSous réserve de l'appréciation souveraine des tribunaux, voici ma réponse.\n\nLa Convention Collective Nationale des Hôtels, Cafés, Restaurants stipule ceci au sujet de la durée du travail  :\n\nDurée conventionnelle\nDurée hebdomadaire conventionnelle\nfixée à 39 heures pour toutes les entreprises avec possibilité de retenir une durée inférieure. Les entreprises appliquant à la date de l'avenant n° 2 une durée collective inférieure à 39 heures restent soumises à cette durée.\nDurée maximale hebdomadaire\nDurée maximale sur une période de 12 semaines consécutives.................................................46 heures\nDurée maximale absolue.............................................................................................................48 heures\nDurée maximale quotidienne\nPersonnel administratif hors site d'exploitation....................................10 h 00\nCuisinier..................................................................................................11 h 00\nAutre personnel.....................................................................................11 h 30\nPersonnel de réception..........................................................................12 h 00\n\nRepos\nRepos hebdomadaire\na)  Principe général  :  2 jours consécutifs ou non par semaine. En cas de fractionnement, toute demi-journée travaillée ne peut excéder 5 heures consécutives avec une amplitude maximale de 6 heures. Tout jour de repos isolé donne lieu à une interruption de 35 heures consécutives entre 2 journées de travail.\nb)  Établissements permanents  :\nPour tous les salariés autres que les saisonniers  :\n-    1,5 jour attribué comme suit  :  soit 1,5 jour consécutif, soit 1 jour une semaine et 2 jours (non obligatoirement consécutifs) la semaine suivante, soit 1 jour une semaine et la demi-journée non consécutive, soit 1 jour dans la semaine et la demi-journée cumulable sans que le cumul dépasse 6 jours ;\n-    la demi-journée supplémentaire peut être différée et reportée à raison de 2 jours par mois. Le repos non pris peut être compensé en temps (par journée entière ou demi-journée) ou, en cas d'impératif de service, en rémunération à la fin de l'année suivant l'ouverture du droit à repos pour les établissements de 10 salariés au plus, à la fin des 6 mois suivant l'ouverture du droit à repos pour les établissements de plus de 10 salariés.\n\nRepos journalier\nfixé à 11 heures consécutives (12 heures pour les jeunes de moins de 18 ans), pouvant être abaissé à 10 heures pour les catégories suivantes de travailleurs sous réserve qu'ils soient logés par l'employeur ou qu'ils résident dans un périmètre entraînant un trajet aller et retour de moins de 1/2 heure :\n-    saisonniers (de plus de 18 ans) des établissements permanents ou saisonniers ;\n-    salariés (de plus de 18 ans) des établissements des communes bénéficiant d'un fonds d'action locale touristique (ou qui ont été désignées par la commission décentralisée).\nEn contrepartie, ces salariés bénéficient d'un repos compensateur de 20 minutes à chaque dérogation, cumulable et à prendre en temps dans le mois suivant ou en rémunération.\nLorsque, dans une même semaine, l'employeur a dérogé 3 fois à la durée du repos journalier, il ne peut user de la possibilité de suspendre en totalité le repos hebdomadaire.\nLa durée durant laquelle les employeurs peuvent recourir à la dérogation doit être fixée par commission paritaire.\n\nArt. 21-3, 21-4 et 22-2\n\n\n\nHeures supplémentaires\nPaiement  :  majoration fixée à 10 % pour les heures effectuées entre la 36e et la 39e heure, 20 % pour celles effectuées entre la 40e et la 43e heure et 50 % à partir de la 44e heure.\nPaiement des heures supplémentaires et des majorations afférentes pouvant être remplacé en tout ou partie par un repos compensateur. Repos à prendre à l'intérieur d'une période de 12 mois consécutifs (ou de 52 semaines).\nPour les salariés rémunérés au pourcentage service, l'employeur doit ajouter au pourcentage service le paiement des majorations visées ci-avant au titre des heures supplémentaires effectuées.\nremarque  :  la rémunération ainsi composée doit être au moins égale au salaire minimum de référence dû en application de la grille de salaires et en raison de la durée de travail effectuée, augmenté des majorations afférentes aux heures supplémentaires.\nContingent d'heures supplémentaires  :  fixé à 360 heures par an dans les établissements permanents et à 90 heures par trimestre civil dans les établissements saisonniers.\nContingent fixé à 130 heures par an en cas de modulation de forte amplitude.\n\nArt. 21-5 modifié par avenant n° 2 du 5-2-2007 étendu par arrêté du 26-3-2007, JO 29-3-2007, applicable à compter du 1-4-2007 (1er jour du mois suivant sa publication au JO)\nAvenant n° 19 du 29-9-2014 étendu par arrêté du 29-2-2016, JO 8-3-2016, applicable à compter de sa date de signature\n\n\nVous lirez les fiches pratiques en droit du travail relatives aux heures supplémentaires en cliquant sur ces liens  :\n\nhttps://travail-emploi.gouv.fr/les-heures-supplementaires-definition-et-limites\n\nhttps://travail-emploi.gouv.fr/les-heures-supplementaires-contreparties\n\n\nBien cordialement"}, {"id": "id_207", "question": "\"Ma fille, réceptionniste dans un hôtel, fait face à un manque de personnel. Une personne est partie en septembre, une autre partira en décembre. L’hôtel est en vente. Combien d’heures supplémentaires peut-elle accepter par semaine, mois, et année sans sacrifier sa vie personnelle ? \n\nConvention collective : hôtellerie.\"", "reponse": "Bonjour,\n\nSuite à votre mail et sous réserve de l’appréciation souveraine des tribunaux, veuillez trouver les éléments de réponse suivants basés sur la législation en vigueur :\n\nVous trouverez en pièce jointe les articles de la Convention collective Hôtel Café Restaurant encadrant les durées maximales de travail dans ce secteur.\n\nAutres liens\n\nCode du travail numérique :\n\nConvention collective : Hôtels, cafés, restaurants - Code du travail numérique\n\nDREETS Occitanie a édité un livret :\n\nhcr-2.pdf\n\nCordialement,"}, {"id": "id_208", "question": "\"Ma fille, réceptionniste dans un hôtel, fait face à un manque de personnel. Une personne est partie en septembre, une autre partira en décembre. L’hôtel est en vente. Combien d’heures supplémentaires peut-elle accepter par semaine, mois, et année sans sacrifier sa vie personnelle ? \n\nConvention collective : hôtellerie.\"", "reponse": "Monsieur,\n\nLa convention collective : Hôtel, cafés, restaurants est accessible via le lien suivant :\nConvention collective : Hôtels, cafés, restaurants - Code du travail numérique\n\nLes heures supplémentaires sont les heures de travail effectif accomplies au-delà de 35 heures par semaine par un salarié à temps plein.\nEn contrepartie de ces heures, le salarié peut percevoir :\n-Une majoration de salaire\n- Et / ou un repos compensateur de remplacement\n\nL’accomplissement d’heures supplémentaires est soumis à une limite annuelle appelée le contingent.\n\nSous certaines conditions, ce contingent peut être dépassé. Dans ce cas, le salarié bénéficie, en plus des contreparties énoncées ci-dessus, d’un repos obligatoire.\nLa convention collective des hôtels, cafés et restaurants prévoit les contreparties suivantes et fixe le contingent à 360 heures par an dans les établissements permanents et à 90 heures par trimestre civil dans les établissements saisonniers.\n\nSauf accord d’entreprise ou décision unilatérale en l’absence de délégué syndical et d’opposition du CSE, l’employeur peut appliquer l’une des contreparties suivantes prévues par la convention de branche :\n\nMajoration de salaire \n\nOU\n\nRepos compensateur de remplacement \n\nOU\n\nMajoration de salaire + Repos compensateur de remplacement\n\nÀ partir de la 36ème à la 39ème heure incluse\n\n10 % de majoration de salaire \n\n1 h 06 minutes de repos compensateur de remplacement\n\nune partie en majoration de  salaire ;\n\net, une partie en repos compensateur \n\nÀ partir de la 40ème à la 43ème heure incluse\n\n20 % de majoration de salaire \n\n1 h 12 minutes de repos compensateur de remplacement\n\nÀ partir de la 44ème heure\n\n50 % de majoration de salaire \n\n1 h 30 minutes de repos compensateur de remplacement\n\nL'article L. 1222-1 du code du travail dispose que : \"Le contrat de travail est exécuté de bonne foi.\"\nSi ce n'est pas le cas, le Conseil de prud'hommes* est la juridiction compétente qui règle les litiges individuels entre employeur et salarié survenus à l'occasion de tout contrat de travail.\nLorsqu'ils ont subi un préjudice du fait du non-respect par l'employeur des dispositions légales, réglementaires ou conventionnelles, les salariés peuvent prétendre à l'attribution de dommages et intérêts. L'employeur ne peut invoquer le fait que les salariés concernés n'avaient pas contesté l'infraction. (♦Cass. soc., 29 janv. 1981, n° 79-41.406)\n\n*la saisine du Conseil des prud'hommes (juridiction compétente pour le règlement des litiges) :\n                - https://travail-emploi.gouv.fr/droit-du-travail/le-reglement-des-conflits-individuels-et-collectifs/article/le-conseil-de-prud-hommes\n                - https://www.service-public.fr/particuliers/vosdroits/R45128\n                - https://normandie.dreets.gouv.fr/Les-defenseurs-syndicaux-modification-de-la-liste-pour-la-Normandie (défenseur syndical)"}, {"id": "id_209", "question": "\"Ma fille, réceptionniste dans un hôtel, fait face à un manque de personnel. Une personne est partie en septembre, une autre partira en décembre. L’hôtel est en vente. Combien d’heures supplémentaires peut-elle accepter par semaine, mois, et année sans sacrifier sa vie personnelle ? \n\nConvention collective : hôtellerie.\"", "reponse": "Bonjour,\n\n\nPour faire suite à votre demande, et sous réserve de l'appréciation souveraine des juges du fond;\n\n\nSi vous n'avez pas d'aménagement du temps de travail, ou de convention de forfaits :\n\n1 :  Durées maximales : (Avenant n°2 du 05/02/2007)\n\nDans la convention collective \"Hôtels, cafés, restaurants\" (IDCC 1979), la durée maximale hebdomadaire est de 46 heures sur 12 semaine consécutives. La durée maximale absolue sur une semaine est de 48 heures.\n\nLa durée maximale quotidienne pour un personnel de réception est de 12h.\n\n\n2 : Repos légal :  (Titre VI, art. 21.3)\n\n\nL'employeur peut vous demander d'effectuer des heures supplémentaires mais il doit veiller au respect de votre repos quotidien et hebdomadaire.\n\nAinsi, le repos journalier doit être de 11 heures consécutives minimum. Il peut être abaissé à 10 heures consécutives si le salarié travaille dans un établissement d'une commune. En contrepartie, les salariés bénéficient d'un repos compensateur de 20 minutes à chaque dérogation, cumulable et à prendre en temps dans le mois suivant ou en rémunération. Lorsque, dans une même semaine, l'employeur a dérogé 3 fois à la durée du repos journalier, il ne peut user de la possibilité de suspendre en totalité le repos hebdomadaire.\n\n\n3 : Heures supplémentaires (Titre VI, art. 21.5)\n\n\nLes heures supplémentaires sont décomptées à la semaine, et payées à la fin du mois. La majoration est fixée à 10 % pour les heures effectuées entre la 36e et la 39e heure, 20 % pour celles effectuées entre la 40e et la 43e heure et 50 % à partir de la 44e heure.\n\n\n\nRestant à votre disposition pour toutes informations supplémentaires.\n\n\nCordialement,\n"}, {"id": "id_210", "question": "\"Ma fille, réceptionniste dans un hôtel, fait face à un manque de personnel. Une personne est partie en septembre, une autre partira en décembre. L’hôtel est en vente. Combien d’heures supplémentaires peut-elle accepter par semaine, mois, et année sans sacrifier sa vie personnelle ? \n\nConvention collective : hôtellerie.\"", "reponse": "Madame, Monsieur,\n\nVotre courriel manque de précisions sur la situation.\n\nNéanmoins, nous vous informons de ces dispositions de la CCN Hôtels Cafés restaurants :\n=> Texte de base : Convention collective nationale des hôtels, cafés restaurants (HCR) du 30 avril 1997 - Légifrance\n\nConcernant l'aménagement du temps de travail :\n=> Texte de base : Convention collective nationale des hôtels, cafés restaurants (HCR) du 30 avril 1997 - Légifrance\n\nConvention collective : Hôtels, cafés, restaurants - Code du travail numérique\n\nCordialement."}, {"id": "id_211", "question": "\"Ma fille, réceptionniste dans un hôtel, fait face à un manque de personnel. Une personne est partie en septembre, une autre partira en décembre. L’hôtel est en vente. Combien d’heures supplémentaires peut-elle accepter par semaine, mois, et année sans sacrifier sa vie personnelle ? \n\nConvention collective : hôtellerie.\"", "reponse": "Madame,\n\nSuite à votre courriel, veuillez trouver ci-après les éléments de réponse, sous réserve de l'appréciation souveraine des juges de fond.\n\nToute heure de travail accomplie, à la demande de l'employeur, au-delà de la durée légale (35 heures par semaine ou 1 607 heures par an) est une heure supplémentaire.\n\nLes heures supplémentaires effectuées donnent droit au salarié à une rémunération plus favorable (taux horaire majoré) ou à un repos compensateur équivalent à la majoration.\n\nCertaines heures supplémentaires donnent également droit à une contrepartie obligatoire en repos.\n\nInformations complémentaires sur ce lien : https://travail-emploi.gouv.fr/les-heures-supplementaires-definition-et-limites\n\nA noter qu'en vertu de l'article L. 4121-1 du Code du travail, « L'employeur prend les mesures nécessaires pour assurer la sécurité et protéger la santé physique et mentale des travailleurs ».\n\n\nJe vous prie de croire, Madame,  à l’assurance de ma considération distinguée.\n"}, {"id": "id_212", "question": "\"Ma fille, réceptionniste dans un hôtel, fait face à un manque de personnel. Une personne est partie en septembre, une autre partira en décembre. L’hôtel est en vente. Combien d’heures supplémentaires peut-elle accepter par semaine, mois, et année sans sacrifier sa vie personnelle ? \n\nConvention collective : hôtellerie.\"", "reponse": "Bonjour,\n\nVous trouverez ci-joint les règles relatives aux heures supplémentaires, extraites de la convention collective des Hôtels.\n\nArticle 29\n\nDurée hebdomadaire du travail\n\n(Modifié par protocole d'accord du 21 mai 1982)\n\nLa durée du travail est de quarante-deux heures pour les cuisiniers, quarante-trois heures pour les autres personnels, cinquante heures pour le personnel de gardiennage de nuit.\n\nL'horaire de travail sera affiché par la direction ainsi que les dérogations et le service de pointage des entrées et sorties de chaque salarié devra être organisé par l'employeur.\n\nLe temps de travail est compté à l'exclusion de l'habillage, du casse-croûte et des repas. Si le régime de la journée continue est institué, les employés disposeront de trente minutes pour le repas principal et ce temps sera compté dans le temps de travail.\n\nCordialement,"}, {"id": "id_213", "question": "\"Ma fille, réceptionniste dans un hôtel, fait face à un manque de personnel. Une personne est partie en septembre, une autre partira en décembre. L’hôtel est en vente. Combien d’heures supplémentaires peut-elle accepter par semaine, mois, et année sans sacrifier sa vie personnelle ? \n\nConvention collective : hôtellerie.\"", "reponse": "Bonjour Monsieur,\n\nEn réponse à votre requête et au vu des éléments fournis ;\n\nVous retrouverez ci-dessous l'article de la convention collective dont dépend l'hôtel où travaille votre fille.\nhttps://www.legifrance.gouv.fr/conv_coll/id/KALISCTA000005747437?idConteneur=KALICONT000005635534\n\nLa réponse à votre question dépend selon si elle a signé un contrat avec un contingent ou non.\nVoici la fiche pratique qui vous permettra d'accéder aux information sur ce point : https://www.service-public.gouv.fr/particuliers/vosdroits/F2391\n\nAfin de vous répondre au mieux, nous vous remercions de bien vouloir nous transmettre les éléments suivants :\n\n- votre contrat de travail\n- votre dernier bulletin de salaire\n\nCes documents sont en effet indispensables pour nous permettre d'appréhender au mieux votre situation, et n'ont pas vocation à être diffusés en dehors du service sans votre autorisation.\n\nDans l'attente,\n\nCordialement,"}, {"id": "id_214", "question": "\"Ma fille, réceptionniste dans un hôtel, fait face à un manque de personnel. Une personne est partie en septembre, une autre partira en décembre. L’hôtel est en vente. Combien d’heures supplémentaires peut-elle accepter par semaine, mois, et année sans sacrifier sa vie personnelle ? \n\nConvention collective : hôtellerie.\"", "reponse": "Bonjour,\n\nje vous prie de trouver ci-dessous les dispositions issues de la convention collective en terme de durée du travail et heures supplémentaires :\nla durée maximale sur une semaine est de 48 heures et 46 heures en moyenne sur 12 semaines.\nSection 5 : Durée du travail\n12\n\nDurée conventionnelle\n1°Durée hebdomadaire conventionnelle\nfixée à 39 heures pour toutes les entreprises avec possibilité de retenir une durée inférieure. Les entreprises appliquant à la date de l'avenant n° 2 une durée collective inférieure à 39 heures restent soumises à cette durée.\n2°Durée maximale hebdomadaire\nDurée maximale sur une période de 12 semaines consécutives        46 heures\nDurée maximale absolue        48 heures\n3°Durée maximale quotidienne\nPersonnel administratif hors site d'exploitation        10 h 00\nCuisinier        11 h 00\nAutre personnel        11 h 30\nPersonnel de réception        12 h 00\n17\n\nHeures supplémentaires\n1°Paiement :\nmajoration fixée à 10 % pour les heures effectuées entre la 36e et la 39e heure, 20 % pour celles effectuées entre la 40e et la 43e heure et 50 % à partir de la 44e heure.\ndans le cadre du dispositif d'aménagement du temps de travail sur une période supérieure à la semaine et au plus égale à l'année (v. n° 14), les heures excédant, en fin de période, le plafond annuel de 1 607 heures doivent être majorées de 10 % pour celles effectuées entre 1 607 et 1 790 heures (correspondant en moyenne aux 36, 37, 38 et 39e heures), de 20 % pour celles effectuées entre 1 791 et 1 928 heures (correspondant en moyenne aux 40, 41 et 42e heures), de 25 % pour celles effectuées entre 1 929 heures et 1 973 heures (correspondant en moyenne à la 43e heure) et de 50 % pour celles effectuées à partir de 1 974 heures (correspondant en moyenne à la 44e heure et au-delà).\n\nPaiement des heures supplémentaires et des majorations afférentes pouvant être remplacé en tout ou partie par un repos compensateur. Repos à prendre à l'intérieur d'une période de 12 mois consécutifs (ou de 52 semaines).\nPour les salariés rémunérés au pourcentage service, l'employeur doit ajouter au pourcentage service le paiement des majorations visées ci-avant au titre des heures supplémentaires effectuées.\nla rémunération ainsi composée doit être au moins égale au salaire minimum de référence dû en application de la grille de salaires et en raison de la durée de travail effectuée, augmenté des majorations afférentes aux heures supplémentaires.\n\n2°Contingent d'heures supplémentaires :\nfixé à 360 heures par an dans les établissements permanents et à 90 heures par trimestre civil dans les établissements saisonniers.\nContingent fixé à 130 heures par an en cas de modulation de forte amplitude.\nArt. 21-5 modifié par avenant n° 2 du 5-2-2007 étendu par arrêté du 26-3-2007, JO 29-3-2007, applicable à compter du 1-4-2007 (1er jour du mois suivant sa publication au JO)\n\nAvenant n° 19 du 29-9-2014 étendu par arrêté du 29-2-2016, JO 8-3-2016, applicable à compter de sa date de signature\n\n\nCordialement"}, {"id": "id_215", "question": "\"Ma fille, réceptionniste dans un hôtel, fait face à un manque de personnel. Une personne est partie en septembre, une autre partira en décembre. L’hôtel est en vente. Combien d’heures supplémentaires peut-elle accepter par semaine, mois, et année sans sacrifier sa vie personnelle ? \n\nConvention collective : hôtellerie.\"", "reponse": "Madame\n\nVeuillez trouver ci-dessous l'article 6 de l'avenant 2 du 5 février 2007 de la convention collective hôtel café restaurant :\n\n\"Article 6\n\nDurées maximales du travail\n\nÀ l'exception des travailleurs de nuit, au sens de l'article 12-2 du présent avenant, la durée de présence au travail ne peut être supérieure aux durées maximales suivantes, heures supplémentaires comprises :\n\n\n6.1 - Durées maximales journalières\n\nPersonnel administratif hors site d'exploitation : 10 h 00\n\nCuisinier : 11 h 00\n\nAutre personnel : 11 h 30\n\nPersonnel de réception : 12 h 00\n\n\n\n6.2 - Durées maximales hebdomadaires\n\nLa durée maximale hebdomadaire sur une période quelconque de 12 semaines consécutives est fixée à 46 heures.\n\nLa durée maximale hebdomadaire absolue est fixée à 48 heures.\n\nIl ne peut être dérogé aux durées maximales hebdomadaires que dans les conditions prévues aux articles L. 212-7 , R. 212-2 à R. 212-10 du code du Travail.\"\n\nCordialement.\n"}, {"id": "id_216", "question": "\"Ma fille, réceptionniste dans un hôtel, fait face à un manque de personnel. Une personne est partie en septembre, une autre partira en décembre. L’hôtel est en vente. Combien d’heures supplémentaires peut-elle accepter par semaine, mois, et année sans sacrifier sa vie personnelle ? \n\nConvention collective : hôtellerie.\"", "reponse": "Madame, Monsieur,\n\nHEURES SUPPLEMENTAIRES\n\nEst considérée comme heure supplémentaire toute heure de travail effectif accomplie à la demande de l'employeur ou avec son accord, au-delà de la durée hebdomadaire légale de travail, soit 35 heures, sous réserve de l'application des dispositifs spécifiques relatifs à l'aménagement du temps de travail (modulation, cycle, etc...).\n\nContingent d'heures supplémentaires\nLe contingent d'heures supplémentaires, excluant les heures supplémentaires compensées en temps, utilisable sans avoir recours à l'autorisation de l'inspecteur du travail est fixé à :\n- 360 heures par an pour les établissements permanents,\n- 90 heures par trimestre civil pour les établissement saisonniers (Article 5 de l'avenant n° 2 du 5/02/2007 de la Convention collective Hôtels, Cafés, Restaurants).\n\nDUREES MAXIMALES DU TRAVAIL\n\nA l'exception des travailleurs de nuit, la durée de présence au travail ne peut être supérieure aux durées maximales suivantes, heures supplémentaires comprises :\n\nDurée maximales journalières\nPersonnel administratif hors site d'exploitation : 10h00\nCuisinier : 11h00\nAutre personnel : 11h30\nPersonnel de réception : 12h00\n\nDurées maximales hebdomadaires\nLa durée maximale hebdomadaire sur une période quelconque de 12 semaines consécutives est fixée à 46 heures.\nLa durée maximale hebdomadaire absolue est fixée à 48 heures.\n\nCordialement,"}, {"id": "id_217", "question": "Membre du CSE, CSSCT, et RPX, ma direction veut changer mon roulement en janvier pour des raisons officieuses (absences, redynamisation d’équipe). Cela perturbe mon mode de garde. En tant que salariée protégée, a-t-elle le droit de modifier mon roulement ?", "reponse": "Bonjour Madame Coulon,\n\nVous êtes salariée protégée et vous souhaitez des renseignements au sujet d'un changement de roulement prévu en janvier 2026.\n\nAu vu des éléments dont vous me faites part, sous réserve de l'appréciation souveraine des tribunaux, voici ma réponse.\n\nEn principe, il n'est pas possible de modifier le contrat de travail ou les conditions de travail d'un salarié protégé.\nIl est de jurisprudence constante qu'aucune modification de son contrat de travail ou de ses conditions de travail ne peut être imposée à un salarié protégé.\nIl importe peu à cet égard que la modification soit justifiée par un motif disciplinaire ou par un motif économique.\n\nLe code du travail interdit et réprime toute entrave ou atteinte portée à la désignation ou au fonctionnement des différentes institutions représentatives du personnel, mais sans en donner de définition.\nL'entrave peut en effet découler d'agissements, de décisions ou de comportements très divers, qui ont pour but ou pour effet d'empêcher ou de rendre plus difficile la mise en place ou la mission des représentants du personnel ou des représentants syndicaux.\n\nSi le litige persiste, je vous invite à contacter le service de l'inspection du travail dont vous dépendez :\nBeauvais.................................................ddets-uc1@oise.gouv.fr\nCreil........................................................ddets-uc2@oise.gouv.fr\nCompiègne.............................................ddets-uc3@oise.gouv.fr\n\nBien cordialement"}, {"id": "id_218", "question": "Membre du CSE, CSSCT, et RPX, ma direction veut changer mon roulement en janvier pour des raisons officieuses (absences, redynamisation d’équipe). Cela perturbe mon mode de garde. En tant que salariée protégée, a-t-elle le droit de modifier mon roulement ?", "reponse": "Madame,\n\nEn droit du travail français, toute modification d’un élément essentiel du contrat de travail (horaires, lieu de travail, rémunération, etc.) nécessite l’accord du salarié, sauf si cette modification est prévue par un accord collectif ou une clause contractuelle (article L. 1222-1 du Code du travail). En tant que membre du CSE vous avez certainement consulté votre convention collective pour vérifier si une clause autorise l’employeur à modifier les roulements.\n\nPar ailleurs, les membres du CSE bénéficient d’une protection renforcée contre les mesures discriminatoires ou les modifications unilatérales de leurs conditions de travail (articles L. 2411-1 et suivants du Code du travail). Si la direction invoque des motifs non officiels (absences, redynamisation d’équipe) pour justifier le changement de roulement, cela peut masquer une mesure de rétorsion ou une discrimination indirecte.\n\nVous pouvez demander des explications écrites à votre employeur sur les motifs réels du changement. Votre employeur peut en effet modifier un roulement sans votre accord pour raison impérieuse (ex. : force majeure, réorganisation économique justifiée et proportionnée).\n\nSi l’employeur impose un changement de roulement sans base légale (accord, clause au contrat, raison impérieuse) vous pouvez refuser la modification. Pour la contester, vous devez documenter :\n\n- votre roulement actuel (contrat, fiches de paie, échanges écrits avec l’employeur),\n\n- les motifs invoqués par votre employeur (emails, notes de service, comptes-rendus de réunion)\n\n-Les perturbations causées (mode de garde, organisation familiale).\n\n- Les liens éventuels entre la modification et votre mandat (ex. : changement intervenu juste après une alerte CSSCT, une consultation du CSE, etc.).\n\nVous pouvez également réunir le CSE pour demander une consultation sur les modifications des conditions de travail (obligatoire dans les entreprises de +50 salariés, article L. 2312-8 du Code du travail).\n\nCordialement\n"}, {"id": "id_219", "question": "Membre du CSE, CSSCT, et RPX, ma direction veut changer mon roulement en janvier pour des raisons officieuses (absences, redynamisation d’équipe). Cela perturbe mon mode de garde. En tant que salariée protégée, a-t-elle le droit de modifier mon roulement ?", "reponse": "Madame,\n \n\nPour faire suite à votre message, veuillez trouver les éléments de réponse suivants :\n\n\nLa Cour de cassation pose le principe « qu’aucune modification de son contrat, aucun changement de ses conditions de travail ne peut être imposé à un représentant du personnel, et qu’il incombe à l’employeur, en cas de refus du salarié d’accepter la modification ou le changement litigieux, d’obtenir l’autorisation de l’inspecteur du travail de rompre le contrat de travail » (Cass. soc., 13 sept. 2017, n° 15-24.397P).\n\n\nTous ces éléments sont donnés sous réserve de l’appréciation souveraine des juges du fond.\n \n\nVeuillez agréer, Madame, l’expression de nos salutations distinguées."}, {"id": "id_220", "question": "Membre du CSE, CSSCT, et RPX, ma direction veut changer mon roulement en janvier pour des raisons officieuses (absences, redynamisation d’équipe). Cela perturbe mon mode de garde. En tant que salariée protégée, a-t-elle le droit de modifier mon roulement ?", "reponse": "Madame, Monsieur,\n\nVotre courriel manque de précisions.\n\nIl est de jurisprudence constante qu'aucune modification de son contrat de travail ou de ses conditions de travail ne peut être imposée à un salarié protégé.\n\nNéanmoins, la jurisprudence récente se rapproche de celle applicable aux salariés non-protégés et évalue s'il s'agit d'une modification du contrat de travail (ne pouvant pas être imposée au salarié protégé) ou un changement des conditions de travail (dont le refus par le salarié protégé peut constituer une faute).\n\nSelon le Guide de la  DGT (salariés protégés) du 20 septembre 2019  (MAJ 12/2021) relatif aux décisions administratives en matière de rupture ou de transfert du contrat de travail des salariés protégés (Extrait de la fiche 11A) :\nChangement des conditions de travail, 1.2.1,\nLe changement des conditions de travail, décidé par l'employeur dans le cadre de son pouvoir de direction, n'affecte pas un élément essentiel du contrat ou un élément contractualisé. Ce pouvoir de direction ainsi reconnu à l'employeur pour modifier les conditions de travail doit toutefois être exercé sans commettre d'abus de droit ou de légèreté blâmable. Le refus du salarié revêt en principe un caractère fautif.\n\nLe changement d'horaires consistant en une nouvelle répartition de l'horaire au sein de la journée, alors que la durée du travail et la rémunération restent identiques, constitue un simple changement des conditions de travail relevant du pouvoir de direction du chef d'entreprise et non une modification du contrat de travail (Cass. soc., 22 févr. 2000, n° 97-44.339, Bull. civ. V n° 67 ; Cass. soc, 9 avr. 2002, n° 99-45.155, Bull. civ. V n° 123).\n   Il en va autrement :\n   • si les horaires de travail sont contractualisés (Cass. soc., 11 juill. 2001, n° 99-42.710, Bull. civ. V n° 264 ; Cass. soc., 18 juill. 2001, n° 99-45.076. Bull. civ. V n° 276) ;\n   • ou si le changement d'horaire de travail implique un bouleversement très important dans l'organisation du temps de travail (Cass. soc., 27 févr. 2001, n° 98-43.783, Bull. civ. V n° 61 ; Cass. soc, 7 avr. 2004, n° 02-41.486, Bull. civ. V n° 107) ;\n   • ou s'il porte une atteinte excessive au droit du salarié au respect de sa vie personnelle et familiale ou à son droit au repos (Cass. soc., 3 nov. 2011, n° 10-14.702, Bull. civ. V n° 246 ; Cass. soc., 23 janv. 2013, n° 11-22.364 ; cf. également, pour l'affectation à un poste de travail de nuit : C. trav., art. L. 3122-12).\n\n=> guide_-_decisions_administratives_en_matiere_de_licenciement_des_salaries.pdf\n(Lire page 100)\n\n=> Peut-on modifier le contrat de travail d'un salarié protégé ? - Code du travail numérique\n\nIl n'y a pas de formalisme particulier pour proposer une modification des conditions de travail mais l'employeur doit respecter le formalisme applicable en matière de proposition de modification du contrat de travail, et ce, comme pour tous les salariés.\nDans tous les cas, il est recommandé de formaliser toute proposition de modification du contrat ou des conditions de travail concernant un salarié protégé.\nL'employeur n'a pas à demander une autorisation à l'inspecteur du travail au niveau de la proposition de modification.\n\nCordialement."}, {"id": "id_221", "question": "Membre du CSE, CSSCT, et RPX, ma direction veut changer mon roulement en janvier pour des raisons officieuses (absences, redynamisation d’équipe). Cela perturbe mon mode de garde. En tant que salariée protégée, a-t-elle le droit de modifier mon roulement ?", "reponse": "Bonjour,\n\nS'agissant d'une question relative au CSE et aux droits syndicaux, je vous invite à vous adresser à l'inspecteur du travail à l'adresse ddetspp-uc1@orne.gouv.fr en précisant bien le nom et l'adresse de votre entreprise.\n\nJe reste à votre disposition pour toute précision.\n\nRespectueusement,"}, {"id": "id_222", "question": "Membre du CSE, CSSCT, et RPX, ma direction veut changer mon roulement en janvier pour des raisons officieuses (absences, redynamisation d’équipe). Cela perturbe mon mode de garde. En tant que salariée protégée, a-t-elle le droit de modifier mon roulement ?", "reponse": "Madame,\n\nIl est de jurisprudence constante qu'aucune modification de son contrat de travail ou de ses conditions de travail ne peut être imposée à un salarié protégé. Il importe peu à cet égard que la modification soit justifiée par un motif disciplinaire ou par un motif économique. (Cass. soc., 2 mai 2001, n° 98-44.624, n° 1803 FS - P Cass. soc., 6 avr. 1999, n° 97-40.499, n° 1614 P Cass. soc., 30 avr. 1997, n° 95-40.573, n° 1801 P Cass. crim., 26 nov. 1996, n° 94-86.016, n° 5099 F - P + F)\n\nLe changement d'horaires consistant en une nouvelle répartition de l'horaire au sein de la journée, alors que la durée du travail et la rémunération restent identiques, constitue un simple changement des conditions de travail relevant du pouvoir de direction du chef d'entreprise et non une modification du contrat de travail.\nIl en va autrement :\n -  si les horaires de travail sont contractualisés ;\n-    ou si le changement d'horaire de travail implique un bouleversement très important dans l'organisation du temps de travail ;\n -   ou s'il porte une atteinte excessive au droit du salarié au respect de sa vie personnelle et familiale ou à son droit au repos.\n\n(Source documentaire : Guide DGT (salariés protégés) 20 sept. 2019, fiche 11a : guide_-_decisions_administratives_en_matiere_de_licenciement_des_salaries.pdf   )"}, {"id": "id_223", "question": "Membre du CSE, CSSCT, et RPX, ma direction veut changer mon roulement en janvier pour des raisons officieuses (absences, redynamisation d’équipe). Cela perturbe mon mode de garde. En tant que salariée protégée, a-t-elle le droit de modifier mon roulement ?", "reponse": "Madame,\n\nvotre question relève de l'inspecteur du travail en charge de votre établissement.\nJe vous invite à formuler votre demande auprès de l'adresse ci-dessous :\n\nddetspp-uc1@dordogne.gouv.fr\n\nVous voudrez bien mettre en objet le nom de l'entreprise et sa localisation afin que votre demande soit correctement orientée.\n\nCordialement"}, {"id": "id_224", "question": "Salariée de la CAF depuis 1991, en arrêt maladie et mi-temps thérapeutique en 2022. Les RH refusent les IJ subrogées à partir du 23 septembre et exigent le remboursement de la prime vacances. Est-ce justifié ?", "reponse": "Monsieur,\n \n\nPour faire suite à votre message, veuillez trouver les éléments de réponse suivants :\n\n \n\n\nLa subrogation s’applique de plein droit (c’est-à-dire de façon automatique) à partir du moment où l’employeur maintient le salaire du salarié absent en totalité même lorsque le maintien est appliqué sous déduction des IJSS.\n\n\nEn revanche, l’accord du salarié est nécessaire lorsque le maintien est partiel.\n\nSi vos droits à complément de salaire sont expirés, l'employeur est en droit de mettre fin à la subrogation.\n\n\nQuant à la \"prime vacances\" le texte qui l'accorde doit également indiquer les conditions dans lesquelles elle est accordée. Il est possible que ce texte prévoit qu'elle est versée au prorata du temps de travail effectif.\n \n\nNous vous invitons à vous rapprocher des représentants du personnel pour connaître le détail des textes applicables.\n \n \n\nTous ces éléments sont donnés sous réserve de l’appréciation souveraine des juges du fond.\n\n \n\nVeuillez agréer, Monsieur, l’expression de nos salutations distinguées.\n"}, {"id": "id_225", "question": "Salariée de la CAF depuis 1991, en arrêt maladie et mi-temps thérapeutique en 2022. Les RH refusent les IJ subrogées à partir du 23 septembre et exigent le remboursement de la prime vacances. Est-ce justifié ?", "reponse": "Bonjour,\n\nLa convention collective nationale de travail du personnel des organismes de sécurité sociale du 8 février 1957 prévoit une allocation \"à l'occasion des vacances\" (article 22 bis). Il s'agit d'une disposition non étendue (elle ne s'applique qu'aux entreprises signataires). Dans le détail, il est précisé que \"Le premier versement est effectué le 15 juin, le second le 15 octobre. En bénéficient les agents inscrits à l'effectif ou dont le contrat n'était pas résolu ou suspendu, pour le premier versement le 31 mai, pour le second le 30 septembre.\" Ainsi, si vous êtes en arrêt à une de ces dates, vous ne bénéficiez pas du versement correspondant, car votre contrat est suspendu.\n\nConcernant la subrogation : je n'ai pas bien saisi votre question, mais de manière générale la subrogation nécessite que le salaire maintenu par l'employeur au cours de l'arrêt de travail soit d'un montant au moins égal au montant des indemnités journalières versées par la Sécurité sociale (article R.323-11 du Code de la sécurité sociale).\n\n→ Pour plus de détails, vous pouvez consulter la page La subrogation de salaire en cas d’arrêt de travail.\n\nCes éléments vous sont donnés sous réserve de l’appréciation souveraine des juridictions compétentes.\n\nJe reste à votre disposition pour toute précision,\n\nRespectueusement,\n​"}, {"id": "id_226", "question": "Salariée de la CAF depuis 1991, en arrêt maladie et mi-temps thérapeutique en 2022. Les RH refusent les IJ subrogées à partir du 23 septembre et exigent le remboursement de la prime vacances. Est-ce justifié ?", "reponse": "Monsieur,\n\nJe vous remercie de nous avoir informés de la CCN dont votre contrat de travail dépend, soit celle du personnel des organismes de sécurité sociale.\n\nNéanmoins, n'ayant pas répondu à notre demande : être plus précis(e) sur la situation liée à votre interrogation .\nNotamment concernant ce que vous écrivez : Les RH refusent les IJ subrogées à partir du 23 septembre et exigent le remboursement de la prime vacances.\n\nNous vous communiquons ce lien d'information sur l'option possible de la subrogation :\n=> La subrogation de salaire en cas d’arrêt de travail | ameli.fr | Entreprise\n\nCe lien vers les articles de la CCN et les articles liés au congé maladie.\n=> Texte de base : Convention collective nationale de travail du personnel des organismes de sécurité sociale du 8 février 1957 - Légifrance\n\nConcernant la demande de remboursement de la prime vacances, voici les dispositions de la CCN :\nArticle 22 bis (1)En vigueur non étendu\nÀ l'occasion des vacances, il est attribué aux agents des organismes de sécurité sociale et d'allocations familiales et de leurs établissements une allocation égale à 1 demi-mois payable en deux versements, le premier d'un quart du salaire fixe brut du mois de mai, le second d'un quart du salaire fixe brut du mois de septembre, toutes indemnités comprises.\n\nLe premier versement est effectué le 15 juin, le second le 15 octobre. En bénéficient les agents inscrits à l'effectif ou dont le contrat n'était pas résolu ou suspendu, pour le premier versement le 31 mai, pour le second le 30 septembre.\n\n(1) Allocation portée à 1 mois par protocole d'accord du 20 juin 1991 agréé.\n\n\n\nNous rappelons que l'arrêt maladie entraine la suspension du contrat de travail.\n\nPrécision concernant le statut du salarié en Temps Partiel thérapeutique (TPT), et à l’occasion de litiges portant sur divers points, la Cour de cassation a décidé que le TPT n’était pas une absence.\n\n***************************************************************************************************************\nNotre service renseignements en droit du travail communique aux salariés et employeurs de droit privé des informations générales issues du code du travail, des conventions collectives et de la jurisprudence sociale.\n\nSous réserve de l’appréciation souveraine des tribunaux en cas de litige.\n\n***************************************************************************************************************\n\nCordialement."}, {"id": "id_227", "question": "Salariée de la CAF depuis 1991, en arrêt maladie et mi-temps thérapeutique en 2022. Les RH refusent les IJ subrogées à partir du 23 septembre et exigent le remboursement de la prime vacances. Est-ce justifié ?", "reponse": "Bonjour,\n\nPour faire suite à votre mail et sous réserve de l’appréciation souveraine des tribunaux, veuillez trouver les informations suivantes :\n\nVous trouverez, sur le site de l’assurance maladie, des renseignements sur la subrogation : La subrogation de salaire en cas d’arrêt de travail | ameli.fr | Entreprise\n\n\n\nConcernant la récupération d’un trop-perçu : Si des sommes ont été indûment versées au salarié, l'employeur peut en réclamer le remboursement : il s'agit de l'application du principe civil de répétition de l'indu.\nC. civ., art.  1302 et  1302-1\nPour en réclamer le remboursement, l'employeur n'a pas à prouver qu'il les a versées par erreur ou qu'il n'a pas commis de faute.\n\nCass. ass. plén., 2 avr. 1993, n° 89-15.490\nCass. soc., 14 déc. 2004, n° 03-46.836, n° 2446 FS - P + B\nCass. soc., 17 mai 2011, n° 10-12.852, n° 1136 FS - P + B\nCass. soc., 8 nov. 2023, n° 22-10.384\nIl convient de vérifier les critères d’attribution de la prime en question. Les absences peuvent avoir un impact sur leur versement.\n Les primes peuvent être instituées par le contrat de travail, la convention collective, un usage, un engagement unilatéral de l’employeur.\n\nA ce titre, la convention collective des organismes de sécurité sociale prévoit, dans son article 22 bis, qu’« A l'occasion des vacances, il est attribué aux agents des organismes de Sécurité sociale et d'allocations familiales et de leurs établissements une allocation égale à un mois payable en deux versements, le premier la moitié du salaire fixe brut du mois de mai, le second la moitié du salaire fixe brut du mois de septembre, toutes indemnités comprises.\n\nLe premier versement est effectué le 15 juin, le second le 15 octobre. En bénéficient les agents inscrits à l'effectif ou dont le contrat n'était pas résolu ou suspendu, pour le premier versement le 31 mai, pour le second le 30 septembre. »\n\nJe vous invite à vous rapprocher de vos représentants du personnel afin de vous assurer du texte instituant cette prime et de ses critères de versement.\n\nEn cas de désaccord avec l’employeur, il vous appartiendra de faire votre réclamation. En cas de litige persistant, le conseil des prud’hommes serait compétent pour trancher.\n\nCordialement,"}, {"id": "id_228", "question": "Salariée de la CAF depuis 1991, en arrêt maladie et mi-temps thérapeutique en 2022. Les RH refusent les IJ subrogées à partir du 23 septembre et exigent le remboursement de la prime vacances. Est-ce justifié ?", "reponse": "Bonjour,\n\nConcernant la subrogation, elle relève du choix de l'employeur.\n\nPour la prime vacances, il faudrait se reporter aux conditions prévues par le texte qui l'a mise en place.\n\nCordialement,"}, {"id": "id_229", "question": "Salariée de la CAF depuis 1991, en arrêt maladie et mi-temps thérapeutique en 2022. Les RH refusent les IJ subrogées à partir du 23 septembre et exigent le remboursement de la prime vacances. Est-ce justifié ?", "reponse": "Monsieur,\n\nLa subrogation relève de la compétence de l'Assurance maladie (Code de la Sécurité sociale).\n\nLes primes versées aux salariés sont mises en place par une convention, un accord collectif, un contrat de travail ou un usage d’entreprise. Il faut donc se reporter aux dispositions conventionnelles applicables dans chaque entreprise pour connaître les conditions d’attribution et le montant des primes.\nParmi les conditions d’attribution, le texte peut par exemple prévoir que le versement de la prime sera soumis à la présence effective du salarié dans l’entreprise, ou que son montant sera proportionnel au temps de présence du salarié au cours de l’année. Dans cette hypothèse, l’absence du salarié suite à un arrêt-maladie peut entraîner la suppression de la prime ou une réduction de son montant.\n\nUne convention collective peut prévoir que \"Les salariés ont droit au paiement d'une prime annuelle dont le versement pourra s'effectuer en une ou plusieurs fois au cours de l'année. Dans le cas où la prime est versée en plusieurs fois, le ou les versements précédant le solde constituent une avance remboursable si le salarié a quitté l'entreprise avant la date de versement dudit solde.\"\n\nLa cour de cassation a jugé que la convention collective subordonnant le paiement au 31 décembre de la prime annuelle à la condition que le salarié soit titulaire d'un contrat de travail en vigueur au moment du versement, n'a pas droit à cette prime le salarié dont le contrat a été rompu le 22 décembre, peu important le motif de la rupture. En l'espèce, le salarié avait été licencié pour faute grave par lettre du 20 décembre 2010. Ce licenciement ayant été jugé sans cause réelle et sérieuse, le salarié estimait donc qu'il aurait dû bénéficier d'un préavis de 2 mois à compter du 20 décembre et qu'en conséquence il avait droit au versement de la prime annuelle. Raisonnement censuré par la Cour de cassation : le contrat ayant été rompu le 22 décembre, il n'était donc plus en vigueur le 31 décembre de sorte que la prime n'était pas due. (Cass. soc., 29 sept. 2015, n° 14-16.995 ; Cass. soc., 27 mai 2020 n° 18-20.688)\n\nCi-après, via le lien : Simulateur - Trouver sa convention collective - Code du travail numérique"}, {"id": "id_230", "question": "Salariée de la CAF depuis 1991, en arrêt maladie et mi-temps thérapeutique en 2022. Les RH refusent les IJ subrogées à partir du 23 septembre et exigent le remboursement de la prime vacances. Est-ce justifié ?", "reponse": "Monsieur,\n\nSi vous constatez une erreur de la part de votre employeur dans le traitement des IJSS et d’une prime, il vous appartient de lui adresser un courrier avec accusé de réception afin de la lui signaler et lui demander la régularisation. A défaut de réponse satisfaisante de sa part dans un délai que vous jugez raisonnable et que vous mentionnerez dans le courrier, vous seriez fondé à saisir le tribunal des prud’hommes, seul compétent à trancher le litige issu de cette situation.\n\nCordialement,\n"}];
        
        let annotatorId = null;
        let currentIndex = 0;
        let myItems = [];
        let annotations = {};
        
        function startAnnotation() {
            annotatorId = document.getElementById('annotator-select').value;
            if (!annotatorId) { alert('Veuillez sélectionner votre numéro'); return; }
            
            const start = (parseInt(annotatorId) - 1) * 23;
            myItems = DATA.slice(start, start + 23);
            
            myItems.forEach(item => {
                annotations[item.id] = { correct: null, suffisant: null, intelligible: null };
            });
            
            const saved = localStorage.getItem('annotations_' + annotatorId);
            if (saved) {
                const savedData = JSON.parse(saved);
                Object.assign(annotations, savedData.annotations);
                currentIndex = savedData.currentIndex || 0;
            }
            
            document.getElementById('selection').style.display = 'none';
            document.getElementById('annotation').style.display = 'block';
            showItem();
        }
        
        function showItem() {
            const item = myItems[currentIndex];
            document.getElementById('question-text').textContent = item.question;
            document.getElementById('response-text').textContent = item.reponse;
            document.getElementById('progress-text').textContent = (currentIndex + 1) + ' / 23';
            document.getElementById('item-id').textContent = item.id;
            document.getElementById('progress-fill').style.width = ((currentIndex + 1) / 23 * 100) + '%';
            
            document.querySelectorAll('.btn-group button').forEach(b => b.className = '');
            
            const ann = annotations[item.id];
            if (ann.correct) document.getElementById('btn-correct-' + ann.correct.toLowerCase()).className = 'selected-' + ann.correct.toLowerCase();
            if (ann.suffisant) document.getElementById('btn-suffisant-' + ann.suffisant.toLowerCase()).className = 'selected-' + ann.suffisant.toLowerCase();
            if (ann.intelligible) document.getElementById('btn-intelligible-' + ann.intelligible.toLowerCase()).className = 'selected-' + ann.intelligible.toLowerCase();
            
            document.getElementById('btn-prev').disabled = currentIndex === 0;
            const btn = document.getElementById('btn-next');
            if (currentIndex === 22) {
                btn.textContent = 'Terminer';
                btn.className = 'next export';
            } else {
                btn.textContent = 'Suivant';
                btn.className = 'next';
            }
        }
        
        function setCriterion(criterion, value) {
            const item = myItems[currentIndex];
            annotations[item.id][criterion] = value;
            
            document.getElementById('btn-' + criterion + '-oui').className = value === 'Oui' ? 'selected-oui' : '';
            document.getElementById('btn-' + criterion + '-non').className = value === 'Non' ? 'selected-non' : '';
            
            localStorage.setItem('annotations_' + annotatorId, JSON.stringify({ annotations, currentIndex }));
        }
        
        function navigate(direction) {
            const newIndex = currentIndex + direction;
            if (newIndex < 0) return;
            if (newIndex > 22) {
                const incomplete = myItems.filter(item => {
                    const a = annotations[item.id];
                    return !a.correct || !a.suffisant || !a.intelligible;
                });
                if (incomplete.length > 0) {
                    alert('Il reste ' + incomplete.length + ' réponse(s) non annotée(s) complètement.');
                    return;
                }
                document.getElementById('annotation').style.display = 'none';
                document.getElementById('export-section').style.display = 'block';
                return;
            }
            currentIndex = newIndex;
            localStorage.setItem('annotations_' + annotatorId, JSON.stringify({ annotations, currentIndex }));
            showItem();
        }
        
        function exportJSON() {
            const result = myItems.map(item => ({
                ...item,
                annotateur: annotatorId,
                correct_en_droit: annotations[item.id].correct,
                suffisant: annotations[item.id].suffisant,
                intelligible: annotations[item.id].intelligible
            }));
            const blob = new Blob([JSON.stringify(result, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'annotations_annotateur_' + annotatorId + '.json';
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>
