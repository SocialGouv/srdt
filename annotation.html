upplémentaires, frais kilométriques, frais d’essence) ?", "reponse": "Bonjour,\n\nEn France, lorsque vous êtes convoqué à une visite médicale du travail sur un jour de repos (comme un samedi, dimanche ou un jour de congé), le code du travail prévoit certaines règles.\n\nLe salarié doit bénéficier de 11 heures de repos consécutives. En conséquence, la visite médicale ne doit pas conduire à priver le salarié de ce repos minimal. Le salarié ne peut être convoqué pendant ce temps de repos.\n\nLe temps nécessité par les visites et examens médicaux, y compris les examens complémentaires est soit pris sur les heures de travail des salariés sans qu'il puisse pour cela être effectué une retenue de salaire, soit rémunéré comme temps de travail normal lorsque ces examens ne peuvent avoir lieu pendant les heures de travail.\nLes frais de transport nécessités par ces examens sont pris en charge par les employeurs.\nC. trav., art. R. 4624-39\n\nSi la visite a lieu en dehors de vos horaires habituels (par exemple, un samedi), vous pouvez demander à ce que ces heures soient payées comme des heures supplémentaires, selon les règles de votre convention collective ou de votre contrat de travail.\n\nVous pouvez aussi demander le remboursement des frais de transport (voiture, transports en commun, etc.).\nSi vous utilisez votre véhicule personnel, les frais kilométriques sont généralement calculés selon le barème fiscal en vigueur (par exemple, 0,68 €/km en 2025 pour un véhicule de 5 CV ou moins).\nFrais d’essence : Si vous préférez déclarer les frais réels (essence, péage, etc.), conservez vos justificatifs (tickets de caisse, factures) pour les présenter à votre employeur.\nSi la visite a lieu pendant une pause déjeuner ou nécessite un déplacement long, vous pouvez demander le remboursement des frais de repas, selon les règles internes de l’entreprise.\nParking ou péages : Les frais de parking ou de péage liés au déplacement peuvent également être remboursés.\n\nJe vous invite à conserver tous les justificatifs (convocation, tickets de transport, factures) pour appuyer votre demande.\n\n\n\nCordialement"}, {"id": "id_86", "question": "Je souhaite des renseignements sur les indemnités pour une visite médicale du travail prévue sur mon jour de repos. Que dois-je demander à mon employeur (heures supplémentaires, frais kilométriques, frais d’essence) ?", "reponse": "Madame,\n\nLe temps de déplacement et le temps de la visite médicale sont\nconsidérés comme du temps de travail effectif ( Art. R. 4624-39  du code\ndu travail)\n\nVous pouvez donc demander à votre employeur une récupération équivalente\nen temps ou une rémunération, éventuellement en heures supplémentaires\nsi cela dépasse votre durée habituelle de travail.\n\nLes frais engagés pour aller à la visite médicale doivent être\nremboursés par l’employeur (bus, train ou véhicule personnel selon le\nbarème fiscal si l’entreprise l’applique).\n\nCordialement"}, {"id": "id_87", "question": "Je souhaite des renseignements sur les indemnités pour une visite médicale du travail prévue sur mon jour de repos. Que dois-je demander à mon employeur (heures supplémentaires, frais kilométriques, frais d’essence) ?", "reponse": "Bonjour,\n\nLe temps consacré aux visites et examens médicaux, y compris les examens complémentaires, est :\n- Soit pris sur les heures de travail. Dans ce cas, le salarié est payé comme s'il avait travaillé ;\n- Soit rémunéré comme du temps de travail effectif lorsque ces examens ne peuvent pas avoir lieu pendant les heures de travail.\n\nLe temps de transport et les frais rendus nécessaires pour ces visites et examens sont pris en charge par l'employeur.\n\nMédecine du travail pour un salarié du secteur privé | Service Public\n\nCordialement,"}, {"id": "id_88", "question": "Je souhaite des renseignements sur les indemnités pour une visite médicale du travail prévue sur mon jour de repos. Que dois-je demander à mon employeur (heures supplémentaires, frais kilométriques, frais d’essence) ?", "reponse": "Madame,\n\n \n\nPour faire suite à votre message, veuillez trouver les éléments de réponse suivants :\n\nRémunération et frais :\n\nLe temps passé pour la visite médicale en dehors des heures de travail doit être rémunéré comme du temps de travail effectif.\nLes frais de transport sont pris en charge par l'employeur.\n \n\nTous ces éléments sont donnés sous réserve de l’appréciation souveraine des juges du fonds"}, {"id": "id_89", "question": "Je souhaite des renseignements sur les indemnités pour une visite médicale du travail prévue sur mon jour de repos. Que dois-je demander à mon employeur (heures supplémentaires, frais kilométriques, frais d’essence) ?", "reponse": "Madame,\n\nJe vous transmets via le lien ci-après une fiche d'information reprenant la législation concernant :\n\nSous-section 6 : Déroulement des visites et des examens médicaux (Articles R4624-39 à R4624-41-6) - Légifrance\n\nLe temps nécessité par les visites et les examens médicaux, y compris les examens complémentaires, est soit pris sur les heures de travail des travailleurs sans qu'aucune retenue de salaire puisse être opérée, soit rémunéré comme temps de travail effectif lorsque ces examens ne peuvent avoir lieu pendant les heures de travail.\nLe temps et les frais de transport nécessités par ces visites et ces examens sont pris en charge par l'employeur.\n\n\nL'article L. 1222-1 du code du travail dispose que : \"Le contrat de travail est exécuté de bonne foi.\"\nSi ce n'est pas le cas, le Conseil de prud'hommes* est la juridiction compétente qui règle les litiges individuels entre employeur et salarié survenus à l'occasion de tout contrat de travail.\nLorsqu'ils ont subi un préjudice du fait du non-respect par l'employeur des dispositions légales, réglementaires ou conventionnelles, les salariés peuvent prétendre à l'attribution de dommages et intérêts. L'employeur ne peut invoquer le fait que les salariés concernés n'avaient pas contesté l'infraction. (♦Cass. soc., 29 janv. 1981, n° 79-41.406)\nIl relève donc du pouvoir des juges de rendre une décision notamment sur la remise des documents de fin de contrat.\n\nLes agents de l'inspection du travail ne sont pas juges du contrat de travail. Ils n'interviennent pas dans les litiges individuels. Dans ces situations, il faut saisir le Conseil de prud'hommes\n\nLes services de renseignements donnent des informations juridiques générales relatives au Code du travail, aux conventions collectives et à la jurisprudence sociale aux salariés et aux employeurs du secteur privé.\nIls ne donnent aucun avis, ne rendent aucune décision.\nIls ne sont pas compétents pour :\n- les demandes d’intervention en entreprise, qui relèvent de la compétence des sections d’inspection du travail (Contacter l'inspection du travail dans l'Eure - Directions régionales de l'économie, de l'emploi, du travail et des solidarités (DREETS)\n- régler les litiges qui sont de la compétence de Conseil de prud’hommes ;\n- constituer un dossier prud’homal ;\n- effectuer ou vérifier les calculs de rémunération, d'indemnités de rupture de contrat ou de congés payés, etc. ;\n- effectuer ou vérifier les calculs de jours de congés payés ou de repos ;\n- rédiger ou valider des courriers ;\n- renseigner sur les cotisations sociales qui est de la compétence de l’URSSAF ;\n- renseigner sur le droit à assurance chômage, cette mission étant du domaine de France Travail (anciennement Pôle Emploi).\n\n*la saisine du Conseil des prud'hommes (juridiction compétente pour le règlement des litiges) :\n                - https://travail-emploi.gouv.fr/droit-du-travail/le-reglement-des-conflits-individuels-et-collectifs/article/le-conseil-de-prud-hommes\n                - https://www.service-public.fr/particuliers/vosdroits/R45128\n                - https://normandie.dreets.gouv.fr/Les-defenseurs-syndicaux-modification-de-la-liste-pour-la-Normandie (défenseur syndical)"}, {"id": "id_90", "question": "Je souhaite des renseignements sur les indemnités pour une visite médicale du travail prévue sur mon jour de repos. Que dois-je demander à mon employeur (heures supplémentaires, frais kilométriques, frais d’essence) ?", "reponse": "Bonjour Madame,\n\nVotre demande de renseignement porte sur la visite médicale sur votre jour de repos.\n\nSous réserve de l’appréciation souveraine des tribunaux, voici la réponse que je suis en mesure de vous apporter.\nLe temps consacré aux visites et examens médicaux, y compris les examens complémentaires, est :\n\nSoit pris sur les heures de travail. Dans ce cas, le salarié est payé comme s'il avait travaillé.\nSoit rémunéré comme du temps de travail effectif lorsque ces examens ne peuvent pas avoir lieu pendant les heures de travail.\nLe temps de transport et les frais rendus nécessaires pour ces visites et examens sont pris en charge par l'employeur.\n\nPar ailleurs, je vous invite à consulter la fiche pratique ci-dessous:\nhttps://www.service-public.gouv.fr/particuliers/vosdroits/F2211.\n\nEn cas de litige, il vous appartiendra de saisir le conseil des prud'hommes territorialement compétent.\n\nBien cordialement"}, {"id": "id_91", "question": "Bonjour ,\n\nJ aimerais un renseignement car ce matin j ai fait un abandon de\nposte suite a une reunion que javais avec le responsable et ma CIP ,\nje suis actuellement en CDd dans la réinsertion et ce matin javais\nmon entretien avec la direction , mais cette entretien a etait un\ntotal rabaissement et avec le cumul de leurs paroles j ai mis fin au\nrdv et je suis partis du travail ,\nMa responsable ma dit je te met en abandon de poste ,\nJe voit mon medecin a 16h pour un arret de travail pour plusieurs\nraisons qui font que je suis en burn out , et leurs paroles\nrabaissantes ,\nEst ce que je vais tous perdre car abandon de poste veux dire pas de\nchomage mais ayant 4 enfants seule je me voit pas finir a la rue alors\nque mon travail en soit ne permet aucune reproches .\n\nPourriez vous me guider svp , si je me met en arret de travail jusqua\nla fin de mon cdd est ce que je peut vraiment perdre mes droits de\nchomage ?\n\nMerci pour votre aide, cette situation est ma premiere et moralement\nje ne peut pas encaisser leurs reproches et leurs manque de diplomasie\nsurtout en sachant que de base cest un emploi qui aide a reprendre\nconfiance en soit , la ils ont rabaisser et denigrer mon projet re\nreinsertion car jai 4 enfants et que jai souvent des rdv medicaux donc\nje suis pas capable de voir un projet dans le transport , au lieu de\nsoutenir , il denigre mes attentes .\n\nCordialement .", "reponse": "Madame, Monsieur,\n\nJe vous transmets via le lien ci-après des fiches d'information reprenant la règlementation concernant :\n- Fin d'un contrat à durée déterminée (CDD) | Service Public\n- Qu'est-ce qu'un abandon de poste par un salarié dans le secteur privé ? | Service Public\n\nUn arrêt de travail délivré par le médecin : peut aller jusqu'à la fin du CDD et ne supprime pas le droit à l'indemnisation chômage. (lien vers le site de l'UNEDIC (assurance-indemnisation chômage) : Quel sera le montant de mon allocation chômage ? | Unédic.org\n\nL'article L. 1222-1 du code du travail dispose que : \"Le contrat de travail est exécuté de bonne foi.\"\nSi ce n'est pas le cas, le Conseil de prud'hommes* est la juridiction compétente qui règle les litiges individuels entre employeur et salarié survenus à l'occasion de tout contrat de travail.\nLorsqu'ils ont subi un préjudice du fait du non-respect par l'employeur des dispositions légales, réglementaires ou conventionnelles, les salariés peuvent prétendre à l'attribution de dommages et intérêts. L'employeur ne peut invoquer le fait que les salariés concernés n'avaient pas contesté l'infraction. (♦Cass. soc., 29 janv. 1981, n° 79-41.406)\n\nLes agents de l'inspection du travail ne sont pas juges du contrat de travail. Ils n'interviennent pas dans les litiges individuels. Dans ces situations, il faut saisir le Conseil de prud'hommes\n\n*la saisine du Conseil des prud'hommes (juridiction compétente pour le règlement des litiges) :\n                - https://travail-emploi.gouv.fr/droit-du-travail/le-reglement-des-conflits-individuels-et-collectifs/article/le-conseil-de-prud-hommes\n                - https://www.service-public.fr/particuliers/vosdroits/R45128\n                - https://normandie.dreets.gouv.fr/Les-defenseurs-syndicaux-modification-de-la-liste-pour-la-Normandie (défenseur syndical)"}, {"id": "id_92", "question": "Bonjour ,\n\nJ aimerais un renseignement car ce matin j ai fait un abandon de\nposte suite a une reunion que javais avec le responsable et ma CIP ,\nje suis actuellement en CDd dans la réinsertion et ce matin javais\nmon entretien avec la direction , mais cette entretien a etait un\ntotal rabaissement et avec le cumul de leurs paroles j ai mis fin au\nrdv et je suis partis du travail ,\nMa responsable ma dit je te met en abandon de poste ,\nJe voit mon medecin a 16h pour un arret de travail pour plusieurs\nraisons qui font que je suis en burn out , et leurs paroles\nrabaissantes ,\nEst ce que je vais tous perdre car abandon de poste veux dire pas de\nchomage mais ayant 4 enfants seule je me voit pas finir a la rue alors\nque mon travail en soit ne permet aucune reproches .\n\nPourriez vous me guider svp , si je me met en arret de travail jusqua\nla fin de mon cdd est ce que je peut vraiment perdre mes droits de\nchomage ?\n\nMerci pour votre aide, cette situation est ma premiere et moralement\nje ne peut pas encaisser leurs reproches et leurs manque de diplomasie\nsurtout en sachant que de base cest un emploi qui aide a reprendre\nconfiance en soit , la ils ont rabaisser et denigrer mon projet re\nreinsertion car jai 4 enfants et que jai souvent des rdv medicaux donc\nje suis pas capable de voir un projet dans le transport , au lieu de\nsoutenir , il denigre mes attentes .\n\nCordialement .", "reponse": "Bonjour,\n\n\nPour faire suite à votre demande, et sous réserve de l'appréciation souveraine des juges du fond;\n\n\nLa situation que vous décrivez ne ressemble pas à un abandon de poste. À compter de votre absence, vous aviez en principe 48 heures pour en apporter les causes. Si votre médecin traitant vous a placé en arrêt maladie, votre absence est dès lors justifiée.\n\nPour répondre à votre second point, la décision de prolonger l'arrêt maladie revient à votre médecin traitant. Si ce dernier prolonge votre arrêt jusqu'au terme prévu de votre CDD, le contrat sera rompu. Autrement dit, l'arrêt de travail  n'a pas pour effet automatique de prolonger le CDD. En effet, lorsque le terme du CDD intervient pendant l'arrêt de travail, le contrat prend fin à la date prévue.\n\nToutefois, si le contrat prévoit une clause de renouvellement du CDD, l'employeur doit appliquer la clause.\n\nEn principe, la rupture du CDD à son échéance ouvre droit chômage, à condition que le salarié remplisse par ailleurs les différents critères. Nous vous invitons à vous rapprocher de France Travail sur ce point.\n\n\nEnfin, la situation que vous décrivez peut s'apparenter à du harcèlement moral.\n\nDans ce cas, l'employeur doit prendre des mesures pour assurer la sécurité et protéger la santé physique et mentale des salariés. Cela inclut les risques psychosociaux tels que la surcharge de travail, les agressions ou les violences, qu'elles soient internes ou externes (de la part des clients par exemple). Concernant le harcèlement moral, il se manifeste par des propos ou des comportements répétés pouvant entraîner, pour la personne qui les subit, une dégradation de ses conditions de travail. Pour caractériser cette infraction, il faut prouver que ces comportements ont entraîné une atteinte aux droits et à la dignité de la victime, ou l'altération de sa santé physique ou mentale, ou une menace pour son évolution professionnelle. (→ voir la page service-public.fr Harcèlement moral)\n\nSi vous estimez être confronté à une situation de harcèlement moral, vous devez tout d'abord alerter votre employeur, de préférence par écrit : l'employeur doit en effet prendre \"toutes dispositions nécessaires en vue de prévenir les agissements de harcèlement moral\" (article L.1152-4 du Code du travail). Si l'employeur ne prend pas les mesures nécessaires pour faire cesser la situation de harcèlement, voici les actions que vous pouvez mettre en œuvre :\nDès le départ, il est conseillé d'établir un recensement précis des faits et de leur historique par la tenue d'un carnet de bord, en vue de la constitution d'un éventuel dossier et de l'élaboration de preuves. Par ailleurs, il est important de ne pas rester dans l'isolement mais de communiquer et de se faire aider et accompagner tant à l'intérieur qu'à l'extérieur de l'entreprise.\nDemander auprès de l'employeur l'organisation d'une médiation afin de mettre en place un espace pour clarifier les faits, rétablir le dialogue et élaborer des solutions équitables pour tous les acteurs concernés (conformément à l'article L.1152-6 du Code du travail, la médiation peut être mise en place à la demande de la personne s'estimant victime ou de la personne mise en cause)\nContacter votre médecin du travail (qui peut participer à la prévention du harcèlement moral dans l'entreprise)\nPrévenir les représentants du personnel qui pourront vous aider dans toutes vos démarches. Vous pouvez prévenir le comité économique et social (CSE), dont les membres peuvent exercer leur droit d'alerte en matière de harcèlement. Lorsque le CSE alerte sur une situation de harcèlement, une enquête doit être menée.\nVous pouvez vous faire aider par une organisation syndicale représentant les salariés, notamment en vous rapprochant de la Bourse du travail du département\nSignaler la situation de harcèlement à l'inspection du travail. (voir l'annuaire ici)\nLes conséquences d'agissements de harcèlement moral sur la santé physique et mentale ne doivent pas être sous-estimées. La personne victime de harcèlement ne doit pas hésiter à évoquer la situation avec son médecin traitant.\n\nPlus précisément,une simple possibilité de dégradation des conditions de travail suffit à constituer et qualifier le délit (Cass. crim., 6 déc. 2011, n° 08-41.497).\n\nÀ ainsi été caractérisé de harcèlement moral la situation dans laquelle l'employeur adresse des brimades répétées au salarié, l'empêche d'exercer pleinement ses fonctions et le discrédite vis-à-vis de ses collègues (Cass. crim., 6 fév. 2007, n° 06-82.601).\nC'est aussi le cas lorsque le supérieur hiérarchique adopte un comportement méprisant, tient des propos dégradants : agressivité verbale, brimades, humiliations et reproches incessants, ce qui a entrainé chez un salarié plusieurs malaise sur son lieu de travail (Cass. soc., 20 juin 2012, n° 11-18.408).\n\nPar ailleurs, les faits de harcèlement peuvent également faire l'objet d'un dépôt de plainte. D'après le code pénal, \"le fait de harceler autrui par des propos ou comportements répétés ayant pour objet ou pour effet une dégradation des conditions de travail susceptible de porter atteinte à ses droits et à sa dignité, d'altérer sa santé physique ou mentale ou de compromettre son avenir professionnel\" est puni de deux ans d'emprisonnement et de 30 000 € d'amende (Code pénal, article 222-33-2).\n\nAucune personne ayant subi ou refusé de subir des agissements répétés de harcèlement moral ou ayant, de bonne foi, relaté ou témoigné de tels agissements ne peut être sanctionnée, licenciée ni faire l'objet d'une mesure discriminatoire, directe ou indirecte (article L.1121-2 du code du travail).\n\n\n\n\nRestant à votre disposition pour toutes informations supplémentaires.\n\n\nCordialement,\n"}, {"id": "id_93", "question": "Bonjour ,\n\nJ aimerais un renseignement car ce matin j ai fait un abandon de\nposte suite a une reunion que javais avec le responsable et ma CIP ,\nje suis actuellement en CDd dans la réinsertion et ce matin javais\nmon entretien avec la direction , mais cette entretien a etait un\ntotal rabaissement et avec le cumul de leurs paroles j ai mis fin au\nrdv et je suis partis du travail ,\nMa responsable ma dit je te met en abandon de poste ,\nJe voit mon medecin a 16h pour un arret de travail pour plusieurs\nraisons qui font que je suis en burn out , et leurs paroles\nrabaissantes ,\nEst ce que je vais tous perdre car abandon de poste veux dire pas de\nchomage mais ayant 4 enfants seule je me voit pas finir a la rue alors\nque mon travail en soit ne permet aucune reproches .\n\nPourriez vous me guider svp , si je me met en arret de travail jusqua\nla fin de mon cdd est ce que je peut vraiment perdre mes droits de\nchomage ?\n\nMerci pour votre aide, cette situation est ma premiere et moralement\nje ne peut pas encaisser leurs reproches et leurs manque de diplomasie\nsurtout en sachant que de base cest un emploi qui aide a reprendre\nconfiance en soit , la ils ont rabaisser et denigrer mon projet re\nreinsertion car jai 4 enfants et que jai souvent des rdv medicaux donc\nje suis pas capable de voir un projet dans le transport , au lieu de\nsoutenir , il denigre mes attentes .\n\nCordialement .", "reponse": "Monsieur,\n\nEn réponse à votre courriel, nous vous informons tout d'abord que notre service n'est pas compétent concernant vos  droits aux ARE : nous vous invitons à contacter les services de FRANCE TRAVAIL.\n\nVotre mail manque de précisions mais son contenu nous mène à vous confirmer que nul salarié ne doit subir des propos ou comportements répétés ayant pour objet ou pour effet une dégradation des conditions de travail susceptible de porter atteinte à ses droits et à sa dignité, d'altérer sa santé physique ou mentale ou de compromettre son avenir professionnel.\nL'employeur est tenu d'une obligation légale lui imposant de prendre les mesures nécessaires pour assurer la sécurité et protéger la santé physique et mentale des travailleurs (salariés, salariés temporaires, stagiaires, etc.), notamment en matière de harcèlement moral.\nÀ ce titre, il doit prendre toutes dispositions nécessaires en vue de prévenir de tels agissements.\n\nEn dehors de la période d'essai, le CDD peut être rompu avant sa fin prévue mais uniquement dans l'un des cas suivants :\n-Vous avez l'accord de votre employeur\n-Votre demande est justifiée par une embauche en contrat à durée indéterminée (CDI). Pour éviter toute difficulté, vous pouvez fournir à votre employeur un justificatif de l'embauche prévue (promesse d'embauche ou contrat de travail, par exemple).\n-Faute grave\n-Force majeure\n-Inaptitude constatée par le médecin du travail\n\nEn principe, l'arrêt de travail ne prolonge pas un CDD même si le salarié est en arrêt de travail lié à un accident du travail ou à une maladie professionnelle.\nMais, exceptionnellement, en cas d'arrêt de travail lié à un accident du travail ou à une maladie professionnelle, la durée du CDD peut être prolongée si le contrat prévoit une clause de renouvellement.\n=> Le CDD du salarié est-il prolongé en cas d'arrêt de travail ? - Code du travail numérique\n\nCordialement."}, {"id": "id_94", "question": "Bonjour ,\n\nJ aimerais un renseignement car ce matin j ai fait un abandon de\nposte suite a une reunion que javais avec le responsable et ma CIP ,\nje suis actuellement en CDd dans la réinsertion et ce matin javais\nmon entretien avec la direction , mais cette entretien a etait un\ntotal rabaissement et avec le cumul de leurs paroles j ai mis fin au\nrdv et je suis partis du travail ,\nMa responsable ma dit je te met en abandon de poste ,\nJe voit mon medecin a 16h pour un arret de travail pour plusieurs\nraisons qui font que je suis en burn out , et leurs paroles\nrabaissantes ,\nEst ce que je vais tous perdre car abandon de poste veux dire pas de\nchomage mais ayant 4 enfants seule je me voit pas finir a la rue alors\nque mon travail en soit ne permet aucune reproches .\n\nPourriez vous me guider svp , si je me met en arret de travail jusqua\nla fin de mon cdd est ce que je peut vraiment perdre mes droits de\nchomage ?\n\nMerci pour votre aide, cette situation est ma premiere et moralement\nje ne peut pas encaisser leurs reproches et leurs manque de diplomasie\nsurtout en sachant que de base cest un emploi qui aide a reprendre\nconfiance en soit , la ils ont rabaisser et denigrer mon projet re\nreinsertion car jai 4 enfants et que jai souvent des rdv medicaux donc\nje suis pas capable de voir un projet dans le transport , au lieu de\nsoutenir , il denigre mes attentes .\n\nCordialement .", "reponse": "Bonjour,\n\nL'abandon de poste est une absence non justifiée qui peut, après une procédure spécifique, être assimilée à une démission présumée (avec perte des droits au chômage). Cependant, pour que cette qualification s'applique, l'employeur doit vous mettre en demeure (par lettre recommandée ou remise en main propre) de justifier votre absence et de reprendre votre poste dans un délai minimum de 15 jours calendaires selon l'art R1237-13 du code du travail :  https://www.legifrance.gouv.fr/codes/article_lc/LEGIARTI000047456645\nAussi, si vous justifiez votre absence par un motif légitime (comme un arrêt maladie), la procédure de démission présumée ne peut pas être poursuivie.\nSi votre arrêt maladie couvre l'intégralité de votre contrat CDD, ce dernier prendra fin à la date prévue.\n\nBonne réception,\nCordialement,"}, {"id": "id_95", "question": "Bonjour ,\n\nJ aimerais un renseignement car ce matin j ai fait un abandon de\nposte suite a une reunion que javais avec le responsable et ma CIP ,\nje suis actuellement en CDd dans la réinsertion et ce matin javais\nmon entretien avec la direction , mais cette entretien a etait un\ntotal rabaissement et avec le cumul de leurs paroles j ai mis fin au\nrdv et je suis partis du travail ,\nMa responsable ma dit je te met en abandon de poste ,\nJe voit mon medecin a 16h pour un arret de travail pour plusieurs\nraisons qui font que je suis en burn out , et leurs paroles\nrabaissantes ,\nEst ce que je vais tous perdre car abandon de poste veux dire pas de\nchomage mais ayant 4 enfants seule je me voit pas finir a la rue alors\nque mon travail en soit ne permet aucune reproches .\n\nPourriez vous me guider svp , si je me met en arret de travail jusqua\nla fin de mon cdd est ce que je peut vraiment perdre mes droits de\nchomage ?\n\nMerci pour votre aide, cette situation est ma premiere et moralement\nje ne peut pas encaisser leurs reproches et leurs manque de diplomasie\nsurtout en sachant que de base cest un emploi qui aide a reprendre\nconfiance en soit , la ils ont rabaisser et denigrer mon projet re\nreinsertion car jai 4 enfants et que jai souvent des rdv medicaux donc\nje suis pas capable de voir un projet dans le transport , au lieu de\nsoutenir , il denigre mes attentes .\n\nCordialement .", "reponse": "Bonjour,\n\nPour réponse ;\n\nL'abandon de poste est caractérisé par une absence injustifiée du salarié à son poste de travail notamment s'il quitte volontairement son lieu de travail ou ne se représente plus sur celui-ci.\n\nUn justificatif fournit à l'employeur dans les délais légaux prévus (par exemple un arrêt de travail fournit dans les 48 h à son employeur) ne permettra pas à l'employeur de pouvoir caractériser l'absence comme injustifié.\n\nLa procédure d'abandon de poste ne pourra donc être réalisée par l'employeur.\n\nBien cordialement,"}, {"id": "id_96", "question": "Bonjour ,\n\nJ aimerais un renseignement car ce matin j ai fait un abandon de\nposte suite a une reunion que javais avec le responsable et ma CIP ,\nje suis actuellement en CDd dans la réinsertion et ce matin javais\nmon entretien avec la direction , mais cette entretien a etait un\ntotal rabaissement et avec le cumul de leurs paroles j ai mis fin au\nrdv et je suis partis du travail ,\nMa responsable ma dit je te met en abandon de poste ,\nJe voit mon medecin a 16h pour un arret de travail pour plusieurs\nraisons qui font que je suis en burn out , et leurs paroles\nrabaissantes ,\nEst ce que je vais tous perdre car abandon de poste veux dire pas de\nchomage mais ayant 4 enfants seule je me voit pas finir a la rue alors\nque mon travail en soit ne permet aucune reproches .\n\nPourriez vous me guider svp , si je me met en arret de travail jusqua\nla fin de mon cdd est ce que je peut vraiment perdre mes droits de\nchomage ?\n\nMerci pour votre aide, cette situation est ma premiere et moralement\nje ne peut pas encaisser leurs reproches et leurs manque de diplomasie\nsurtout en sachant que de base cest un emploi qui aide a reprendre\nconfiance en soit , la ils ont rabaisser et denigrer mon projet re\nreinsertion car jai 4 enfants et que jai souvent des rdv medicaux donc\nje suis pas capable de voir un projet dans le transport , au lieu de\nsoutenir , il denigre mes attentes .\n\nCordialement .", "reponse": "Monsieur,\n\nVous êtes allé chez le médecin la journée même si je comprends bien?\n\nMonsieur,\n\nDonc je fini... Non, vous n'êtes pas en tort dans la situation que vous décrivez. Quitter les lieux après un entretien dégradant et consulter un médecin qui prescrit un arrêt de travail est une réaction légitime, surtout en contexte de CDD d'insertion (CDDI), où les salariés bénéficient des mêmes droits que les autres, y compris en matière de santé au travail.\nL'employeur ne peut pas vous dénigrer sans risquer des accusations de harcèlement moral, et votre arrêt maladie protège votre salaire et votre poste pendant la durée prescrite, votre contrat est suspendu pendant cette durée.\nJe vous invite à prendre rendez vous dès à présent avec la médecine du travail pour relater les faits ainsi qu'avec la personne qui vous suit dans le cadre de votre projet d'insertion.\n\nIl est possible de rompre un CDDI à l'amiable et d'ouvrir des droits à l'allocation France Travail, mais tout dépend de la manière dont la rupture est formalisée et de votre situation globale. Elle doit être formalisée comme une rupture d'un commun accord, par écrit et , signée par les deux parties.\nLa perte d'emploi doit être considérée comme « involontaire » et que vous remplissiez les conditions habituelles (durée de travail suffisante, inscription comme demandeur d'emploi, etc.).\nPar contre, une rupture qualifiée de « démission » de votre part est au contraire considérée comme volontaire et, en principe, n'ouvre pas droit immédiatement aux allocations chômage, sauf cas de démission légitime (formation qualifiante, CDI, motifs familiaux graves, etc.).\n\nBien cordialement,"}, {"id": "id_97", "question": "Bonjour ,\n\nJ aimerais un renseignement car ce matin j ai fait un abandon de\nposte suite a une reunion que javais avec le responsable et ma CIP ,\nje suis actuellement en CDd dans la réinsertion et ce matin javais\nmon entretien avec la direction , mais cette entretien a etait un\ntotal rabaissement et avec le cumul de leurs paroles j ai mis fin au\nrdv et je suis partis du travail ,\nMa responsable ma dit je te met en abandon de poste ,\nJe voit mon medecin a 16h pour un arret de travail pour plusieurs\nraisons qui font que je suis en burn out , et leurs paroles\nrabaissantes ,\nEst ce que je vais tous perdre car abandon de poste veux dire pas de\nchomage mais ayant 4 enfants seule je me voit pas finir a la rue alors\nque mon travail en soit ne permet aucune reproches .\n\nPourriez vous me guider svp , si je me met en arret de travail jusqua\nla fin de mon cdd est ce que je peut vraiment perdre mes droits de\nchomage ?\n\nMerci pour votre aide, cette situation est ma premiere et moralement\nje ne peut pas encaisser leurs reproches et leurs manque de diplomasie\nsurtout en sachant que de base cest un emploi qui aide a reprendre\nconfiance en soit , la ils ont rabaisser et denigrer mon projet re\nreinsertion car jai 4 enfants et que jai souvent des rdv medicaux donc\nje suis pas capable de voir un projet dans le transport , au lieu de\nsoutenir , il denigre mes attentes .\n\nCordialement .", "reponse": "Bonjour,\n\nAfin d'orienter votre demande vers le bon service, il est nécessaire de nous préciser le nom et l'adresse de l'entreprise concernée.\n\nCordialement,"}, {"id": "id_98", "question": "Bonjour ,\n\nJ aimerais un renseignement car ce matin j ai fait un abandon de\nposte suite a une reunion que javais avec le responsable et ma CIP ,\nje suis actuellement en CDd dans la réinsertion et ce matin javais\nmon entretien avec la direction , mais cette entretien a etait un\ntotal rabaissement et avec le cumul de leurs paroles j ai mis fin au\nrdv et je suis partis du travail ,\nMa responsable ma dit je te met en abandon de poste ,\nJe voit mon medecin a 16h pour un arret de travail pour plusieurs\nraisons qui font que je suis en burn out , et leurs paroles\nrabaissantes ,\nEst ce que je vais tous perdre car abandon de poste veux dire pas de\nchomage mais ayant 4 enfants seule je me voit pas finir a la rue alors\nque mon travail en soit ne permet aucune reproches .\n\nPourriez vous me guider svp , si je me met en arret de travail jusqua\nla fin de mon cdd est ce que je peut vraiment perdre mes droits de\nchomage ?\n\nMerci pour votre aide, cette situation est ma premiere et moralement\nje ne peut pas encaisser leurs reproches et leurs manque de diplomasie\nsurtout en sachant que de base cest un emploi qui aide a reprendre\nconfiance en soit , la ils ont rabaisser et denigrer mon projet re\nreinsertion car jai 4 enfants et que jai souvent des rdv medicaux donc\nje suis pas capable de voir un projet dans le transport , au lieu de\nsoutenir , il denigre mes attentes .\n\nCordialement .", "reponse": "Monsieur,\n\nL'abandon de poste est considéré comme une démission présumée si :votre employeur vous a mis en demeure (par lettre recommandée ou remise en main propre contre décharge) de justifier votre absence et de reprendre votre poste dans un délai minimal de 15 jours calendaires et si vous n'avez pas répondu à cette mise en demeure ou refusé de reprendre le travail sans motif légitime.\n\nSi vous avez justifié votre absence par un motif légitime (comme un arrêt maladie), la procédure de présomption de démission ne peut pas être poursuivie. Votre contrat reste suspendu pendant la durée de l'arrêt.\n\nSi votre CDD arrive à son terme pendant votre arrêt maladie, il prendra fin automatiquement à la date prévue.\n\nVous conserverez vos droits au chômage si votre CDD se termine normalement (sans rupture anticipée abusive) et si vous remplissez les conditions générales d'ouverture des droits.\n\nMais si votre employeur parvient à prouver que votre abandon de poste équivaut à une démission (par exemple, si vous n'avez pas justifié votre absence par un arrêt maladie en tant et heure), France Travail peut considérer que vous avez démissionné (et donc refuser l'ARE)\n\nEn cas de litige, vous pouvez saisir le Conseil de prud'hommes pour contester la qualification de la rupture (démission ou suspension du contrat pour maladie).\n\nCordialement"}, {"id": "id_99", "question": "Bonjour,\n\nUne salariée en arrêt maladie de plus de 60 jours doit reprendre son\nposte le lundi 16 décembre.\n\nSa direction l’informe qu’elle a un rdv a la médecine du travail le\nmardi 17 décembre après-midi et je cite « tu ne pourras reprendre ton\nposte qu’une fois la visite réalisée. Il faudra donc anticiper ton\nabsence du lundi 8 décembre. »\n\n* 1ere question : est-ce légal de lui demander de ne pas reprendre\navant alors que l’employeur a 8 jours pour la visite ?\n* 2 -ème question : l’employeur lui demande un arrêt le lundi mais\nmardi matin elle est en poste à 9H , ne doit-elle pas être en arrêt\négalement ? Comme le lundi\n\nVous remerciant de votre réponse,\n\nBonne journée", "reponse": "Bonjour Madame,\n\nVous sollicitez le service des renseignements en droit du travail au sujet de votre visite de reprise.\n\nAu vu des éléments que vous portez à ma connaissance, sous réserve de l'appréciation souveraine des tribunaux et en référence aux textes législatifs, voici ma réponse.\n\nVisite médicale de reprise du travail après certains arrêts de travail\nLe salarié bénéficie d'un examen de reprise du travail par le médecin du travail après un congé de maternité et une absence pour maladie professionnelle, quelle que soit la durée de ces absences.\nEn revanche, la visite de reprise n'est obligatoire qu'après :\n-    une absence d'au moins 30 jours pour cause d'accident du travail ;\n-    une absence d'au moins 60 jours pour les arrêts de travail pour cause d'accident ou de maladie non professionnel débutant après le 31 mars 2022. Pour les arrêts de travail débutant avant le 1er avril 2022, il suffisait que l'absence soit d'au moins 30 jours (C. trav., art. R. 4624-31). A noter que l'employeur doit informer le médecin du travail de tout arrêt de travail pour cause d'accident du travail d'une durée inférieure à 30 jours, pour apprécier, notamment, l'opportunité d'un nouvel examen médical et de préconiser des mesures de prévention des risques (C. trav., art. R. 4624-33).\nC. trav., art. L. 4624-2-3 et R. 4624-31\n\nL'examen de reprise a pour objet :\n-    de vérifier si le poste de travail que doit reprendre le salarié ou le poste de reclassement auquel il doit être affecté est compatible avec son état de santé ;\n-    d'examiner les propositions d'aménagement ou d'adaptation du poste repris par le travailleur ou de reclassement faites par l'employeur à la suite des préconisations émises le cas échéant par le médecin du travail lors de la visite de préreprise ;\n-    de préconiser l'aménagement, l'adaptation du poste ou le reclassement du travailleur ;\n-    d'émettre, le cas échéant, un avis d'inaptitude.\nC. trav., art. R. 4624-32\nC'est l'examen de reprise qui met fin à la suspension du contrat de travail, même s'il ne coïncide pas avec le retour du salarié dans l'entreprise. Tant que la visite de reprise n'a pas été effectuée, le contrat de travail reste suspendu (Circ. DGT n° 13, 9 nov. 2012). Cette jurisprudence ne devrait pas être remise en cause par la réforme applicable depuis le 1er janvier 2017.\nLa visite de reprise met fin à la période de suspension du contrat, même si le salarié est de nouveau en arrêt de travail à l'issue de cette visite (Cass. soc., 5 déc. 2012, n° 11-17.913, n° 2548 FS - P + B).\n\nSituation du salarié qui revient travailler à l'issue de son arrêt de travail:\nPendant la période entre la fin de l'arrêt de travail et la visite de reprise, le salarié qui revient travailler est soumis au pouvoir disciplinaire de l'employeur : « le salarié dont le contrat de travail est suspendu pour maladie et qui reprend son travail avant d'avoir fait l'objet d'une visite de reprise est soumis au pouvoir disciplinaire de l'employeur (♦Cass. soc., 16 nov. 2005, n° 03-45.000, n° 2464 FS - P + B).\nN'est pas constitutif de faute justifiant un licenciement, le fait de cesser de venir travailler 5 mois après avoir repris le poste lorsque le salarié, suite à un arrêt de travail pour accident du travail n'a pas eu de visite de reprise.\nEn l'absence de visite de reprise, le contrat reste suspendu, même si le salarié a repris son poste. Il ne peut donc lui être reproché son absence injustifiée (♦Cass. soc., 25 mars 2009, n° 07-44.408, n° 620 F - P + B).\nRemarque : dans un tel cas de figure, se pose la question de savoir si l'employeur pourrait utiliser la procédure de la présomption de démission pour abandon de poste prévue à l'article  L. 1237-1-1 du code du travail. Aucune disposition ne l'interdit mais il semblerait que le recours à cette procédure ne soit pas conseillé dans la mesure où le contrat est suspendu en raison d'un manquement de l'employeur qui n'a pas organisé la visite de reprise.\nEn cas de licenciement pour faute du salarié qui avait repris ses fonctions sans avoir été convoqué à une visite de reprise, les juges ne peuvent prononcer la nullité de ce licenciement pour non-respect des règles protectrices contre le licenciement des salariés victimes d'accident du travail, que s'ils constatent l'origine professionnelle de l'arrêt de travail du salarié et la connaissance par l'employeur de cette origine professionnelle (♦Cass. soc., 4 nov. 2021, n° 20-17.834).\nDès que l'employeur a connaissance de la date de la fin de l'arrêt de travail, il saisit le service de prévention et de santé au travail (SPST) qui devra organiser l'examen médical le jour de la reprise effective du travail par le travailleur ou au plus tard dans un délai de 8 jours à compter de cette reprise du travail (C. trav., art. R. 4624-31).\nL'employeur ne peut pas exiger la reprise effective du travail au préalable pour organiser la visite de reprise.\nL'employeur ne pourra pas être sanctionné si cette convocation tardive résulte du service de prévention et de santé au travail (par exemple médecin du travail absent pour congés.\nLorsque la CPAM invite le salarié à reprendre son emploi avant le terme de l'arrêt de travail établi par le médecin traitant, l'employeur est fondé à n'autoriser la reprise du travail avant le terme initial qu'après avoir obtenu l'avis du médecin du travail. L'employeur peut s'opposer à une reprise du travail anticipée ; il ne commet pas de faute en ne suivant pas la décision de la CPAM (Cass. soc., 19 déc. 1991, n° 89-41.888).\n\nSituation du salarié qui refuse de revenir travailler : appréciation des circonstances:\nLorsque le salarié n'a pas encore passé la visite de reprise et refuse de se rendre sur un chantier, son contrat de travail est suspendu et son aptitude à reprendre le travail n'a pas été vérifiée. En conséquence, dans une espèce où l'employeur avait demandé au salarié de se déplacer à plus de 300 km de son domicile le jour même, le refus du salarié ne peut fonder valablement un licenciement (♦Cass. soc., 22 mars 2018, n° 16-22.179).\n   \nRémunération du salarié entre la fin de l'arrêt de travail et la visite de reprise:\nConcernant la rémunération du salarié absent entre la fin de l'arrêt de travail et la visite de reprise, il y a lieu d'appliquer le principe selon lequel « l'employeur ne peut être dispensé de payer leur salaire aux salariés qui se tiennent à sa disposition que s'il démontre l'existence d'une situation contraignante l'empêchant de fournir du travail ». Après un arrêt de travail pour maladie, le paiement du salaire est subordonné au fait que le salarié se tient à la disposition de l'employeur pour l'organisation de la visite de reprise ou bien a repris effectivement son activité à l'issue de son arrêt maladie (♦Cass. soc., 10 févr. 2016, n° 14-14.259 ♦Cass. soc., 23 sept. 2014, n° 12-24.967).\nLes juges du fond doivent rechercher, si la demande est faite, si le salarié s'était mis à la disposition de l'employeur, à l'issue de son arrêt de travail, pour passer la visite de reprise. Ils ne peuvent pas débouter le salarié au motif que ce dernier avait décidé de ne pas se présenter à son poste tant qu'il n'avait pas eu de visite de reprise. En l'espèce, ce dernier avait plusieurs fois sollicité l'employeur pour organiser cette visite de reprise et devant l'inaction de ce dernier, avait fait les démarches lui-même. Il a demandé le rappel de rémunération couvrant la période entre la fin de l'arrêt de travail et la visite de reprise (♦Cass. soc., 24 janv. 2024, n° 22-18.437).\n \nVous lirez les dispositions législatives relatives au suivi de l'état de santé des salariés en cliquant sur ce lien  :  https://travail-emploi.gouv.fr/suivi-de-la-sante-au-travail/medecine-de-prevention-et-acteurs-en-entreprise\n\nLa visite médicale de reprise doit être organisée par le médecin du travail du service de prévention et de santé au travail à la demande de l'employeur. Elle doit avoir lieu dans les 8 jours calendaires à compter de la reprise du travail du salarié.\n\nCette visite a pour objectif de vérifier l'aptitude du salarié à reprendre son poste ou d'envisager des aménagements ou un reclassement si nécessaire.\n\nEn cas de litige, il vous appartiendra de saisir le Conseil des Prud'hommes.\n\nBien à vous,"}, {"id": "id_100", "question": "Bonjour,\n\nUne salariée en arrêt maladie de plus de 60 jours doit reprendre son\nposte le lundi 16 décembre.\n\nSa direction l’informe qu’elle a un rdv a la médecine du travail le\nmardi 17 décembre après-midi et je cite « tu ne pourras reprendre ton\nposte qu’une fois la visite réalisée. Il faudra donc anticiper ton\nabsence du lundi 8 décembre. »\n\n* 1ere question : est-ce légal de lui demander de ne pas reprendre\navant alors que l’employeur a 8 jours pour la visite ?\n* 2 -ème question : l’employeur lui demande un arrêt le lundi mais\nmardi matin elle est en poste à 9H , ne doit-elle pas être en arrêt\négalement ? Comme le lundi\n\nVous remerciant de votre réponse,\n\nBonne journée", "reponse": "Madame,\n\nEn réponse à votre interrogation nous nous informons que :\n\nAprès une absence pour maladie ou accident non professionnel d'au moins 60 jours, une visite de reprise auprès de la médecine du travail doit être planifiée.\n\nDès que l'employeur a connaissance de la date de fin de l'arrêt de travail, il saisit le service de prévention et de santé au travail qui organise l'examen de reprise le 1er jour de la reprise ou dans un délai de 8 jours à compter de la reprise du travail par le salarié.\n(C. trav., art. R. 4624-32).\nL'examen de reprise peut avoir lieu quelques jours après le retour du salarié puisqu'il doit avoir lieu lors de la reprise du travail et au plus tard dans un délai de 8 jours (C. trav., art. R. 4624-31).\n\nTant que la visite de reprise n'a pas eu lieu, le salarié n'est pas tenu à l'obligation de venir travailler et son absence n'est pas fautive.\n(Le licenciement pour faute grave fondée sur l'absence injustifiée du salarié, qui n'est pas revenu dans l'entreprise à la suite de son arrêt de travail, est sans cause réelle et sérieuse) (Cass. soc., 22 févr. 2017, n° 15-22.378).\n\nIl est préconisé, dans la mesure du possible, de faire passer la visite de reprise dès le premier jour du retour du salarié.\nIl peut être dangereux de laisser le salarié travailler avant la visite de reprise car la responsabilité de l'employeur pourrait être mise en cause pour violation de l'obligation de sécurité si un préjudice est justifié.\n\nConcernant la rémunération du salarié absent entre la fin de l'arrêt de travail et la visite de reprise, il y a lieu d'appliquer le principe selon lequel « l'employeur ne peut être dispensé de payer leur salaire aux salariés qui se tiennent à sa disposition que s'il démontre l'existence d'une situation contraignante l'empêchant de fournir du travail ».\nAprès un arrêt de travail pour maladie, le paiement du salaire est subordonné au fait que le salarié se tient à la disposition de l'employeur pour l'organisation de la visite de reprise ou bien a repris effectivement son activité à l'issue de son arrêt maladie\n(Cass. soc., 10 févr. 2016, n° 14-14.259 ; Cass. soc., 23 sept. 2014, n° 12-24.967).\nLes juges du fond doivent rechercher, si la demande est faite, si le salarié s'était mis à la disposition de l'employeur, à l'issue de son arrêt de travail, pour passer la visite de reprise.\n\nIls ne peuvent pas débouter le salarié au motif que ce dernier avait décidé de ne pas se présenter à son poste tant qu'il n'avait pas eu de visite de reprise.\n\nLa salariée n'a donc pas à demander d'être en congés payés.\n\nCordialement."}, {"id": "id_101", "question": "Bonjour,\n\nUne salariée en arrêt maladie de plus de 60 jours doit reprendre son\nposte le lundi 16 décembre.\n\nSa direction l’informe qu’elle a un rdv a la médecine du travail le\nmardi 17 décembre après-midi et je cite « tu ne pourras reprendre ton\nposte qu’une fois la visite réalisée. Il faudra donc anticiper ton\nabsence du lundi 8 décembre. »\n\n* 1ere question : est-ce légal de lui demander de ne pas reprendre\navant alors que l’employeur a 8 jours pour la visite ?\n* 2 -ème question : l’employeur lui demande un arrêt le lundi mais\nmardi matin elle est en poste à 9H , ne doit-elle pas être en arrêt\négalement ? Comme le lundi\n\nVous remerciant de votre réponse,\n\nBonne journée", "reponse": "Bonjour,\n\n\nPour faire suite à votre demande, et sous réserve de l'appréciation souveraine des juges du fond;\n\n\nAprès un arrêt d’au moins 30 jours pour accident du travail, et 60 jours pour un arrêt de travail non professionnel, la visite de reprise est obligatoire. Elle doit avoir lieu dans les 8 jours calendaires à compter de la fin de l’arrêt de travail (art. R.4624-31 du Code du travail).\n\nLe contrat de travail reste suspendu jusqu'à la visite de reprise (Cass. soc., 3 juill. 2024, n° 23-13.78). Le salarié n'a donc pas à venir travailler tant qu'il n'a pas eu sa visite de reprise. Le cas échéant, l'employeur manquerait à son obligation de santé / sécurité.\nEntre la fin de l’arrêt de travail et la visite médicale, « le salarié qui, à l’issue de son arrêt de travail, se tient à la disposition de l’employeur pour passer la visite médicale de reprise, a droit au paiement de sa rémunération » (Cass. soc. 24.01.24, n°22-18.437).\n\nSi l’employeur tarde à organiser la visite de reprise, le salarié peut lui-même prendre rendez-vous et en informer l’employeur par écrit (Cass. soc. 12 nov. 1997, n°94-43.839).\n\nLe temps passé auprès du médecin du travail dans le cadre des visites médicales obligatoires, dont font partie les visites de reprise, est considéré comme du temps de travail et rémunéré comme tel. Le temps et les frais de transport nécessités par ces examens sont pris en charge par l’employeur (art. R. 4624-39 du Code du travail).\n\nÀ l’issue de la visite de reprise, le médecin du travail doit délivrer l’un des 3 documents suivants :\n\nUn avis d’inaptitude ;\n\nUn avis d’aptitude (uniquement s’il s’agit de salariés exposés à certains risques et bénéficiant d’un suivi médical renforcé) ;\n\nUne attestation de suivi. La remise de cette attestation équivaut à un avis d’aptitude implicite, dans le sens où, en l’absence d’avis d’inaptitude, le salarié doit retrouver son poste antérieur.\n\nLa notification de cette décision par le médecin du travail intervient au plus tard 15 jours après le premier examen de reprise.\n\n\n\nRestant à votre disposition pour toutes informations supplémentaires.\n\n\nCordialement,\n"}, {"id": "id_102", "question": "Bonjour,\n\nUne salariée en arrêt maladie de plus de 60 jours doit reprendre son\nposte le lundi 16 décembre.\n\nSa direction l’informe qu’elle a un rdv a la médecine du travail le\nmardi 17 décembre après-midi et je cite « tu ne pourras reprendre ton\nposte qu’une fois la visite réalisée. Il faudra donc anticiper ton\nabsence du lundi 8 décembre. »\n\n* 1ere question : est-ce légal de lui demander de ne pas reprendre\navant alors que l’employeur a 8 jours pour la visite ?\n* 2 -ème question : l’employeur lui demande un arrêt le lundi mais\nmardi matin elle est en poste à 9H , ne doit-elle pas être en arrêt\négalement ? Comme le lundi\n\nVous remerciant de votre réponse,\n\nBonne journée", "reponse": "Madame,\n\n \n\nPour faire suite à votre message, veuillez trouver les éléments de réponse suivants :\n\n \n\nL'employeur est en droit de refuser la reprise du travail avant la visite médicale de reprise. Il peut souhaiter s'assurer de l'aptitude du salarié avant toute reprise.\n\nEn principe, le délai entre la fin de l'arrêt maladie et la visite de reprise ne fait l'objet d'aucune rémunération, à moins que le salarié ne démontre qu'il se tenait à la disposition de l'employeur pour reprendre son poste et que c'est l'employeur qui ne lui a pas permis de le faire.\n\nDans le cas exposé, la salariée pourrait demander à l'employeur d'être rémunérée pour le lundi 15 ou mardi 16 dès lors qu'elle se tenait à sa disposition pour reprendre son travail.\n \n\n\n\nTous ces éléments sont donnés sous réserve de l’appréciation souveraine des juges du fond.\n\n \n\nVeuillez agréer, Madame, l’expression de nos salutations distinguées.\n\n "}, {"id": "id_103", "question": "Bonjour,\n\nUne salariée en arrêt maladie de plus de 60 jours doit reprendre son\nposte le lundi 16 décembre.\n\nSa direction l’informe qu’elle a un rdv a la médecine du travail le\nmardi 17 décembre après-midi et je cite « tu ne pourras reprendre ton\nposte qu’une fois la visite réalisée. Il faudra donc anticiper ton\nabsence du lundi 8 décembre. »\n\n* 1ere question : est-ce légal de lui demander de ne pas reprendre\navant alors que l’employeur a 8 jours pour la visite ?\n* 2 -ème question : l’employeur lui demande un arrêt le lundi mais\nmardi matin elle est en poste à 9H , ne doit-elle pas être en arrêt\négalement ? Comme le lundi\n\nVous remerciant de votre réponse,\n\nBonne journée", "reponse": "Bonjour,\n\nPour réponse ;\n\nSelon l'arrêt de la Cour de cassation, civile, Chambre sociale, 24 janvier 2024, 22-18.437 :\n\n\"Vu l'article L. 1221-1 du code du travail :\n\n11. Il résulte de ce texte que le salarié qui, à l'issue de son arrêt de travail, se tient à la disposition de l'employeur pour passer la visite médicale de reprise, a droit au paiement de sa rémunération.\"\n\nLe salarié doit donc (par écrit) :\ninformer son employeur de la date de fin de son arrêt de travail ;\ndemander à son employeur de bénéficier de la visite de reprise ;\nindiquer à son employeur qu’il se tient à sa disposition en attendant la visite de reprise.\n\nLe salarié ne reprend donc pas le travail en se tenant à la disposition de son employeur en attendant la visite de reprise.\nLe salarié aura droit au paiement de sa rémunération (selon la décision de la cour de cassation cité précédemment).\n\nJe reste à votre disposition pour tout renseignement complémentaire.\n\nCordialement,"}, {"id": "id_104", "question": "Bonjour,\n\nUne salariée en arrêt maladie de plus de 60 jours doit reprendre son\nposte le lundi 16 décembre.\n\nSa direction l’informe qu’elle a un rdv a la médecine du travail le\nmardi 17 décembre après-midi et je cite « tu ne pourras reprendre ton\nposte qu’une fois la visite réalisée. Il faudra donc anticiper ton\nabsence du lundi 8 décembre. »\n\n* 1ere question : est-ce légal de lui demander de ne pas reprendre\navant alors que l’employeur a 8 jours pour la visite ?\n* 2 -ème question : l’employeur lui demande un arrêt le lundi mais\nmardi matin elle est en poste à 9H , ne doit-elle pas être en arrêt\négalement ? Comme le lundi\n\nVous remerciant de votre réponse,\n\nBonne journée", "reponse": "Madame,\n\nL'absence du salarié entre la fin de son arrêt de travail et la visite médicale de reprise n'est pas en soi fautive dans la mesure où le contrat est encore suspendu jusqu'à la visite médicale de reprise. Cette solution est fondée sur le principe selon lequel « l'employeur, tenu d'une obligation de sécurité en matière de protection de la santé et de la sécurité des travailleurs dans l'entreprise, doit en assurer l'effectivité » (♦Cass. soc., 21 mai 2008, n° 07-41.102 ♦Cass. soc., 16 juin 2009, n° 08-41.519, n° 1352 F - P + B).\nTant que la visite de reprise n'a pas eu lieu, le salarié n'est pas tenu à l'obligation de venir travailler et son absence n'est pas fautive. Le licenciement pour faute grave fondée sur l'absence injustifiée du salarié, qui n'est pas revenu dans l'entreprise à la suite de son arrêt de travail, est sans cause réelle et sérieuse (♦Cass. soc., 22 févr. 2017, n° 15-22.378).\n\nConcernant la rémunération du salarié absent entre la fin de l'arrêt de travail et la visite de reprise, il y a lieu d'appliquer le principe selon lequel « l'employeur ne peut être dispensé de payer leur salaire aux salariés qui se tiennent à sa disposition que s'il démontre l'existence d'une situation contraignante l'empêchant de fournir du travail ». Après un arrêt de travail pour maladie, le paiement du salaire est subordonné au fait que le salarié se tient à la disposition de l'employeur pour l'organisation de la visite de reprise ou bien a repris effectivement son activité à l'issue de son arrêt maladie (♦Cass. soc., 10 févr. 2016, n° 14-14.259 ♦Cass. soc., 23 sept. 2014, n° 12-24.967).\n\nEn cas de litige, les juges* doivent rechercher, si la demande est faite, si le salarié s'était mis à la disposition de l'employeur, à l'issue de son arrêt de travail, pour passer la visite de reprise. Ils ne peuvent pas débouter le salarié au motif que ce dernier avait décidé de ne pas se présenter à son poste tant qu'il n'avait pas eu de visite de reprise. En l'espèce, ce dernier avait plusieurs fois sollicité l'employeur pour organiser cette visite de reprise et devant l'inaction de ce dernier, avait fait les démarches lui-même. Il a demandé le rappel de rémunération couvrant la période entre la fin de l'arrêt de travail et la visite de reprise (♦Cass. soc., 24 janv. 2024, n° 22-18.437).\n\n*la saisine du Conseil des prud'hommes (juridiction compétente pour le règlement des litiges) :\n                - https://travail-emploi.gouv.fr/droit-du-travail/le-reglement-des-conflits-individuels-et-collectifs/article/le-conseil-de-prud-hommes\n                - https://www.service-public.fr/particuliers/vosdroits/R45128\n                - https://normandie.dreets.gouv.fr/Les-defenseurs-syndicaux-modification-de-la-liste-pour-la-Normandie (défenseur syndical)\n\n"}, {"id": "id_105", "question": "Bonjour,\n\nUne salariée en arrêt maladie de plus de 60 jours doit reprendre son\nposte le lundi 16 décembre.\n\nSa direction l’informe qu’elle a un rdv a la médecine du travail le\nmardi 17 décembre après-midi et je cite « tu ne pourras reprendre ton\nposte qu’une fois la visite réalisée. Il faudra donc anticiper ton\nabsence du lundi 8 décembre. »\n\n* 1ere question : est-ce légal de lui demander de ne pas reprendre\navant alors que l’employeur a 8 jours pour la visite ?\n* 2 -ème question : l’employeur lui demande un arrêt le lundi mais\nmardi matin elle est en poste à 9H , ne doit-elle pas être en arrêt\négalement ? Comme le lundi\n\nVous remerciant de votre réponse,\n\nBonne journée", "reponse": "Madame\n\nLa salariée n’était pas tenue de reprendre le travail tant que la visite de reprise n’a pas été organisée par l’employeur si elle se tenait disponible pour réaliser cette visite.\n\nL’employeur ne peut évidemment pas exiger un arrêt. Seul le corps médical peut évaluer l’état de santé d’un salarié. Et selon l’arrêt de la Cour de Cassation 24.01.24, n°22-18.437, l’employeur doit-prendre en charge le salaire de la fin de l’arrêt maladie jusqu’à la visite de reprise.\n\nCordialement"}, {"id": "id_106", "question": "Bonjour,\n\nUne salariée en arrêt maladie de plus de 60 jours doit reprendre son\nposte le lundi 16 décembre.\n\nSa direction l’informe qu’elle a un rdv a la médecine du travail le\nmardi 17 décembre après-midi et je cite « tu ne pourras reprendre ton\nposte qu’une fois la visite réalisée. Il faudra donc anticiper ton\nabsence du lundi 8 décembre. »\n\n* 1ere question : est-ce légal de lui demander de ne pas reprendre\navant alors que l’employeur a 8 jours pour la visite ?\n* 2 -ème question : l’employeur lui demande un arrêt le lundi mais\nmardi matin elle est en poste à 9H , ne doit-elle pas être en arrêt\négalement ? Comme le lundi\n\nVous remerciant de votre réponse,\n\nBonne journée", "reponse": "Bonjour,\n\nLorsqu’un arrêt maladie dépasse 60 jours, la visite de reprise auprès de la médecine du travail est obligatoire, mais l’employeur dispose effectivement de 8 jours à compter de la reprise du salarié pour l’organiser.\nLa salariée peut donc reprendre son poste dès la fin de son arrêt, même si la visite n’a pas encore eu lieu.\n\nConcernant le fait de lui demander un « arrêt » pour le lundi l'employeur n’a pas le droit de lui demander de se mettre en arrêt maladie.\nS’il refuse sa présence le lundi (ou le mardi matin), il doit lui payer ces heures comme une absence imputable à l’employeur, pas comme un arrêt maladie.\n\nCordialement,"}, {"id": "id_107", "question": "Bonjour,\n\nUne salariée en arrêt maladie de plus de 60 jours doit reprendre son\nposte le lundi 16 décembre.\n\nSa direction l’informe qu’elle a un rdv a la médecine du travail le\nmardi 17 décembre après-midi et je cite « tu ne pourras reprendre ton\nposte qu’une fois la visite réalisée. Il faudra donc anticiper ton\nabsence du lundi 8 décembre. »\n\n* 1ere question : est-ce légal de lui demander de ne pas reprendre\navant alors que l’employeur a 8 jours pour la visite ?\n* 2 -ème question : l’employeur lui demande un arrêt le lundi mais\nmardi matin elle est en poste à 9H , ne doit-elle pas être en arrêt\négalement ? Comme le lundi\n\nVous remerciant de votre réponse,\n\nBonne journée", "reponse": "Bonjour,\n\nPour faire suite à votre demande, veuillez trouver en suivant quelques éléments de réponse :\n\nSous-section 2 : Situation du salarié entre la fin de l'arrêt de travail et la  visite de  reprise\n\n45\n\nÉcrire à la rédaction\n\nSituation du salarié pendant le délai de 8 jours au cours duquel la visite de reprise doit être organisée\n\nL'examen de reprise peut avoir lieu quelques jours après le retour du salarié puisqu'il doit avoir lieu lors de la reprise du travail et au plus tard dans un délai de 8 jours (C. trav., art. R. 4624-31). Ce qui pose le problème du statut du salarié entre la fin de son arrêt de travail et la visite de reprise . En effet, le salarié est censé reprendre son travail dès la fin de son arrêt de travail mais parallèlement, par une fiction juridique, son contrat est suspendu jusqu'à la visite de reprise  !\n\nil est préconisé, dans la mesure du possible, de faire passer la visite de reprise dès le premier jour du retour du salarié. Il peut être dangereux de laisser le salarié travailler avant la visite de reprise car la responsabilité de l'employeur pourrait être mise en cause pour violation de l'obligation de sécurité si un préjudice est justifié.\n\n1°Situation du salarié qui a repris son poste : il est soumis au pouvoir disciplinaire de l'employeur\n\nLe salarié dont le contrat de travail est suspendu pour maladie et qui reprend son travail avant d'avoir fait l'objet de la visite médicale de reprise est soumis au pouvoir disciplinaire de l'employeur (Cass. soc., 16 nov. 2005, n° 03-45.000, n° 2464 FS - P + B). Ainsi l'employeur peut licencier pour faute un salarié :\n\nqui a commis une faute (abandon de poste au sixième jour de reprise ) pendant le délai de 8 jours durant lequel la prestation de travail peut être exécutée sans que la visite de reprise ne soit effectuée, en l'absence d'élément médical justifiant que le salarié n'aurait pas été en état de tenir son poste ou qu'il aurait été obligé de cesser sa prestation de travail en raison de son état de santé (Cass. soc., 17 oct. 2012, n° 11-22.287) ;\nqui a commis une faute le premier jour de la reprise alors que la visite de reprise était prévue pour le lendemain (Cass. soc., 16 nov. 2005, n° 03-45.000, n° 2464 FS - P + B).\n2°Situation du salarié qui n'a pas repris son poste à la fin de son arrêt de travail\n\na)Absence de mise en demeure de l'employeur\n\nL'absence du salarié entre la fin de son arrêt de travail et la visite médicale de reprise n'est pas en soi fautive dans la mesure où le contrat est encore suspendu jusqu'à la visite médicale de reprise . Cette solution est fondée sur le principe selon lequel « l'employeur, tenu d'une obligation de sécurité en matière de protection de la santé et de la sécurité des travailleurs dans l'entreprise, doit en assurer l'effectivité » (Cass. soc., 21 mai 2008, n° 07-41.102 Cass. soc., 16 juin 2009, n° 08-41.519, n° 1352 F - P + B).\n\nTant que la visite de reprise n'a pas eu lieu, le salarié n'est pas tenu à l'obligation de venir travailler et son absence n'est pas fautive. Le licenciement pour faute grave fondée sur l'absence injustifiée du salarié, qui n'est pas revenu dans l'entreprise à la suite de son arrêt de travail, est sans cause réelle et sérieuse (Cass. soc., 22 févr. 2017, n° 15-22.378).\n\nPar ailleurs, si l'arrêt de travail résulte d'un accident du travail, le salarié peut se prévaloir, en cas de licenciement pour absence rendant nécessaire son remplacement, des règles protectrices contre le licenciement applicables aux salariés victimes d'un accident du travail. Notamment, il peut se prévaloir de l'interdiction de licencier pendant l'arrêt de travail hors faute grave ou impossibilité de maintenir le contrat (Cass. soc., 6 mars 2017, n° 15-26.848).\n\nb)Absence malgré une mise en demeure de l'employeur\n\nToutefois, il peut en aller différemment si l'employeur met en demeure le salarié de justifier son absence et que celui-ci ne se manifeste pas. Dans ce cas, le salarié met l'employeur dans l'impossibilité de gérer la situation : situation d'absence justifiée du fait de la prolongation de l'arrêt de travail ou situation de fin d'arrêt de travail nécessitant l'organisation d'une visite de reprise . Le salarié peut alors être considéré comme fautif pour absence injustifiée (Cass. soc., 13 janv. 2021, n° 19-10.437) : voir ci-après.\n\n46\n\nÉcrire à la rédaction\n\nSituation du salarié qui n'a pas eu de visite de reprise dans le délai de 8 jours\n\nL'employeur, tenu d'une obligation de sécurité de résultat en matière de protection de la santé et de la sécurité des salariés, ne peut laisser un salarié reprendre son travail après une période d'absence d'au moins 30 jours pour cause d'accident (du travail ou non) ou pour maladie simple, sans le faire bénéficier, lors de la reprise du travail, ou au plus tard dans les 8 jours, d'un examen par le médecin du travail destiné à apprécier son aptitude à reprendre son ancien emploi. Il en résulte que jusqu'à la date de la visite de reprise , le contrat de travail est suspendu, même si le salarié a repris son travail (Cass. soc., 30 nov. 2010, n° 09-40.160).\n\n1°Situation du salarié qui ne revient pas travailler\n\na)En l'absence de mise en demeure de l'employeur\n\nLorsque l'employeur manque à son obligation d'organiser la visite de reprise , « l'employeur qui n'a pas organisé la visite de reprise obligatoire à l'issue d'une absence pour maladie peut seulement, dans le cas d'un licenciement disciplinaire, reprocher au salarié, dont le contrat demeure suspendu, des manquements à l'obligation de loyauté » (Cass. soc., 18 mars 2003, n° 01-41.343 Cass. soc., 6 mars 2017, n° 15-27.577).\n\nIl ne peut pas notamment reprocher au salarié son absence injustifiée. Sont sans cause réelle et sérieuse :\n\nle licenciement pour faute grave résultant de l'absence injustifiée (Cass. soc., 22 févr. 2017, n° 15-22.378) ;\nle licenciement pour absence suite à un arrêt de travail pour accident du travail rendant nécessaire le remplacement du salarié.\nLe salarié peut se prévaloir des règles protectrices contre le licenciement applicable aux salariés victimes d'un accident du travail (Cass. soc., 6 mars 2017, n° 15-26.848).\n\nSur le refus du salarié de répondre à la convocation à une visite de reprise , voir n° 57.\n\nb)Après une mise en demeure de l'employeur\n\nSi, en dépit d'une mise en demeure de l'employeur, le salarié n'adresse pas les justificatifs de son absence ou ne manifeste pas son intention de reprendre le travail, il ne peut être reproché à l'employeur, laissé sans nouvelles, de ne pas avoir organisé la visite de reprise . L'absence injustifiée du salarié constitue une faute grave rendant impossible le maintien du salarié dans l'entreprise (Cass. soc., 13 janv. 2021, n° 19-10.437).\n\nIl semblerait possible de recourir à la procédure de la présomption de démission pour abandon de poste prévue par l'article L. 1237-1-1 du code du travail. Il appartiendra à la Cour de cassation de se prononcer.\n\n2°Situation du salarié qui revient travailler à l'issue de son arrêt de travail\n\nPendant la période entre la fin de l'arrêt de travail et la visite de reprise , le salarié qui revient travailler est soumis au pouvoir disciplinaire de l'employeur : « le salarié dont le contrat de travail est suspendu pour maladie et qui reprend son travail avant d'avoir fait l'objet d'une visite de reprise est soumis au pouvoir disciplinaire de l'employeur » (Cass. soc., 16 nov. 2005, n° 03-45.000, n° 2464 FS - P + B).\n\nN'est pas constitutif de faute justifiant un licenciement, le fait de cesser de venir travailler 5 mois après avoir repris le poste lorsque le salarié, suite à un arrêt de travail pour accident du travail n'a pas eu de visite de reprise . En l'absence de visite de reprise , le contrat reste suspendu, même si le salarié a repris son poste. Il ne peut donc lui être reproché son absence injustifiée (Cass. soc., 25 mars 2009, n° 07-44.408, n° 620 F - P + B).\n\ndans un tel cas de figure, se pose la question de savoir si l'employeur pourrait utiliser la procédure de la présomption de démission pour abandon de poste prévue à l'article L. 1237-1-1 du code du travail. Aucune disposition ne l'interdit mais il semblerait que le recours à cette procédure ne soit pas conseillé dans la mesure où le contrat est suspendu en raison d'un manquement de l'employeur qui n'a pas organisé la visite de reprise .\n\nEn cas de licenciement pour faute du salarié qui avait repris ses fonctions sans avoir été convoqué à une visite de reprise , les juges ne peuvent prononcer la nullité de ce licenciement pour non-respect des règles protectrices contre le licenciement des salariés victimes d'accident du travail, que s'ils constatent l'origine professionnelle de l'arrêt de travail du salarié et la connaissance par l'employeur de cette origine professionnelle (Cass. soc., 4 nov. 2021, n° 20-17.834).\n\n3°Situation du salarié qui refuse de revenir travailler : appréciation des circonstances\n\nLorsque le salarié n'a pas encore passé la visite de reprise et refuse de se rendre sur un chantier, son contrat de travail est suspendu et son aptitude à reprendre le travail n'a pas été vérifiée. En conséquence, dans une espèce où l'employeur avait demandé au salarié de se déplacer à plus de 300 km de son domicile le jour même, le refus du salarié ne peut fonder valablement un licenciement (Cass. soc., 22 mars 2018, n° 16-22.179).\n\n47\n\nÉcrire à la rédaction\n\nRémunération du salarié\n\nConcernant la rémunération du salarié absent entre la fin de l'arrêt de travail et la visite de reprise , il y a lieu d'appliquer le principe selon lequel « l'employeur ne peut être dispensé de payer leur salaire aux salariés qui se tiennent à sa disposition que s'il démontre l'existence d'une situation contraignante l'empêchant de fournir du travail ». Après un arrêt de travail pour maladie, le paiement du salaire est subordonné au fait que le salarié se tient à la disposition de l'employeur pour l'organisation de la visite de reprise ou bien a repris effectivement son activité à l'issue de son arrêt maladie (Cass. soc., 10 févr. 2016, n° 14-14.259 Cass. soc., 23 sept. 2014, n° 12-24.967).\n\nLes juges du fond doivent rechercher, si la demande est faite, si le salarié s'était mis à la disposition de l'employeur, à l'issue de son arrêt de travail, pour passer la visite de reprise . Ils ne peuvent pas débouter le salarié au motif que ce dernier avait décidé de ne pas se présenter à son poste tant qu'il n'avait pas eu de visite de reprise . En l'espèce, ce dernier avait plusieurs fois sollicité l'employeur pour organiser cette visite de reprise et devant l'inaction de ce dernier, avait fait les démarches lui-même. Il a demandé le rappel de rémunération couvrant la période du 12 novembre 2019 (fin de l'arrêt de travail) et le 8 janvier 2020, date du constat d'inaptitude (Cass. soc., 24 janv. 2024, no 22-18.437).\n\n \n\n\n\n\n\nCordialement"}, {"id": "id_108", "question": "Bonjour,\n\nUne salariée en arrêt maladie de plus de 60 jours doit reprendre son\nposte le lundi 16 décembre.\n\nSa direction l’informe qu’elle a un rdv a la médecine du travail le\nmardi 17 décembre après-midi et je cite « tu ne pourras reprendre ton\nposte qu’une fois la visite réalisée. Il faudra donc anticiper ton\nabsence du lundi 8 décembre. »\n\n* 1ere question : est-ce légal de lui demander de ne pas reprendre\navant alors que l’employeur a 8 jours pour la visite ?\n* 2 -ème question : l’employeur lui demande un arrêt le lundi mais\nmardi matin elle est en poste à 9H , ne doit-elle pas être en arrêt\négalement ? Comme le lundi\n\nVous remerciant de votre réponse,\n\nBonne journée", "reponse": "Bonjour,\n« …1ère question : Était-ce légal de lui demander de ne pas reprendre avant alors que l’employeur a 8 jours pour la visite ?... »\n\nLa demande de l’employeur de ne pas reprendre avant la visite médicale n’était pas légale, car la salariée pouvait reprendre son poste dès le 16 décembre, à condition que la visite soit organisée dans les 8 jours (ce qui était le cas) : L’article R4624-31 du Code du travail\n\n « …2ème question : l’employeur lui a demandé un arrêt le lundi mais mardi matin elle était en poste à 9H , ne devait-elle pas être en arrêt également ? Comme le lundi… »\n\n La salariée n’avait pas à être en arrêt le mardi matin, car son contrat n’était plus suspendu dès sa reprise effective. L’employeur ne pouvait pas exiger un arrêt pour cette journée.\n\nSi la visite a eu lieu avant le 24/12/2025, la situation est régularisée, mais la salariée peut réclamer le paiement du 17/12 matin si elle a travaillé sans être payée.\nDans ce cas, il est préférable de faire la demande en courrier recommandé avec AR.\n\nCordialement."}, {"id": "id_109", "question": "Bonjour,\n\nJe me permets de vous contacter afin de vous exposer une difficulté que\nje rencontre avec mon employeur.\n\nJe suis chauffeur de taxi salarié en CDI, et il m’est régulièrement\ndemandé de rester disponible sur des plages horaires étendues, même\nen l’absence de mission clairement définie. Notamment, pour la\njournée du vendredi 12 décembre, mon employeur me demande d’être\ndisponible de 8h30 à 17h30, alors qu’aucune course ne m’a été\naffectée à ce jour.\n\nOr, selon les informations que j'ai précédemment obtenues, en l’absence de mission ou d’astreinte clairement\nencadrée, mes horaires de disponibilité doivent correspondre à ceux\nd’ouverture du bureau, soit de 8h00 à 12h00 le vendredi. Mon\nemployeur semble refuser cette organisation, sans fournir de\njustification légale ou de cadre formel d’astreinte.\n\nJe vous remercie par avance pour votre éclairage sur la situation,\nainsi que pour votre aide afin de savoir quelles démarches je peux\nentreprendre pour faire valoir mes droits dans ce contexte.\n\nBien cordialement,", "reponse": "Bonjour,\n\nEn tant que chauffeur de taxi salarié en CDI, vous n'êtes pas tenu de rester disponible sur des plages horaires étendues sans mission assignée ni cadre formel d'astreinte, car cela pourrait qualifier une astreinte non indemnisée, contraire au Code du travail et à la convention collective nationale des taxis (IDCC 2219). La convention prévoit pour les astreintes :\n\n-   une programmation individuelle des astreintes : communication par écrit au moins 30 jours à l'avance. En cas de circonstances exceptionnelles dûment justifiées, le délai est réduit à 7 jours calendaires\n-   une contrepartie : indemnité égale à 25 % du salaire horaire ou repos compensateur équivalent\n\nLa disponibilité permanente sans être sur le lieu de travail et sans pouvoir vaquer librement à des occupations personnelles constitue une astreinte au sens de l'article L.3121-9 du Code du travail, surtout si elle vise à être joignable pour des missions potentielles. La convention (accord du 5 février 2020) rappelle que \"le salarié peut refuser l'astreinte sans que ce refus ne constitue ni une faute, ni un motif de licenciement.\" De plus, en cas d'intervention du salarié pendant une période d'astreinte, la durée de l'intervention est considérée comme du temps de travail effectif, temps de déplacement inclus.\n\nEn dehors de ce cadre de l'astreinte, le temps d'attente est considéré comme du temps travail effectif inclus dans le calcul des éventuelles heures supplémentaires et des durées maximales journalières. En aucun cas le temps d'attente ne peut être assimilé à une coupure et ainsi décompté du temps de travail.\n\nJe n'ai en revanche pas connaissance d'un texte mentionnant que les horaires de disponibilité doivent correspondre à ceux d’ouverture du bureau, soit de 8h00 à 12h00 (cela est peut-être prévu par le contrat de travail ou un accord d'entreprise).\n\nSi vous estimez que votre employeur ne respecte pas les règles légales ou conventionnelles, vous pouvez le lui demander par courrier recommandé avec accusé de réception. En l'absence d'accord amiable, vous pouvez saisir le conseil de prud'hommes.\n\nCes éléments vous sont donnés sous réserve de l’appréciation souveraine des juridictions compétentes.\n\nJe reste à votre disposition pour toute précision,\n\nRespectueusement,"}, {"id": "id_110", "question": "Bonjour,\n\nJe me permets de vous contacter afin de vous exposer une difficulté que\nje rencontre avec mon employeur.\n\nJe suis chauffeur de taxi salarié en CDI, et il m’est régulièrement\ndemandé de rester disponible sur des plages horaires étendues, même\nen l’absence de mission clairement définie. Notamment, pour la\njournée du vendredi 12 décembre, mon employeur me demande d’être\ndisponible de 8h30 à 17h30, alors qu’aucune course ne m’a été\naffectée à ce jour.\n\nOr, selon les informations que j'ai précédemment obtenues, en l’absence de mission ou d’astreinte clairement\nencadrée, mes horaires de disponibilité doivent correspondre à ceux\nd’ouverture du bureau, soit de 8h00 à 12h00 le vendredi. Mon\nemployeur semble refuser cette organisation, sans fournir de\njustification légale ou de cadre formel d’astreinte.\n\nJe vous remercie par avance pour votre éclairage sur la situation,\nainsi que pour votre aide afin de savoir quelles démarches je peux\nentreprendre pour faire valoir mes droits dans ce contexte.\n\nBien cordialement,", "reponse": "Monsieur,\n\n\nEn réponse à votre courriel, nous vous communiquons ces dispositions de la CCN taxis, (Extrait de l'accord du 05 février 2020) :\n\nArticle 4-1 - Définition du temps de travail effectif des personnels roulants\n\nIl s'entend du temps de travail s'écoulant entre le début et la fin de la journée de travail, quel que soit le lieu où il s'exécute, à l'exclusion du temps consacré au repas, des temps de pause et plus généralement toutes interruptions entre les deux séquences de travail qui ne sont pas du travail effectif dès lors que le salarié peut vaquer librement à ses occupations personnelles.\nLe temps de travail effectif du personnel roulant est donc calculé sur la base de l'amplitude diminuée des temps de pauses ou de coupures dans le respect des règles fixées à l'article 4-2 du présent accord.\n\nArticle 4-2 - Pauses, coupures et temps d'attente\n\nLa Pause\n\nLe temps de pause est un arrêt de travail de courte durée. Le salarié peut alors vaquer librement à ses occupations personnelles sans avoir à respecter les directives de l'employeur (par exemple pour téléphoner, prendre un café). La pause n'est donc pas considérée comme du temps de travail effectif.\nConformément aux dispositions de l'article L. 3121-16 du Code du Travail, dès que le temps de travail quotidien du salarié atteint 5 h 30, le salarié bénéficie d'une pause d'une durée minimale de 25 minutes. Cette pause de 25 minutes peut être accordée à l'issue des 5 h 30 ou avant que ce temps ne soit écoulé. Il est précisé que cette pause légale ne peut coïncider avec la pause repas.\nUn accord d'entreprise ou d'établissement peut fixer une durée de pause supérieure à la durée minimale de 25 minutes.\n\nPause repas\n\nEn cas de journée continue l'employeur est tenu de donner une coupure pour le repas de midi au minimum de 30 minutes fixée pour chaque salarié en fonction des tâches à exécuter, mais au plus tôt pour la pause déjeuner à partir de 11 h et au plus tard jusqu'à 14 h 30 et au plus tôt pour la pause dîner à partir de 19 h et au plus tard 22 h.\n\nCoupures\n\nEst ainsi qualifiée, toute période d'interruption d'activité décidée par l'employeur. Ainsi une période de travail peut comporter une
