t pas compétents pour :\n- les demandes d’intervention en entreprise, qui relèvent de la compétence des sections d’inspection du travail (Contacter l'inspection du travail dans l'Eure - Directions régionales de l'économie, de l'emploi, du travail et des solidarités (DREETS)\n- régler les litiges qui sont de la compétence de Conseil de prud’hommes ;\n- constituer un dossier prud’homal ;\n- effectuer ou vérifier les calculs de rémunération, d'indemnités de rupture de contrat ou de congés payés, etc. ;\n- effectuer ou vérifier les calculs de jours de congés payés ou de repos ;\n- renseigner sur les cotisations sociales qui est de la compétence de l’URSSAF ;\n- renseigner sur le droit à assurance chômage, cette mission étant du domaine de France Travail (anciennement Pôle Emploi).\n\n*la saisine du Conseil des prud'hommes (juridiction compétente pour le règlement des litiges) :\n- https://travail-emploi.gouv.fr/droit-du-travail/le-reglement-des-conflits-individuels-et-collectifs/article/le-conseil-de-prud-hommes\n- https://www.service-public.fr/particuliers/vosdroits/R45128\n- https://normandie.dreets.gouv.fr/Les-defenseurs-syndicaux-modification-de-la-liste-pour-la-Normandie (défenseur syndical)"}, {"id": "id_138", "question": "Bonjour comment allez-vous j ai besoin de renseignements et je voudrais faire un signalement au sujet du confort au travail. Alors je voudrais savoir si j ai le droit de refuser mon rdv de visite médicale sur un jour de repos. Pour le confort au travail nous travaillons avec un petit chauffage qui chauffe très très mal en plus moi et mon collègue sont près de la vitrine et de la porte entrez ou les clients rentre ,le midi ont mange ds une salle réfectoire sans chauffage bref et j en passe \nsurtout je souhaite faire se signalement en inconnu merci à vous", "reponse": "Bonjour,\n\nPour faire suite à votre mail et sous réserve de l’appréciation souveraine des tribunaux, veuillez trouver les informations suivantes :\n\nLa surveillance de l'état de santé des travailleurs est exercée essentiellement au moyen de visites et d'examens médicaux obligatoirement effectués :\n\n-   à l'embauche par une visite d'information et de prévention d'embauche (C. trav., art. R. 4624-10) ou, s'il s'agit d'un emploi à risque, par un examen médical d'aptitude d'embauche (C. trav., art. R. 4624-24) ;\n    \n-   de façon périodique, selon une périodicité qui peut être différente selon la nature de l'emploi ou l'état de santé du salarié (C. trav., art. R. 4624-16 et R. 4624-28) ;\n    \n-   à la demande du salarié, de l'employeur ou du médecin du travail (C. trav., art. R. 4624-34) ;\n    \n-   à la reprise du travail après un congé de maternité, une absence pour maladie professionnelle quelle que soit sa durée, une absence d'au moins 30 jours pour cause d'accident du travail, après une absence d'au moins 60 jours pour cause maladie ou d'accident non professionnel (C. trav., art. R. 4624-31) ;\n    \n-   au cours de l'année du 45e anniversaire du travailleur ;\n    \n-   après avoir été exposés à un ou plusieurs risques particuliers au cours de sa carrière\n    \n\nLe salarié peut également bénéficier, de manière facultative :\n\n-   d'une visite de préreprise (C. trav., art. L. 4624-2-4) ;\n    \n-   d'un rendez-vous de liaison (C. trav., art. L. 1226-1-3) après une absence de plus de 30 jours.\n    \n\n\nLe temps nécessité par les visites et examens médicaux, y compris les examens complémentaires est soit pris sur les heures de travail des salariés sans qu'il puisse pour cela être effectué une retenue de salaire, soit rémunéré comme temps de travail normal lorsque ces examens ne peuvent avoir lieu pendant les heures de travail.\n\nLes frais de transport nécessités par ces examens sont pris en charge par les employeurs. C. trav., art. R. 4624-39\n\n\n\nLe salarié doit bénéficier de 11 heures de repos consécutives. En conséquence, la visite médicale ne doit pas conduire à priver le salarié de ce repos minimal. Le salarié ne peut être convoqué pendant ce temps de repos. C'est ce qui s'est passé pour un travailleur de nuit qui terminait son service à 6 h 30 et qui a été convoqué pour une visite médicale à 8 heures du matin (heure d'ouverture du service de santé autonome). Cette convocation le privait du repos minimal de 11 heures. Il y a violation du temps de repos quotidien ouvrant droit à des dommages-intérêts.\n\nCass. soc., 27 juin 2012, n° 10-21.306, n° 1618 FS - P + B\n\n\n\n\n\nConcernant les locaux de travail, l'article R. 4223-13 du Code du travail prévoit que les locaux fermés affectés au travail sont chauffés pendant la saison froide et le chauffage fonctionne de manière à maintenir une température convenable et à ne donner lieu à aucune émanation délétère\n\nL’article R4223-14 précise quant à lui que la température des locaux annexes, tels que les locaux de restauration, locaux de repos, locaux pour les travailleurs en service de permanence, locaux sanitaires et locaux de premier secours, obéit à la destination spécifique de ces locaux.\n\nL'employeur doit prendre les mesures nécessaires pour rendre effective ces dispositions légales.\n\nVous avez la possibilité d’effectuer une réclamation auprès de votre employeur ou de saisir vos représentants du personnel quant à vos conditions de travail, si vous en avez dans votre entreprise.\n\nL'inspecteur du travail est également compétent pour le contrôle de vos conditions de travail dans l'entreprise . Vous pouvez le saisir pour une demande d'intervention dans votre entreprise si l'employeur ne respectait pas ces dispositions.\nPour trouver les coordonnées du service de contrôle compétent pour votre entreprise: https://hauts-de-france.dreets.gouv.fr/Inspection-du-travail-je-trouve-mon-unite-de-controle-en-ligne\n\nCordialement,"}, {"id": "id_139", "question": "Bonjour comment allez-vous j ai besoin de renseignements et je voudrais faire un signalement au sujet du confort au travail. Alors je voudrais savoir si j ai le droit de refuser mon rdv de visite médicale sur un jour de repos. Pour le confort au travail nous travaillons avec un petit chauffage qui chauffe très très mal en plus moi et mon collègue sont près de la vitrine et de la porte entrez ou les clients rentre ,le midi ont mange ds une salle réfectoire sans chauffage bref et j en passe \nsurtout je souhaite faire se signalement en inconnu merci à vous", "reponse": "Monsieur,\n\nLe refus constitue une faute grave pouvant justifier une sanction disciplinaire, y compris un licenciement. L'employeur doit généralement convoquer pendant les horaires de travail, mais peut programmer sur un repos si nécessaire, en respectant le repos quotidien minimum de 11 heures consécutives.\nConcernant les constats que vous soulevez, il faut plus de détails sur les différents désagréments et le nom de l'entreprise.\nBien cordialement,\nL.CANIVEZ"}, {"id": "id_140", "question": "Bonjour comment allez-vous j ai besoin de renseignements et je voudrais faire un signalement au sujet du confort au travail. Alors je voudrais savoir si j ai le droit de refuser mon rdv de visite médicale sur un jour de repos. Pour le confort au travail nous travaillons avec un petit chauffage qui chauffe très très mal en plus moi et mon collègue sont près de la vitrine et de la porte entrez ou les clients rentre ,le midi ont mange ds une salle réfectoire sans chauffage bref et j en passe \nsurtout je souhaite faire se signalement en inconnu merci à vous", "reponse": "Quant à votre signalement au sujet du chauffage, nous vous conseillons de contacter votre employeur en premier lieu, les représentants du personnel en second lieu, si cela ne se résout pas, il convient de faire un signalement à l'inspection du travail.\n\nPour ce faire, il convient que vous fournissiez l'adresse de l'établissement dans lequel vous exercez vos missions. Si ce lieu se situe dans la MANCHE nous transmettrons à l'inspection du travail compétente. Notre service et l'inspection du travail sont tenus à un devoir de confidentialité et ne révélerons pas l'origine de la plainte."}, {"id": "id_141", "question": "Ma femme a terminé son contrat le 31 octobre et son employeur refuse de lui envoyer son attestation Pôle Emploi. Que faire ?", "reponse": "Monsieur,\n\nEn réponse à votre courriel, je vous invite à prendre connaissance de ce lien d'information :\n\n=> Fin de contrat : documents à remettre au salarié | Service Public\n\n=> Attestation employeur destinée à France Travail (anciennement Pôle emploi) - Code du travail numérique\nVous lirez notamment :\nL'attestation France Travail permet au salarié de faire valoir ses droits à l'allocation chômage, sous conditions.\nIl n'a pas l'obligation de la transmettre au salarié par courrier.\nLe document est quérable, c'est-à-dire qu'il est tenu à la disposition du salarié dans les locaux de l'entreprise.\n\nL'absence de remise ou la remise tardive de l'attestation France Travail peut causer un retard de versement de l'allocation chômage (ARE).\nSi c'est le cas, le salarié peut saisir le conseil de prud'hommes (CPH). Des dommages et intérêts peuvent alors être versés si le préjudice est reconnu.\n\nSi l'employeur n'a cependant pas laissé à la disposition du salarié ses documents de fin de contrat sur le lieu de travail, je conseille d'adresser une lettre recommandée AR à l'employeur .\nLe modèle est à personnaliser et adapter à la situation :\n=> Modèle de lettre : Réclamation des documents de fin de contrat - Code du travail numérique\n\nCordialement."}, {"id": "id_142", "question": "Ma femme a terminé son contrat le 31 octobre et son employeur refuse de lui envoyer son attestation Pôle Emploi. Que faire ?", "reponse": "Bonjour,\n\n\nPour faire suite à votre demande, et sous réserve de l'appréciation souveraine des juges du fond;\n\n\nÀ la fin du contrat, l'employeur doit remettre au salarié :\n Le certificat de travail [ art. L. 1234-19 du code du travail (CDT) ] contenant la date d'entrée du salarié et celle de sa sortie, ainsi que la nature de l'emploi (art. D. 1234-6 du CDT).\nLe solde tout compte qui fait l'inventaire des sommes versées au salarié lors de la rupture du contrat de travail (art. L. 1234-20 du CDT), il doit être établi en double exemplaire, ce qui doit être mentionné (art. D. 1234-7 du CDT). Les montants associés doivent être réglés dans le même délai.\nLa signature du solde de tout compte n'est pas obligatoire. En revanche, elle modifie le délai de prescription. De manière générale, tout ce qui est relatif à la rémunération se prescrit par 3 ans. Cependant, les éléments inscrits sur un solde de tout compte signé se prescrivent au bout de 6 mois (art. L. 3245-1 et L. 1234-20 du CDT).\nL'attestation d'assurance chômage (ou l'attestation France Travail) (art. R. 1234-9 du CDT).\n\nL'employeur ne peut pas subordonner l'envoi ou la remise des documents à leur signature par le salarié. Le fait que ce dernier les signe ne vaut d'ailleurs pas acceptation. Un salarié peut ainsi récupérer les documents et encaisser les montants correspondants, tout en conservant la possibilité de contester ces éléments devant le conseil de prud’hommes.\n\nCes documents doivent être préparés dès la rupture du contrat (un délai de quelques jours est toléré). Le cas échéant, vous pouvez les réclamer par lettre recommandée avec accusé de réception, en mettant en demeure l'employeur de vous les fournir dans un délai que vous fixez, qui se veut raisonnable (entre 4 et 8 jours par exemple).\n\nA noter :  Ces documents sont dits quérables et non portables, ce qui signifie que l'employeur doit les tenir à la disposition du salarié dans l'entreprise, mais n'est pas obligé de les envoyer chez le salarié.\n\nSi l'employeur ne régularise pas la situation malgré la mise en demeure, vous avez la possibilité de saisir le conseil des prud'hommes. Pour monter un dossier prud'homal, vous pouvez vous faire aider par un défenseur syndical (voir la liste en pièce jointe).\n\nA noter :  Si l'employeur n'a pas régularisé la situation dans le délai imparti, vous pouvez également apporter une copie de ce courrier à France Travail afin de justifier de l'absence de transmission de l'attestation France Travail.\n\n\n\nRestant à votre disposition pour toutes informations supplémentaires.\n\n\nCordialement,\n"}, {"id": "id_143", "question": "Ma femme a terminé son contrat le 31 octobre et son employeur refuse de lui envoyer son attestation Pôle Emploi. Que faire ?", "reponse": "Madame, Monsieur,\n\nSuite à votre demande et en fonction des informations que vous nous avez exposées, vous voudrez bien trouver ci-après les réponses apportées :\n\nLe reçu pour solde de tout compte, le certificat de travail et l’attestation pour France Travail doivent être remis au dernier jour du contrat de travail, préavis compris.\nLa jurisprudence a par exemple admis qu’un retard de 8 jours dans la remise de l’attestation France Travail causait nécessairement un préjudice au salarié qu’il convenait de réparer (cass. Soc. 17 septembre 2014, n° 13-18.850).\n\nJe vous invite par conséquent à adresser à votre employeur un courrier recommandé avec avis de réception (cf. modèle à adapter en pièce jointe)  pour le mettre en demeure de vous adresser les documents de fin de contrat dans un délai que vous déterminerez. A défaut de régularisation à la date fixée, vous pourrez saisir le conseil de prud’hommes en référé pour faire valoir vos droits.\n\n Si vous souhaitez être assistée dans cette démarche, vous pouvez solliciter :\n* soit un avocat de votre choix ou par le biais de la protection juridique de l'une de vos assurances;\n* soit, si vous en remplissez les conditions, un avocat pratiquant l'aide juridictionnelle en savoir plus en cliquant ici ;\n* soit enfin un défenseur syndical bénévole : voir liste jointe.\n\nTous ces éléments sont donnés sous réserve de l’appréciation souveraine des juges du fond.\n\nJe vous prie de croire, Madame, Monsieur, à l’assurance de ma considération distinguée."}, {"id": "id_144", "question": "Ma femme a terminé son contrat le 31 octobre et son employeur refuse de lui envoyer son attestation Pôle Emploi. Que faire ?", "reponse": "Bonjour Monsieur,\n\nA la rupture du contrat de travail, l'employeur est tenu de délivrer au salarié les documents de fin de contrat, à savoir :\n- votre certificat de travail\n- votre reçu pour solde de tout compte\n- votre attestation France Travail\n\nL'employeur n'est pas tenu de vous les envoyer mais il doit vous les mettre à disposition.\n\nS'il ne le fait pas, il s'expose à des sanctions. En tout état de cause, cela ne doit pas vous porter préjudice, notamment dans vos droits aux allocations chômage.\n\nJe vous invite à réclamer ces documents par écrit à votre employeur. Pour vous aider dans votre démarche, je vous adresse un modèle de lettre à personnaliser.\n\nEn cas de refus ou d'absence de réponse, votre seul recours sera alors de saisir le conseil des prud'hommes d’Angoulême (palais de justice- Place Francis Louvel - 0545371170).\n\nPour rappel, le service de renseignements en droit du travail a pour rôle d'informer les usagers sur leurs droits et obligations en la matière. En cas de litige, seule la juridiction prud'homale est compétente.\n\nCordialement,"}, {"id": "id_145", "question": "Ma femme a terminé son contrat le 31 octobre et son employeur refuse de lui envoyer son attestation Pôle Emploi. Que faire ?", "reponse": "Monsieur,\nsi malgré toutes vos relances l'employeur n'a pas envoyé les documents vous pouvez saisir le conseil des prudhommes en référés. Vous aurez plus d'informations en pièce jointe.\n\nhttps://www.saisirprudhommes.com/fiches-prudhommes/procedure-saisine-prudhommes/refere-aux-prudhommes\n\nCordialement"}, {"id": "id_146", "question": "Ma femme a terminé son contrat le 31 octobre et son employeur refuse de lui envoyer son attestation Pôle Emploi. Que faire ?", "reponse": "Monsieur,\n\nPour faire suite à votre interrogation, la seule solution consiste :\n\nd'une part, si cela n'a pas été fait officiellement, à la mettre en demeure de régulariser sous huit jours par lettre recommandée avec accusé de réception en relevant son caractère obligatoire (article R 1234-9 du code du travail et suivants) et le préjudice subi, notamment retard dans le versement de l'allocation chômage. L'attestation doit être conforme à la réalité et ne pas comporter d'erreurs.\nd'autre part, en l'absence de régularisation, saisir immédiatement le conseil des prud'hommes : la règlementation prévoit que le bureau de conciliation du Conseil des prud'hommes peut délivrer une attestation provisoire (article R 1454-14 du code du travail). Pour effectuer une demande auprès du conseil des prud'hommes, vous pouvez présenter votre requête sur papier libre ou plus simplement remplir un formulaire de requête aux fins de saisine du conseil de prud'hommes. Un modèle de  de requête est disponible en cliquant sur le lien suivant :\nhttps://www.service-public.gouv.fr/particuliers/vosdroits/R45128\n\nBien cordialement"}, {"id": "id_147", "question": "Ma femme a terminé son contrat le 31 octobre et son employeur refuse de lui envoyer son attestation Pôle Emploi. Que faire ?", "reponse": "Madame, Monsieur,\n\nNous vous invitons dans un 1er temps, à joindre votre employeur pour savoir ce qu'il en est de la mise à disposition de ces documents. En effet, l'employeur est tenu de mettre à votre disposition les documents de fin de contrat, c'est-à-dire :\n\n- le certificat de travail (L1234-19)\n- le solde de tout compte (L1234-20 du code du travail)\n- l'attestation de France Travail (R1234-9 et suivants du code du travail)\n\nIl doit donc produire ces documents, vous tenir informé de la mise à disposition mais il n'est pas contraint de vous les envoyer. Le code du travail ne précise pas de délai légal mais au regard des articles R1234-9 et suivants du code du travail, cela ne doit pas vous causer de préjudice notamment dans le versement de l'allocation chômage.\n\nVous pouvez l'enjoindre par écrit de vous mettre à disposition ces documents. Vous trouverez des modèles de lettres sur le site du code du travail numérique.\n\nS'il ne le fait pas, il s'expose à des sanctions (article R1238-3 du code du travail).\n\nSi vous n'arrivez pas à obtenir satisfaction, seul le juge prud'homal sera compétent pour résoudre le litige qui vous oppose à votre employeur."}, {"id": "id_148", "question": "Ma femme a terminé son contrat le 31 octobre et son employeur refuse de lui envoyer son attestation Pôle Emploi. Que faire ?", "reponse": "Monsieur,\n\nDans un premier temps il convient d'effectuer une mise en demeure par courrier recommandé avec accusé de réception afin que l'employeur procède à la remise de l’attestation destinée à France Travail. Vous trouverez en pièce-jointe un modèle de courrier.\nSans régularisation de la part de l'employeur sous huitaine, vous pouvez compléter et nous renvoyer, par retour de mail, le formulaire ci-joint afin que nous puissions intervenir auprès de ce denier.\n\nArticle R.1234-9 du code du travail :\n\"L'employeur délivre au salarié, au moment de l'expiration ou de la rupture du contrat de travail, les attestations et justifications qui lui permettent d'exercer ses droits aux prestations mentionnées à l'article L. 5421-2 et transmet sans délai ces mêmes attestations à l'opérateur France Travail.\nLes employeurs d'au moins onze salariés effectuent cette transmission à l'opérateur France Travail par voie électronique, sauf impossibilité pour une cause qui leur est étrangère, selon des modalités précisées par un arrêté du ministre chargé de l'emploi.\"\n\nArticle R.1238-7 du code du travail :\n\"Le fait de méconnaître les dispositions des articles R. 1234-9 à R. 1234-12, relatives à l'attestation d'assurance chômage, est puni de l'amende prévue pour les contraventions de la cinquième classe.\"  (1500euros)\n\nCordialement,"}, {"id": "id_149", "question": "Ma femme a terminé son contrat le 31 octobre et son employeur refuse de lui envoyer son attestation Pôle Emploi. Que faire ?", "reponse": "Madame, Monsieur,\n\nJe vous transmets via le lien ci-après une fiche d'information reprenant la législation concernant :\n- la Fin de contrat : documents à remettre au salarié | Service Public\nainsi que : Modèle de lettre : Réclamation des documents de fin de contrat - Code du travail numérique\n\nL'article L. 1222-1 du code du travail dispose que : \"Le contrat de travail est exécuté de bonne foi.\"\nSi ce n'est pas le cas, le Conseil de prud'hommes* est la juridiction compétente qui règle les litiges individuels entre employeur et salarié survenus à l'occasion de tout contrat de travail.\nLorsqu'ils ont subi un préjudice du fait du non-respect par l'employeur des dispositions légales, réglementaires ou conventionnelles, les salariés peuvent prétendre à l'attribution de dommages et intérêts. L'employeur ne peut invoquer le fait que les salariés concernés n'avaient pas contesté l'infraction. (♦Cass. soc., 29 janv. 1981, n° 79-41.406)\nIl relève donc du pouvoir des juges de rendre une décision notamment sur la remise des documents de fin de contrat.\n\nLes agents de l'inspection du travail ne sont pas juges du contrat de travail. Ils n'interviennent pas dans les litiges individuels. Dans ces situations, il faut saisir le Conseil de prud'hommes\n\nLes services de renseignements donnent des informations juridiques générales relatives au Code du travail, aux conventions collectives et à la jurisprudence sociale aux salariés et aux employeurs du secteur privé.\nIls ne donnent aucun avis, ne rendent aucune décision.\nIls ne sont pas compétents pour :\n- les demandes d’intervention en entreprise, qui relèvent de la compétence des sections d’inspection du travail (Contacter l'inspection du travail dans l'Eure - Directions régionales de l'économie, de l'emploi, du travail et des solidarités (DREETS)\n- régler les litiges qui sont de la compétence de Conseil de prud’hommes ;\n- constituer un dossier prud’homal ;\n- effectuer ou vérifier les calculs de rémunération, d'indemnités de rupture de contrat ou de congés payés, etc. ;\n- effectuer ou vérifier les calculs de jours de congés payés ou de repos ;\n- rédiger ou valider des courriers ;\n- renseigner sur les cotisations sociales qui est de la compétence de l’URSSAF ;\n- renseigner sur le droit à assurance chômage, cette mission étant du domaine de France Travail (anciennement Pôle Emploi).\n\n*la saisine du Conseil des prud'hommes (juridiction compétente pour le règlement des litiges) :\n                - https://travail-emploi.gouv.fr/droit-du-travail/le-reglement-des-conflits-individuels-et-collectifs/article/le-conseil-de-prud-hommes\n                - https://www.service-public.fr/particuliers/vosdroits/R45128\n                - https://normandie.dreets.gouv.fr/Les-defenseurs-syndicaux-modification-de-la-liste-pour-la-Normandie (défenseur syndical)"}, {"id": "id_150", "question": "Ma femme a terminé son contrat le 31 octobre et son employeur refuse de lui envoyer son attestation Pôle Emploi. Que faire ?", "reponse": "Bonjour,\n\nVous nous avez informés des difficultés que vous rencontrez pour récupérer vos documents de fin de contrat.\n\nIl convient, dans un premier temps, de mettre en demeure (par mail et courrier recommandé avec accusé de réception) votre employeur de procéder à ces formalités (voir modèle joint).\n\nIl vous appartiendra également de mettre en copie votre Inspecteur du travail. Vous trouverez son adresse e-mail en utilisant l'annuaire suivant :\n\nhttps://www.arcgis.com/apps/webappviewer/index.html?id=55726924aa694a9c9bb3fbcef1e765cc\n\n\nEnfin, sans réponse de votre employeur, vous pourrez saisir la formation de référé du Conseil de prud'hommes comme explicité ci-après :\nhttps://www.service-public.fr/particuliers/vosdroits/F2360\n\nSi vous souhaitez être assisté(e) par un défenseur syndical :\nhttps://nouvelle-aquitaine.dreets.gouv.fr/Les-defenseurs-syndicaux-intervenant-en-matiere-prud-homale\n\nCordialement,"}, {"id": "id_151", "question": "Ma femme a terminé son contrat le 31 octobre et son employeur refuse de lui envoyer son attestation Pôle Emploi. Que faire ?", "reponse": "Bonjour,\n\nVous trouverez ci-après les éléments de réponse à votre mail, sous réserve de l'appréciation souveraine des tribunaux.\n\nA la date de rupture du contrat de travail, c'est-à-dire le dernier jour du préavis de licenciement ou de démission, que ce préavis soit effectué ou non, l'employeur doit tenir à la disposition, dans l'entreprise, les documents de fin de contrat (certificat de travail, attestation France Travail (Pôle Emploi), et reçu pour solde de tout compte).\n\nSi l'employeur ne vous a pas fait savoir que ces documents étaient à votre disposition, je vous invite à lui adresser un courrier en recommandé avec accusé de réception pour les solliciter. Vous préciserez une échéance (date) pour les recevoir et qu'à défaut de réception, vous saisirez les Prudhommes.\n\nhttps://www.service-public.fr/particuliers/vosdroits/F21789\n\nCordialement."}, {"id": "id_152", "question": "Ma femme a terminé son contrat le 31 octobre et son employeur refuse de lui envoyer son attestation Pôle Emploi. Que faire ?", "reponse": "Bonjour,\n\nSuite à votre demande je vous précise que les textes ne fixent pas de délai légal pour la remise des documents de fin d'emploi par l'employeur.\n\nLe code du travail prévoit en son article R1234-9 pour ce qui concerne l'attestation France travail que c'est \"au moment de l'expiration ou de la rupture du contrat de travail\" que ce document est remis.\n\nAinsi, sous réserve de l’appréciation souveraine des tribunaux, l'employeur doit tenir à la disposition du salarié l’ensemble des documents de fin d'emploi dès la fin du contrat de travail.\nJe vous précise que ces documents sont quérables et non portables, ce qui signifie que c’est au salarié à se déplacer pour les récupérer. Il est donc préconisé de convenir d'un rendez-vous avec son employeur. Celui-ci n’a pas l’obligation de les envoyer par courrier.\n\nEn cas de non délivrance dans un délai raisonnable d'établissement de ces documents et après avoir mis en demeure son employeur de remplir ses obligations par lettre recommandée avec accusé de réception le salarié est en droit d'engager une action en justice devant le conseil de prud'hommes s'il justifie d'un préjudice du fait du retard ou de la non délivrance des documents de fin d'emploi.\n\nNos services ne répondent pas aux demandes anonymes. Vous veillerez à l'avenir à transmettre vos coordonnées, à défaut aucune réponse ne vous sera donnée.\n\nCordialement,"}, {"id": "id_153", "question": "Ma femme a terminé son contrat le 31 octobre et son employeur refuse de lui envoyer son attestation Pôle Emploi. Que faire ?", "reponse": "Bonjour,\n\nSuite à votre mail, j'ai l'honneur de vous apporter les éléments de réponse suivants.\n\nLes documents de fin de contrat (attestation France Travail, certificat de travail et reçu pour solde de tout compte) sont des documents quérables et non portables. Cela signifie que l'employeur a une interdiction légale de les envoyer par courrier, sa seule obligation est de les tenir à la disposition du salarié.\n\nVotre femme doit donc se rendre dans son ancienne entreprise récupérer les documents.\n\nS'ils ne sont pas à sa disposition, il lui appartiendra de réclamer la régularisation par courrier RAR à son employeur, et de saisir le conseil des prud'hommes, seul compétent en cas de litige.\n\nVous souhaitant bonne réception,\n\nCordialement,"}, {"id": "id_154", "question": "Ma femme a terminé son contrat le 31 octobre et son employeur refuse de lui envoyer son attestation Pôle Emploi. Que faire ?", "reponse": "Bonjour Monsieur,\n\nLe contrat de travail de votre épouse est terminé mais son employeur refuse de lui envoyé son attestation France Travail.\n\nÀ la rupture du contrat de travail, quelle qu’en soit l’origine (licenciement, démission, rupture conventionnelle du contrat de travail à durée indéterminée, etc.), l’employeur remet obligatoirement au salarié :\n-    un certificat de travail qui atteste, notamment, de l'emploi occupé par le salarié dans l'entreprise ;\n-    un reçu pour solde de tout compte  en double exemplaire qu'elle n'est pa tenue de signer ;\n-    une attestation pour France Travail (nouvel opérateur du service public de l’emploi, qui remplace Pôle emploi depuis le 1er janvier 2024) indispensable pour faire valoir éventuellement les droits à l'allocation chômage.\nainsi que sa dernière fiche de paie.\n\nCes documents sont quérables, ils ne sont pas portables.\nSon employeur n'est pas tenu de les lui envoyer par courrier, mais elle peut aller les chercher.\n\nVous lirez la fiche pratique en droit du travail relative à la transmission des documents de fin de contrat par l'employeur à son salarié en cliquant sur ce lien  :  https://travail-emploi.gouv.fr/les-documents-remis-aux-salaries-lors-de-la-rupture-du-contrat-de-travail\n\nBien cordialement"}, {"id": "id_155", "question": "Ma femme a terminé son contrat le 31 octobre et son employeur refuse de lui envoyer son attestation Pôle Emploi. Que faire ?", "reponse": "Bonjour,\n\nVous pouvez adresser une lettre recommandée avec AR à l'employeur en le mettant en demeure de bien vouloir vous fournir l'attestation France Travail.\nVous lui indiquerez que sans réponse de sa part sous 8 jours, vous saisirez le conseil des prud'hommes pour faire valoir vos droits.\n\nA toutes fins utiles, vous trouverez ci-joint une fiche de procédure pour télécharger le dossier prud’homal sur le site Justice.fr ainsi que le lien pour obtenir la liste des défenseurs syndicaux qui peuvent vous aider dans la complétude de votre dossier.\n\n\nCordialement,"}, {"id": "id_156", "question": "Ma femme a terminé son contrat le 31 octobre et son employeur refuse de lui envoyer son attestation Pôle Emploi. Que faire ?", "reponse": "Bonjour,\n\nEn réponse à votre demande, je vous informe que dans la mesure où les documents de fin de contrat sont quérables et non-portables, votre employeur a pour seule obligation de les tenir à votre disposition, dès la fin de votre contrat de travail.\nEn conséquence, il n’a aucune obligation de vous les transmettre par voie postale.\n\nVous devez donc vous présenter dans les locaux de votre ancienne entreprise afin de réclamer les documents manquants.\nComme toutes démarches administratives, vous pouvez donner procuration à une tierce personne pour l’effectuer en votre nom et je vous invite, préalablement, à le préciser par courrier à votre employeur.\n\nSi votre employeur ne vous remet pas ces documents, il conviendra d’en faire le constat par courrier recommandé avec accusé de réception en le mettant en demeure, avec un délai à votre convenance, de vous les produire tout en indiquant la date et l’heure à laquelle vous reviendrez les réclamer.\n\nL’invitation à adresser le courrier recommandé avec accusé de réception a pour but de se constituer des preuves ou des débuts de preuve en cas de saisine du Conseil de Prud’hommes.\nUn mail avec accusé de lecture doit être suffisant à condition qu’il relate bien que l’employeur ne met pas à disposition vos documents.\n\nEnfin, si les documents ne vous étaient définitivement pas remis dans ce délai, vous pourrez nous retourner la fiche de demande d'intervention ci-jointe complétée accompagnée de la copie du courrier RAR adressé à votre employeur ainsi que du récépissé de la poste.\nCordialement"}, {"id": "id_157", "question": "Ma femme a terminé son contrat le 31 octobre et son employeur refuse de lui envoyer son attestation Pôle Emploi. Que faire ?", "reponse": "Monsieur,\n\nLors de la rupture du contrat de travail, l'employeur doit tenir les documents de fin de contrat à la disposition du salarié.\nLa jurisprudence tolère quelques jours, si pas de préjudice pour le salarié.\n\nLes documents de fin de contrat sont quérables et non portables , c'est-à-dire que le salarié doit venir les chercher à l'entreprise.\nL'employeur n'a pas l'obligation de les faire parvenir au salarié : ils ne sont pas portables.\n\nSi les documents ne sont pas à votre disposition à l'entreprise, je vous conseille de lui adresser un courrier recommandé avec avis de réception à votre employeur, afin de lui demander de régulariser votre situation dans un délai que vous préciserez.\nA défaut de régularisation  dans ce délai , vous pourrez saisir le Conseil de Prud'hommes ( en conserver une copie)\n\nSi vous souhaitez que notre service intervienne auprès de votre employeur pour vos documents de fin de contrat, vous devez lever la confidentialité en envoyant un courriel à votre employeur.\nMettez-nous en copie visible ( non cachée) et ajoutez la mention dans votre lettre \" copie à l'inspection du travail pour intervention\".\nVeuillez également indiquer les coordonnées complètes de votre employeur : Nom de l'entreprise et de l'employeur, adresse mail, numéro de téléphone.\n\nPour information, pour une saisine devant le Conseil de Prud'hommes, vous pouvez faire appel à un défenseur syndical.\nVous trouverez la liste des défenseurs syndicaux de Normandie en PJ.\n\nSincères salutations"}, {"id": "id_158", "question": "Ma femme a terminé son contrat le 31 octobre et son employeur refuse de lui envoyer son attestation Pôle Emploi. Que faire ?", "reponse": "Madame, Monsieur,\n\n\nAfin de répondre à votre mail veuillez nous indiquer vos coordonnées téléphoniques ainsi que vos disponibilités.\n\nCordialement,\n\nMonsieur,\n\nL'employeur doit obligatoirement remettre au salarié, quel que soit le mode de rupture ou la fin du contrat de travail, les documents suivants :\n\nCertificat de travail\nSolde de tout compte\nAttestation France travail.\n\nL'employeur doit les tenir à la disposition du salarié dès la fin du contrat de travail.\n\nCes documents de fin de contrat sont des documents quérables, c'est-à-dire que l'employeur doit les tenir à la disposition du salarié dans l'entreprise.\n\nCode du travail : article L1234-19\n\nCertificat de travail\n\nCode du travail : article L1234-20\n\nSolde de tout compte\n\nCode du travail : articles R1234-5-1 à R1234-12\n\nDocuments à remettre par l'employeur\n\nCode du travail : article R1238-3\n\nDispositions pénales\n\n\nEn cas de litige, il vous appartiendra de saisir le Conseil des Prud'hommes territorialement compétent.\n\nCordialement"}, {"id": "id_159", "question": "Ma femme a terminé son contrat le 31 octobre et son employeur refuse de lui envoyer son attestation Pôle Emploi. Que faire ?", "reponse": "Bonjour,\n\nLes documents de fin de contrats sont des documents quérables, donc à aller chercher chez l'employeur. Celui-ci est en droit de refuser l'envoi de l'attestation France Travail.\n\nCordialement,\n"}, {"id": "id_160", "question": "Ma femme a terminé son contrat le 31 octobre et son employeur refuse de lui envoyer son attestation Pôle Emploi. Que faire ?", "reponse": "Bonjour\nLes documents de fin de contrat sont quérables, c'est-à-dire que l'employeur n'est pas tenu de les envoyer.\nIl faut alors les chercher sur place.\nJe vous prie de croire, en l'expression de mes salutations distinguées."}, {"id": "id_161", "question": "L’employeur doit-il inclure les jours fériés compensés en temps dans mon solde de congés payés ? Convention collective : hôtellerie.", "reponse": "Madame, Monsieur,\n\nVotre courriel manque de précisions.\nNous vous communiquons ces dispositions concernant les jours fériés (et vous lirez l'incidence d'un jour férié inséré dans une période de congés payés) :\n\n=> Jour férié pendant les congés d'un salarié : quelles sont les règles ? - Code du travail numérique https://code.travail.gouv.fr/fiche-service-public/jour-ferie-pendant-les-conges-dun-salarie-quelles-sont-les-regles\n\n=> Les jours fériés et les ponts - Code du travail numérique https://code.travail.gouv.fr/fiche-ministere-travail/les-jours-feries-et-les-ponts\n\n=>Convention collective : Hôtels, cafés, restaurants - Code du travail numérique https://code.travail.gouv.fr/convention-collective/1979-hotels-cafes-restaurants\n\nCordialement"}, {"id": "id_162", "question": "L’employeur doit-il inclure les jours fériés compensés en temps dans mon solde de congés payés ? Convention collective : hôtellerie.", "reponse": "Madame,\n\n \n\nPour faire suite à votre message, veuillez trouver les éléments de réponse suivants :\n\n \n\nLe repos compensateur pour les jours fériés travaillés s'ajoute aux congés payés, mais ne se confond pas avec les 5 semaines de congés annuels.\n \n\n\n\nTous ces éléments sont donnés sous réserve de l’appréciation souveraine des juges du fond.\n\n \n\nVeuillez agréer, Madame, l’expression de nos salutations distinguées.\n\n \n\n*Pour plus d’informations sur le droit du travail, vous pouvez consulter le Code du Travail Numérique\n\nhttps://code.travail.gouv.fr/\n\n \n\nou\n\nhttps://www.service-public.fr/particuliers/vosdroits/N19806\n"}, {"id": "id_163", "question": "L’employeur doit-il inclure les jours fériés compensés en temps dans mon solde de congés payés ? Convention collective : hôtellerie.", "reponse": "Bonjour,\n\nVeuillez trouver ci-dessous les règles issues de la convention collective des hôtels cafés restaurants.\n\n11\nJours fériés\n1°1er mai :\nle 1er mai ne comporte pas d'incidence sur la rémunération s'il tombe un jour habituel de fermeture de l'entreprise ou le jour de repos habituel du salarié. Lorsqu'il tombe un jour de travail habituel, il est payé normalement s'il est chômé (salaire mensuel inchangé), il est payé double s'il est travaillé (salaire mensuel + majoration pour travail du 1er mai égale au montant du salaire, non compris les avantages en nature, pour les salariés payés au fixe ; montant de la répartition du service pour cette journée pour les salariés payés au service).\n2°Autres jours fériés\na)Établissements permanents et établissements ouverts plus de 9 mois par an :\nles salariés ayant 1 an d'ancienneté bénéficient de 10 jours fériés par an (en plus du 1er mai) dont 6 jours fériés garantis.\n1.\nModalités d'application des jours fériés garantis : chômés et payés, ou compensés en temps, ou indemnisés, même si le salarié est en repos (prorata temporis pour les salariés à temps partiel dont le temps de travail est réparti sur moins de 5 jours/semaine). Au terme de l'année civile, si le salarié n'a pas bénéficié de tout ou partie de ces jours, il peut, en accord avec l'employeur et dans les 6 mois suivants, soit les prendre isolément ou en continu (pour constituer 1 semaine de congés), soit être indemnisé. A l'issue de ces 6 mois, les jours restant dus sont rémunérés.\n2.\nModalités d'application des autres jours fériés :\nsoit le jour férié est chômé et payé ;\nsoit il est travaillé et ouvre droit à 1 jour de compensation ;\nsoit il coïncide avec un jour de repos et ne donne lieu ni à compensation, ni à indemnisation.\nb)Établissements saisonniers et salariés sous contrats saisonniers des établissements permanents ou ouverts plus de 9 mois par an :\nsous réserve de justifier de 9 mois d'ancienneté, les salariés bénéficient des jours fériés (arrondis à l'entier supérieur) selon les modalités prévues pour les établissements permanents (v. ci-avant) au prorata de la durée de leur contrat.\nAu terme du contrat saisonnier, l'employeur doit rémunérer aux salariés les jours fériés garantis leur restant dus.\n\nSi vous n'avez pas pu prendre ces jours fériés et qu'ils n'ont pas été payés, ils devront l'être au moment de la rupture de votre contrat. Ils apparaitront donc sur votre dernier bulletin de salaire ainsi que sur le solde de tout compte.\n\nCordialement"}, {"id": "id_164", "question": "L’employeur doit-il inclure les jours fériés compensés en temps dans mon solde de congés payés ? Convention collective : hôtellerie.", "reponse": "Bonjour Madame,\n\nVotre demande de renseignement porte sur les jours fériés compensés en temps.\nSous réserve de l’appréciation souveraine des tribunaux, voici la réponse que je suis en mesure de vous apporter.\n\nSur les jours fériés, la convention collective des Hôtels ( IDCC: 800) prévoit que:\n\nOutre le 1er mai, le personnel présent dans l'établissement depuis plus d'un an bénéficiera des dix jours prévus par le code du travail, à savoir :\n1er janvier, lundi de Pâques, lundi de Pentecôte, Ascension, 8 mai, 14 juillet, Assomption, 1er novembre, 11 novembre, Noël.\nCes jours fériés seront donnés de préférence au moment des fêtes légales.\nSeulement dans le cas où l'activité de l'établissement nécessite la présence du salarié un jour férié, l'intéressé devra bénéficier d'une journée de compensation qui sera prise dans le mois qui suit ce jour férié sauf accord particulier entre les parties dans l'entreprise.\nLa fixation des jours fériés travaillés sera établie au plus tard 48 heures à l'avance. Il en sera de même en ce qui concerne la récupération.\nLe jour férié coïncidant avec un jour de repos ne donne pas lieu à compensation.\nLorsqu'il a travaillé le 1er mai, l'employé a droit en outre à une indemnité égale au montant du salaire journalier. Pour ceux qui sont payés au service, le salaire journalier sera le salaire journalier moyen du dernier mois travaillé (hors nourriture).\n\nEn cas de litige, il vous appartiendra de saisir le conseil des prud'hommes territorialement compétent.\n\nBien cordialement"}, {"id": "id_165", "question": "L’employeur doit-il inclure les jours fériés compensés en temps dans mon solde de congés payés ? Convention collective : hôtellerie.", "reponse": "Bonjour,\n\n\nPour faire suite à votre demande, et sous réserve de l'appréciation souveraine des juges du fond;\n\n\nSi vous n'avez pas pu bénéficier du repos dû en contrepartie du travail lors d'un jour férié, il faut que l'employeur vous l'indemnise (Titre III art. 11 de la CCN 1979).\n\n\n\nRestant à votre disposition pour toutes questions supplémentaires.\n\n\nCordialement,"}, {"id": "id_166", "question": "L’employeur doit-il inclure les jours fériés compensés en temps dans mon solde de congés payés ? Convention collective : hôtellerie.", "reponse": "Bonjour,\n\nNon, les jours fériés compensés en temps dans la convention collective HCR (hôtels, cafés, restaurants) ne s’ajoutent pas au solde de congés payés.\nSi vous avez travaillé un jour férié garanti, l’employeur doit vous accorder une compensation en temps (repos équivalent) ou une indemnisation spécifique.\n\nRespectueusement,"}, {"id": "id_167", "question": "L’employeur doit-il inclure les jours fériés compensés en temps dans mon solde de congés payés ? Convention collective : hôtellerie.", "reponse": "Madame,\n\nPour faire suite à votre interrogation, les jours fériés compensés en temps (correspondant à du repos accordé suite à un jour férié travaillé) ne sont pas assimilés à des jours de congés et de ce fait, ne sont pas inclus dans votre solde de congés payés.\n\nLes conventions collectives de l’hôtellerie de plein air (IDCC  3247) ou hôtel, café et restaurant (IDCC 3292) prévoient toutes les deux des dispositions spécifiques pour les jours fériés : 100 % de majoration ou repos compensateur pour les jours fériés travaillés.\n\nEn conséquence, aucune imputation sur votre solde de congés payés dans la mesure où la compensation d'un jour travaillé par un repos est un droit distinct des congés payés.\n\nBien cordialement"}, {"id": "id_168", "question": "L’employeur doit-il inclure les jours fériés compensés en temps dans mon solde de congés payés ? Convention collective : hôtellerie.", "reponse": "Madame,\n\nLe Code du travail ne prévoit pas la compensation des jours fériés.\n\nVous trouverez via le lien ci-après les dispositions conventionnelles : Travailler un jour férié : contrepartie - Hôtels, cafés, restaurants - Code du travail numérique"}, {"id": "id_169", "question": "L’employeur doit-il inclure les jours fériés compensés en temps dans mon solde de congés payés ? Convention collective : hôtellerie.", "reponse": "Bonjour,\n\nSuite à votre mail et sous réserve de l’appréciation souveraine des tribunaux, veuillez trouver les éléments de réponse suivants basés sur la législation en vigueur :\n\nArticle 11 de votre CCN HCR dispoe :\n\nJours fériés autres que le 1er mai\n\n11-1 - Modalités d'application (Avenant n° 6, 15 déc. 2009, étendu)\n\n1) Dans les établissements permanents\n\nTous les salariés comptant un an d'ancienneté dans le même établissement et/ou entreprise, bénéficient, en plus du 1er mai, de 10 jours fériés par an et ceci à compter de la date d'application du présent avenant.\n\nEn tout état de cause, il est accordé aux salariés 6 (six) jours fériés garantis. L'annexe 2 de l'avenant n° 2 à la Convention Collective Nationale des hôtels, cafés, restaurants est modifiée en conséquence. Ainsi, le salarié bénéficie de 6 jours chômés et payés ou compensés en temps ou indemnisés, même si le salarié est en repos ces jours fériés considérés.\n\nLes quatre autres jours fériés sont accordés selon les modalités suivantes :\n\n-  Le jour férié est chômé, le chômage des jours fériés ne doit entraîner aucune réduction du salaire,\n\n-  Dans le cas où l'activité de l'établissement nécessite la présence du salarié, l'intéressé bénéficie d'un jour de compensation,\n\n-  Le jour férié coïncidant avec un jour de repos ne donne pas lieu à compensation ou à indemnisation.\n\n\n\n2) Dans les établissements saisonniers et pour les salariés sous contrats saisonniers des établissements permanents\n\nLe travailleur saisonnier est un salarié employé conformément aux dispositions légales en vigueur, notamment aux articles L. 1242-2 3o, L. 1243-10 et D. 1242-1 du code du travail, dans les établissements permanents ou saisonniers pour des tâches normalement appelées à se répéter chaque année à dates à peu près fixes en fonction du rythme des saisons ou des modes de vie collectifs.\n\nPour les salariés des établissements saisonniers et ceux sous contrats saisonniers dans les établissements permanents, justifiant de 9 mois d'ancienneté dans le même établissement et/ou entreprise au sens de l'article L. 1244-2 du code du travail, bénéficient en plus du 1er mai, le cas échéant, des jours fériés (arrondis à l'entier supérieur) selon les modalités d'application définies au 1) de l'article 6 du présent avenant et au prorata de la durée du contrat de travail.\n\n3) Dans les établissements ouverts plus de 9 mois\n\nLes salariés bénéficient du régime des jours fériés des établissements permanents, sauf pour les salariés sous contrats saisonniers qui relèvent des dispositions de l'alinéa ci-dessus.\n\n\n11-2 - Modalités complémentaires des jours fériés garantis\n\n(Avenant n° 6, 15 déc. 2009, étendu)\n\n1) Dans les établissements permanents\n\nLes salariés bénéficient de 6 jours fériés garantis par an.\n\nAu terme de l'année civile, l'entreprise devra vérifier si le salarié a bénéficié des jours fériés garantis. À défaut, elle informe par écrit le salarié de ses droits restants dus à ce titre.\n\nSi le salarié n'a pas bénéficié de tout ou partie de ses jours, il pourra avec l'accord de l'employeur et dans les 6 mois suivant :\n\n-  soit les prendre isolément ou en continu, pouvant ainsi constituer une semaine de congés,\n\n-  soit être indemnisé de ses jours.\n\nAu terme de cette période de 6 mois, les jours restant dus seront obligatoirement rémunérés.\n\n\n2) Dans les établissements saisonniers et pour les salariés sous contrats saisonniers des établissements permanents\n\nAu terme du contrat saisonnier, l'employeur devra rémunérer aux salariés les jours fériés garantis leur restant dus.\n\n\n\n3) Pour les salariés à temps partiel\n\nLes salariés à temps partiel bénéficient des droits à jours fériés dans les mêmes conditions que les salariés permanents.\n\nCependant, la disposition conventionnelle, qui prévoit l'attribution d'un jour de compensation ou son indemnisation lorsque le jour férié coïncide avec un jour de repos hebdomadaire, est applicable aux salariés à temps partiel, et au prorata temporis pour les salariés à temps partiel dont le temps de travail prévu au contrat est réparti sur moins de cinq jours par semaine.\n\nLe chômage des jours fériés ne doit entraîner aucune réduction du salaire.\n\n\n\n*-*-*\n\nIl n’est pas indiqué que l’employeur doit abonder ce compteur de \"congés payés\" mais vous informer par écrit de vos droits restants.\n\nEn cas de litige, il appartiendrait au conseil des prud'hommes d'en juger.\n\nCordialement,"}, {"id": "id_170", "question": "L’employeur doit-il inclure les jours fériés compensés en temps dans mon solde de congés payés ? Convention collective : hôtellerie.", "reponse": "Bonjour,\n\nSi le travail des jours fériés a été compensé en temps, ce temps doit être indemnisé à l'issue de votre contrat de travail s'il n'a pas pu en bénéficier.\n\nIl ne s'assimile pas aux congés payés acquis qui donnent droit à l'indemnité compensatrice de congés payés.\n\nJe vous invite à consulter le lien ci-dessous :\nhttps://code.travail.gouv.fr/fiche-service-public/indemnite-compensatrice-de-conges-payes\n\n\n\nA titre d'information, votre convention collective prévoit les dispositions suivantes :\nHôtels, cafés, restaurants\nDate d'arrêt des textes : 16 septembre 2025\nConvention collective        Signature        Extension        JO        Révision        Extension        JO        Brochure JO        IDCC\nHôtels-cafés-restaurants\n30-4-97  \n3-12-97  \n6-12-97\n-\n-\n-\n3292\n1979\n\n\nJours fériés\n\n1°1er mai : le 1er mai ne comporte pas d'incidence sur la rémunération s'il tombe un jour habituel de fermeture de l'entreprise ou le jour de repos habituel du salarié. Lorsqu'il tombe un jour de travail habituel, il est payé normalement s'il est chômé (salaire mensuel inchangé), il est payé double s'il est travaillé (salaire mensuel + majoration pour travail du 1er mai égale au montant du salaire, non compris les avantages en nature, pour les salariés payés au fixe ; montant de la répartition du service pour cette journée pour les salariés payés au service).\n\n2°Autres jours fériés\n\na) Établissements permanents et établissements ouverts plus de 9 mois par an :les salariés ayant 1 an d'ancienneté bénéficient de 10 jours fériés par an (en plus du 1er mai) dont 6 jours fériés garantis.\n1. Modalités d'application des jours fériés garantis : chômés et payés, ou compensés en temps, ou indemnisés, même si le salarié est en repos (prorata temporis pour les salariés à temps partiel dont le temps de travail est réparti sur moins de 5 jours/semaine). Au terme de l'année civile, si le salarié n'a pas bénéficié de tout ou partie de ces jours, il peut, en accord avec l'employeur et dans les 6 mois suivants, soit les prendre isolément ou en continu (pour constituer 1 semaine de congés), soit être indemnisé. A l'issue de ces 6 mois, les jours restant dus sont rémunérés.\n2. Modalités d'application des autres jours fériés :\n-    soit le jour férié est chômé et payé ;\n-    soit il est travaillé et ouvre droit à 1 jour de compensation ;\n-    soit il coïncide avec un jour de repos et ne donne lieu ni à compensation, ni à indemnisation.\n\nb) Établissements saisonniers et salariés sous contrats saisonniers des établissements permanents ou ouverts plus de 9 mois par an :sous réserve de justifier de 9 mois d'ancienneté, les salariés bénéficient des jours fériés (arrondis à l'entier supérieur) selon les modalités prévues pour les établissements permanents (v. ci-avant) au prorata de la durée de leur contrat.\nAu terme du contrat saisonnier, l'employeur doit rémunérer aux salariés les jours fériés garantis leur restant dus.\n\nc) Travail les jours fériés des apprentis mineurs : doublement du salaire journalier de base perçu pour la journée.\n\nArt. 26-1 et art. 26-2 modifié par avenant n° 2 du 5-2-2007 étendu par arrêté du 26-3-2007, JO 29-3-2007, applicable à compter du 1-4-2007 (1er jour du mois suivant la publication au JO de son arrêté d'extension), lui-même modifié par avenant n° 6 du 15-12-2009 étendu par arrêté du 19-2-2010, JO 24-2-2010, applicable à compter du 1-3-2010 (1er jour du mois suivant la publication au JO de son arrêté d'extension) (pour son champ d'application, v. n° 1)\n\nCordialement.  \n\nSuite à ma réponse précédente,\n\nMême si votre contrat n'est pas rompu, le temps compensé des jours fériés travaillés ne s'assimile pas à des congés payés.\n\n\nCordialement."}, {"id": "id_171", "question": "L’employeur doit-il inclure les jours fériés compensés en temps dans mon solde de congés payés ? Convention collective : hôtellerie.", "reponse": "Bonjour Madame,\n\nLes jours fériés s'ils ont été chômés et payés dans l’entreprise n'ont pas été décomptés comme des jours ouvrables de congés payés au moment de la prise des congés.\nIls n'ont pas à être ajoutés aux jours ouvrables de congés acquis mais non pris avant la rupture de votre contrat de travail.\n\nCordialement"}, {"id": "id_172", "question": "L’employeur doit-il inclure les jours fériés compensés en temps dans mon solde de congés payés ? Convention collective : hôtellerie.", "reponse": "Bonjour,\n\nUn solde de congés payés ne peut contenir que des congés payés.\n\nCordialement,"}, {"id": "id_173", "question": "L’employeur doit-il inclure les jours fériés compensés en temps dans mon solde de congés payés ? Convention collective : hôtellerie.", "reponse": "Madame,\n\nEn principe l’employeur ne doit pas intégrer les jours fériés compensés dans votre compteur de congés payé. Ils doivent apparaître sur un compteur distinct (ex. : “repos compensateur”, “jours fériés récupérés”, “RTT fériés”, etc.)\n\nLa convention \"Hôtel\" (IDCC 800) prévoit qu'un jour férié travaillé est payé normalement mais qu'il donne droit à 1 jour de repos compensateur, à prendre dans le mois.\nAttention : le 1er mai, le personnel payé au service bénéficie d'une majoration de 100 % du salaire journalier moyen du dernier mois travaillé, hors nourriture + attribution d'1 jour de repos compensateur.\n\nCordialement"}, {"id": "id_174", "question": "L’employeur doit-il inclure les jours fériés compensés en temps dans mon solde de congés payés ? Convention collective : hôtellerie.", "reponse": "Bonjour Madame,\nJe ne suis pas sûre de bien comprendre votre question.\nLe décompte d'un jour férié pendant les congés du salarié est différent selon que le jour férié est habituellement chômé ou travaillé dans l'entreprise :\n\nhttps://www.service-public.gouv.fr/particuliers/vosdroits/\n\nMerci de m'apporter plus de précisions ou de nous appeler au 806 000 126 (coût d'un appel local, du lundi au vendredi de 9h00 à 12h00 et de 13h30 à 16H30)\n\nJe vous prie de croire, Madame, en l'expression de mes salutations distinguées.\n"}, {"id": "id_175", "question": "Assistante maternelle enceinte, début congé de maternité en septembre. À quelle date le contrat peut-il être rompu ? Convention collective : particuliers employeurs.", "reponse": "Madame,\nVotre courriel manque de précisions.\n\nNous vous invitons néanmoins à prendre connaissance de ces informations  :\n\n=> Licenciement d'une salariée enceinte ou en congé de maternité | Service Public\n\n=> Convention collective : Particuliers employeurs et emploi à domicile - Code du travail numérique\n\n=> Rupture du contrat de travail d'une assistante maternelle par un particulier employeur | Service Public\n\nCordialement."}, {"id": "id_176", "question": "Assistante maternelle enceinte, début congé de maternité en septembre. À quelle date le contrat peut-il être rompu ? Convention collective : particuliers employeurs.", "reponse": "Bonjour,\n\n\nPour faire suite à votre demande, et sous réserve de l'appréciation souveraine des juges du fond;\n\n\nLes dispositions du code du travail concernant la maternité sont applicables aux assistantes maternelles (CASF, art. L. 423-2). Cela se traduit de la manière suivante :\n\nL'employeur ne peut résilier le contrat de travail d'une salariée :\nlorsqu'elle est en état de grossesse médicalement constaté : L'employeur ne peut prendre en considération l'état de grossesse pour rompre son contrat pendant la période d'essai ou pour prononcer une mutation (art. L. 1132-1 et L. 1142-1 du Code du travail).\npendant l'intégralité des périodes de suspension du contrat de travail auxquelles elle a droit, qu'elle use ou non de ce droit.  La salariée bénéficie d'une protection absolue car le licenciement fondé sur l'état de grossesse de la salariée est une mesure discriminatoire prohibée par l'article  L. 1132-1 du code du travail. Il en résulte qu'un tel licenciement est nul et qu'il tombe sous le coup des sanctions pénales de l'article  225-1 du code pénal.\npendant la période de congés payés prise immédiatement après le congé de maternité. La salariée bénéfice également d'une protection absolue contre le licenciement (art. L. 1225-4 du Code du travail).\npendant les 10 semaines qui suivent l'expiration de ces périodes :  protection relative. La salariée ne peut être licenciée que pour faute grave ou impossibilité de maintenir le contrat (art. L. 1225-4 du Code du travail).\n\nPour résumer, si vous souhaitez rompre le contrat de l'assistante maternelle, nous vous conseillons d'attendre la fin de la période de 10 semaines qui suivent le congé de maternité et les congés payées qui y seraient accolés.\n\n\n\n\n\nRestant à votre disposition pour toutes questions supplémentaires.\n\n\nCordialement,\n"}, {"id": "id_177", "question": "Assistante maternelle enceinte, début congé de maternité en septembre. À quelle date le contrat peut-il être rompu ? Convention collective : particuliers employeurs.", "reponse": "Madame,\n\nDès que vous avez informé votre employeur de votre grossesse la période protection dite relative commence jusqu'au début du congé maternité. A cette date la protection est dite absolue. A l'issue du congé maternité et pendant une période de 10 semaines vous êtes de nouveau sur une période de protection relative contre le licenciement.\n\nPendant les périodes de protection relative le licenciement est possible uniquement en cas de faute grave ou en cas d'impossibilité de maintenir le contrat de travail pour un motif étranger à la maternité (par exemple une inaptitude constatée par le médecin du travail). En cas de rupture de contrat pendant ces périodes, seul le juge de Prud'hommes est compétent pour apprécier la légalité du motif de licenciement.\n\nhttps://www.service-public.gouv.fr/particuliers/vosdroits/F2873\n\nCordialement,"}, {"id": "id_178", "question": "Assistante maternelle enceinte, début congé de maternité en septembre. À quelle date le contrat peut-il être rompu ? Convention collective : particuliers employeurs.", "reponse": "Bonjour,\n\nPour une assistante maternelle en CDI, la rupture du contrat par l’employeur appelée retrait de l’enfant est soumise à des règles particulières, notamment en cas de grossesse ou de congé de maternité.\nPendant le congé de maternité : protection absolue, aucune rupture n’est possible pendant le congé de maternité (ni pendant les congés payés pris immédiatement après).\n\n\"Pendant le congé de maternité et pendant les congés payés pris immédiatement après ce congé, l'employeur a l'interdiction de la licencier. La salariée bénéficie d'une protection dite absolue.\" [1] \"Aucun employeur ne peut rompre le contrat de travail d'une salariée pendant l'intégralité des périodes de suspension du contrat de travail auxquelles elle a droit au titre du congé de maternité, qu'elle use ou non de ce congé, et au titre des congés payés pris immédiatement après le congé de maternité.\" (Article L. 1225-4 du Code du travail) : https://www.legifrance.gouv.fr/codes/section_lc/LEGITEXT000006072050/LEGISCTA000006189422/#LEGISCTA000006189422\n\nExemple : Si le congé de maternité débute le 1er septembre 2025 et dure 16 semaines (cas général pour un 1er ou 2e enfant), la protection absolue s’étend jusqu’à la fin de ce congé (soit mi-décembre 2025), plus les congés payés éventuels pris immédiatement après.\nAprès le congé de maternité : protection relative (10 semaines)\nPendant les 10 semaines suivant la fin du congé de maternité, la rupture est possible uniquement pour :\n\nUne faute grave de l’assistante maternelle (non liée à sa grossesse ou maternité).\nUne impossibilité de maintenir le contrat pour un motif étranger à la maternité (ex. : suppression définitive du poste pour des raisons économiques).\n\"Pendant les dix semaines suivant l'expiration [du congé de maternité et des congés payés], l'employeur peut rompre le contrat s'il justifie d'une faute grave de l'intéressée ou de son impossibilité de maintenir ce contrat pour un motif étranger à la grossesse ou à l'accouchement.\" (Article L. 1225-4 du Code du travail)\"La protection relative est de 10 semaines. Elle débute soit à la fin du congé maternité, soit à la fin des congés payés pris immédiatement après le congé de maternité s'ils existent.\"\n\n\n\nJe vous invite à consulter le fiche en lien : https://code.travail.gouv.fr/fiche-service-public/licenciement-dune-salariee-enceinte-ou-en-conge-de-maternite.\nDe plus, il est essentiel de formuler une question dans vos courriels, faute de quoi aucune réponse ne sera formulée à l'avenir.\n\nBonne réception,\n\nCordialement"}, {"id": "id_179", "question": "Assistante maternelle enceinte, début congé de maternité en septembre. À quelle date le contrat peut-il être rompu ? Convention collective : particuliers employeurs.", "reponse": "Madame,\n\n \n\nPour faire suite à votre message, veuillez trouver les éléments de réponse suivants :\n\n \n\nSi la rupture est à votre initiative, elle peut intervenir à tout moment.\n\nSi à l'inverse ce sont les parents qui souhaitent rompre le contrat, ils ne sont pas en droit de le faire pendant la période du congé de maternité. Il ne peuvent pas non plus le rompre pendant la grossesse si la rupture est justifiée par cet état de grossesse.\n\n\nLes parents qui voudraient mettre fin au contrat avant le mois de septembre prochain devront justifier de motifs réels et sérieux (non fondés sur votre état de grossesse).\n \n\n\n\nTous ces éléments sont donnés sous réserve de l’appréciation souveraine des juges du fond.\n\n \n\nVeuillez agréer, Madame, l’expression de nos salutations distinguées.\n\n \n\n*Pour plus d’informations sur le droit du travail, vous pouvez consulter le Code du Travail Numérique\n\nhttps://code.travail.gouv.fr/\n\n \n\nou\n\nhttps://www.service-public.fr/particuliers/vosdroits/N19806\n"}, {"id": "id_180", "question": "Assistante maternelle enceinte, début congé de maternité en septembre. À quelle date le contrat peut-il être rompu ? Convention collective : particuliers employeurs.", "reponse": "Bonjour,\n\nPendant la grossesse et le congé maternité, l’assistante maternelle bénéficie d’une protection contre le licenciement.\nL’employeur (les parents employeurs) ne peut pas rompre le contrat sauf dans deux cas très précis :\n- faute grave de l’assistante maternelle.\n- impossibilité de maintenir le contrat pour un motif étranger à la grossesse ou au congé (par exemple, déménagement des parents, perte d’emploi entraînant la fin de l’accueil).\n\nPériodes protégées:\n- pendant la grossesse : dès que l’employeur est informé de l’état de grossesse (par certificat médical).\n- pendant le congé maternité : toute la durée du congé est protégée.\n- après le congé maternité : protection prolongée pendant 10 semaines après la reprise.\nEn pratique, cela signifie que le contrat ne peut pas être rompu avant la fin de cette période de protection, sauf exceptions ci-dessus nommées.\n\nRespectueusement,"}, {"id": "id_181", "question": "Assistante maternelle enceinte, début congé de maternité en septembre. À quelle date le contrat peut-il être rompu ? Convention collective : particuliers employeurs.", "reponse": "Madame,\n\nIl ressort de l'article L 1225-1 du Code du travail que :\n\"L'employeur ne doit pas prendre en considération l'état de grossesse d'une femme pour refuser de l'embaucher, pour rompre son contrat de travail au cours d'une période d'essai ou, sous réserve d'une affectation temporaire réalisée dans le cadre des dispositions des articles L. 1225-7, L. 1225-9 et L. 1225-12, pour prononcer une mutation d'emploi.\n\nIl lui est en conséquence interdit de rechercher ou de faire rechercher toutes informations concernant l'état de grossesse de l'intéressée\".\n\net de l'article L 1225-4 du code du travail que :\n\n\"Aucun employeur ne peut rompre le contrat de travail d'une salariée lorsqu'elle est en état de grossesse médicalement constaté, pendant l'intégralité des périodes de suspension du contrat de travail auxquelles elle a droit au titre du congé de maternité, qu'elle use ou non de ce droit, et au titre des congés payés pris immédiatement après le congé de maternité ainsi que pendant les dix semaines suivant l'expiration de ces périodes.\n\nToutefois, l'employeur peut rompre le contrat s'il justifie d'une faute grave de l'intéressée, non liée à l'état de grossesse, ou de son impossibilité de maintenir ce contrat pour un motif étranger à la grossesse ou à l'accouchement. Dans ce cas, la rupture du contrat de travail ne peut prendre effet ou être notifiée pendant les périodes de suspension du contrat de travail mentionnées au premier alinéa\".\n\nCela étant, vous pouvez démissionner dès lors qu'elle est libre et non équivoque à tout moment. J'attire votre attention que, sauf démission qualifiée comme légitime par France travail, ne vous ouvre pas de droit à l'allocation de retour à l'emploi pendant un délai de carence.\n\nBien cordialement"}, {"id": "id_182", "question": "Assistante maternelle enceinte, début congé de maternité en septembre. À quelle date le contrat peut-il être rompu ? Convention collective : particuliers employeurs.", "reponse": "Bonjour Madame,\n\nEn réponse à votre requête et au vu des éléments fournis ;\n\nIl existe 2 périodes de protection.\nProtection ABSOLUE : c'est le congés maternité et là tout licenciement est impossible.\nProtection RELATIVE :\nIl existe 2 périodes de protection relative contre le licenciement.\n1ère période\nLa protection relative débute dès que la salariée a informé son employeur de son état de grossesse. Cette 1re période se termine lorsque la salariée débute son congé de maternité.\n2nde période\nLa protection relative est de 10 semaines. Elle débute :\nSoit à la fin du congé maternité\nSoit à la fin des congés payés pris immédiatement après le congé de maternité s'ils existent.\n\nMAIS il faut une raison valable pour licencier en période de protection relative.....\nPendant cette période, le licenciement est possible uniquement en cas de faute grave ou si l'employeur est dans l'impossibilité de maintenir le contrat de travail pour un motif étranger à la maternité (fermeture définitive de l'entreprise par exemple pour un salarié d'entreprise).\nSi l'employeur est dans l'impossibilité de maintenir le contrat de travail, la lettre de licenciement doit obligatoirement préciser les raisons qui rendent impossible ce maintien.\n\nLorsque la période relative est terminée, vous pouvez procéder au licenciement classique dont vous pouvez suivre les étapes en cliquant sur la fiche pratique ci-après :\nhttps://www.service-public.gouv.fr/particuliers/vosdroits/F16842\n\nIl n'est pas obligatoire de préciser le motif de licenciement dans le courrier mais vous devrez le justifier si l'assistante maternelle demande des précisions.\n\nL’entrée de l’enfant à l’école maternelle ;\nLes motifs personnels ;\nLa perte de votre emploi ;\nLa faute grave de la nounou ;\nLe non renouvellement de l’agrément ;\nUne incompétence professionnelle.\n\nCordialement."}, {"id": "id_183", "question": "Assistante maternelle enceinte, début congé de maternité en septembre. À quelle date le contrat peut-il être rompu ? Convention collective : particuliers employeurs.", "reponse": "Bonjour,\n\nJe vous transmets via le lien ci-après une fiche d'information reprenant la législation concernant :\nRupture du contrat de travail d'une assistante maternelle par un particulier employeur | Service Public\n\nLes services de renseignements donnent des informations juridiques générales relatives au Code du travail, aux conventions collectives et à la jurisprudence sociale aux salariés et aux employeurs du secteur privé.\nIls ne donnent aucun avis, ne rendent aucune décision.\nIls ne sont pas compétents pour :\n- les demandes d’intervention en entreprise, qui relèvent de la compétence des sections d’inspection du travail (Contacter l'inspection du travail dans l'Eure - Directions régionales de l'économie, de l'emploi, du travail et des solidarités (DREETS)\n- régler les litiges qui sont de la compétence de Conseil de prud’hommes ;\n- constituer un dossier prud’homal ;\n- effectuer ou vérifier les calculs de rémunération, d'indemnités de rupture de contrat ou de congés payés, etc. ;\n- effectuer ou vérifier les calculs de jours de congés payés ou de repos ;\n- rédiger ou valider des courriers ;\n- renseigner sur les cotisations sociales qui est de la compétence de l’URSSAF ;\n- renseigner sur le droit à assurance chômage, cette mission étant du domaine de France Travail (anciennement Pôle Emploi).\n\n*la saisine du Conseil des prud'hommes (juridiction compétente pour le règlement des litiges) :\n                - https://travail-emploi.gouv.fr/droit-du-travail/le-reglement-des-conflits-individuels-et-collectifs/article/le-conseil-de-prud-hommes\n                - https://www.service-public.fr/particuliers/vosdroits/R45128\n                - https://normandie.dreets.gouv.fr/Les-defenseurs-syndicaux-modification-de-la-liste-pour-la-Normandie (défenseur syndical)"}, {"id": "id_184", "question": "Assistante maternelle enceinte, début congé de maternité en septembre. À quelle date le contrat peut-il être rompu ? Convention collective : particuliers employeurs.", "reponse": "Bonjour,\nSuite à votre demande je vous précise que nos services ne sont pas habilités à faire des calculs.\nToutefois, je peux vous indiquer que pendant l’intégralité de la période de suspension du contrat de travail à laquelle elle a droit au titre du congé maternité, la salariée bénéficie d’une protection dite \"absolue\" contre le licenciement : aucun licenciement ne peut être notifié ou, s’il a été notifié avant le début du congé maternité, prendre effet pendant cette période, sous peine de nullité.\nA l'issue du congé de maternité ou, le cas échéant, à l'issue des congés payés accolés au congé de maternité, la salariée bénéficie pendant 10 semaines d'une protection contre la rupture de son contrat. Il s'agit d'une protection dite \"relative \"pendant laquelle le contrat ne peut être rompu que pour faute grave ou impossibilité de maintenir le contrat (Article L.1225-4 du code du travail).\nCordialement"}, {"id": "id_185", "question": "Assistante maternelle enceinte, début congé de maternité en septembre. À quelle date le contrat peut-il être rompu ? Convention collective : particuliers employeurs.", "reponse": "Bonjour,\n\n\n\nPour faire suite à votre mail et sous réserve de l’appréciation souveraine des tribunaux, veuillez trouver les informations suivantes :\n\n\nLa protection prévue par le code du travail en matière de maternité s’applique aux assistantes maternelles. (mention reprise dans le socle commun de la convention collective du salarié du particulier employeur aux articles 48.1.2 et suivants).\n\n\nPour bénéficier de la protection, la salariée doit remettre à son employeur, contre récépissé, ou lui envoyer par lettre recommandée avec accusé de réception (LRAR), un certificat médical attestant, suivant le cas, de :\n- son état de grossesse et la date présumée de son accouchement ou la date effective de celui-ci ;\n\n- s’il y a lieu, l’existence et la durée prévisible de son état pathologique rendant nécessaire une augmentation de la période de suspension de son contrat de travail.\n\n\n\nIl est interdit à l’employeur de rompre le contrat de l’assistante maternelle lorsqu'elle est en état de grossesse médicalement constaté, pendant l'intégralité des périodes de suspension du contrat de travail auxquelles elle a droit au titre du congé de maternité, qu'elle use ou non de ce droit, et des congés payés éventuellement pris immédiatement après le congé de maternité, ainsi que pendant les 10 semaines suivantes.\n\n\nToutefois, l’employeur peut rompre le contrat s’il justifie :\n- soit d’une faute grave de la salariée, non liée à l'état de grossesse ;\n\n- soit de son impossibilité de maintenir le contrat de travail pour un motif étranger à la grossesse et à l’accouchement.\n\nDans ces cas, la rupture du contrat de travail ne peut cependant pas prendre effet ni être notifiée pendant les périodes de droit à congé de maternité et les congés payés consécutifs.\n\n\n\nLe retrait d’enfant notifié par l’employeur est annulé lorsque, dans un délai de 15 jours à compter de cette notification, l’assistante maternelle envoie à son employeur par LRAR, un certificat médical justifiant qu’elle est enceinte.\nLa salariée n’a aucune obligation d’informer son employeur de son état de grossesse, cependant elle ne peut prétendre à aucune protection tant que l’employeur n’est pas officiellement informé.\n\nLa maternité de la salariée ne peut-être le motif du retrait de l’enfant.\n\n\n\nVous trouverez, sur le site de la DREETS d’Occitanie, une fiche synthétique sur le congé maternité de l’assistante maternelle reprenant les périodes d’interdiction relative de rupture du contrat et celles d’interdiction absolue.\nGuides juridiques Assistants maternels - Direction régionale de l'économie, de l'emploi, du travail et des solidarités (DREETS) d'Occitanie\n\nCordialement,"}, {"id": "id_186", "question": "Assistante maternelle enceinte, début congé de maternité en septembre. À quelle date le contrat peut-il être rompu ? Convention collective : particuliers employeurs.", "reponse": "Bonjour,\n\nVous trouverez vos réponses dans la fiche ci joint;\n\n\nCordialement"}, {"id": "id_187", "question": "Assistante maternelle enceinte, début congé de maternité en septembre. À quelle date le contrat peut-il être rompu ? Convention collective : particuliers employeurs.", "reponse": "Madame,\n\nConformément à l'article L.1243-1 du code du travail, la rupture anticipée du contrat à durée déterminée ne peut intervenir que dans les situations cités ci-dessous.\n\nArticle L.1243-1 du code du travail :\n\"Sauf accord des parties, le contrat de travail à durée déterminée ne peut être rompu avant l'échéance du terme qu'en cas de faute grave, de force majeure ou d'inaptitude constatée par le médecin du travail.\nLorsqu'il est conclu en application du 6° de l'article L. 1242-2, le contrat de travail à durée déterminée peut, en outre, être rompu par l'une ou l'autre partie, pour un motif réel et sérieux, dix-huit mois après sa conclusion puis à la date anniversaire de sa conclusion.\"\n\nArticle L.1243-4 du code du travail :\n\"La rupture anticipée du contrat de travail à durée déterminée qui intervient à l'initiative de l'employeur, en dehors des cas de faute grave, de force majeure ou d'inaptitude constatée par le médecin du travail, ouvre droit pour le salarié à des dommages et intérêts d'un montant au moins égal aux rémunérations qu'il aurait perçues jusqu'au terme du contrat, sans préjudice de l'indemnité de fin de contrat prévue à l'article L. 1243-8.\nToutefois, lorsque le contrat de travail est rompu avant l'échéance du terme en raison d'un sinistre relevant d'un cas de force majeure, le salarié a également droit à une indemnité compensatrice dont le montant est égal aux rémunérations qu'il aurait perçues jusqu'au terme du contrat. Cette indemnité est à la charge de l'employeur.\"\n\nVotre employeur vous a t-il remis une notification de la rupture de votre contrat ?\nL'employeur n'est pas obligé de prolonger la durée du CDD en cas de grossesse. Le contrat prend fin à la date initialement prévue.\n\nCordialement,"}, {"id": "id_188", "question": "J’ai effectué un remplacement en CDD dans une micro-crèche, fini le 22 septembre 2025, et je n’ai toujours pas reçu mon salaire malgré relances. Est-elle en droit de me faire patienter ? Quels sont les délais ?", "reponse": "Bonjour,\n\nDans le cadre d'une rupture de contrat de travail, le salaire du dernier mois doit être payé au moment de la rupture du contrat de travail.\nIl convient dans votre cas d'adresser à l'employeur un courrier recommandé avec avis de réception de mise en demeure.\nSans réponse dans le délai imparti, vous serez en mesure de saisir le conseil des prud'hommes en formation de référé.\n\nCordialement,"}, {"id": "id_189", "question": "J’ai effectué un remplacement en CDD dans une micro-crèche, fini le 22 septembre 2025, et je n’ai toujours pas reçu mon salaire malgré relances. Est-elle en droit de me faire patienter ? Quels sont les délais ?", "reponse": "Bonjour,\nAucun délai de tolérance n’est prévu par la loi : le salaire doit être versé immédiatement après la fin du contrat (ou au plus tard le dernier jour du mois)\n\nVotre employeur n’a pas le droit de vous faire patienter pour le paiement de votre salaire. Vous devez envoyer une mise en demeure à votre employeur (LRAR) pour exiger le paiement. Si l'employeur ne régularise pas vous pouvez saisir les prud’hommes en référé. (voir pièce jointe)\n\nVeuillez agréer, l'expression de mes salutations distinguées"}, {"id": "id_190", "question": "J’ai effectué un remplacement en CDD dans une micro-crèche, fini le 22 septembre 2025, et je n’ai toujours pas reçu mon salaire malgré relances. Est-elle en droit de me faire patienter ? Quels sont les délais ?", "reponse": "Monsieur,\n\n\n\nPour faire suite à votre message et compte tenu des informations en notre possession, veuillez trouver les éléments de réponse suivants :\n[capture d'écran]\n\n\n  - Paiement du salaire :\n=> Paiement du salaire - Code du travail numérique\n\n\n=> Le Code du travail prévoit que :\n                            * Article L.3242-1 :\n                         \"[...] Le paiement de la rémunération est effectué une fois par mois. [...]\"\n\n                            * Article L.3243-2 : \n                         \"Lors du paiement du salaire, l'employeur remet aux personnes mentionnées à l'article L. 3243-1 une pièce justificative dite bulletin de paie. [...]\"\n=> A adapter à votre situation et à envoyer à votre employeur par courrier recommandé avec accusé de réception : Modèle de document : Demande de paiement de salaire - Code du travail numérique\n\nEn résumé, nous vous invitons à envoyer un courrier recommandé avec accusé de réception à votre ancien employeur en lui réclamant le paiement de votre salaire du mois de septembre 2025. Et ce, en lui fixant un délai que vous déterminerez (par exemple, huit jours).\nA défaut de régularisation de sa part dans le délai fixé, vous serez en droit de saisir le Conseil de Prud'hommes.\nPour cela, veuillez trouver en pièces jointes le cerfa de saisine, sa notice explicative ainsi que la liste des défenseurs syndicaux qui pourront vous assister gratuitement dans cette démarche.\n\n\nEn complément :\n\n    -  Documents de fin de contrat :\n=> Fiches pratiques :\nFin de contrat : documents à remettre au salarié - Code du travail numérique\nLes documents remis aux salariés lors de la rupture du contrat de travail | Travail-emploi.gouv.fr | Ministère du Travail et des Solidarités\nFin d'un contrat à durée déterminée (CDD) - Code du travail numérique\n\n=> A adapter à votre situation et à envoyer à votre ancien employeur en courrier recommandé avec accusé de réception : Modèle de lettre : Réclamation des documents de fin de contrat - Code du travail numérique\n\n=> La seule obligation de l’employeur est de tenir à disposition du salarié tous les documents de fin de contrat dès la fin du contrat de travail (C. trav., art. L.1234-19 ; C. trav., art. L.1234-20 ; C. trav., art. R1234-9 ; C. trav., art. R.1238-3) et de l’en informer.\nPar ailleurs, l'employe
