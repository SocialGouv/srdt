 ou plusieurs coupure(s). Elle est prise en tout lieu où le salarié est amené à exercer son activité. Néanmoins, l'employeur ne peut imposer plus de deux coupures dans une même journée.\nLorsque l'amplitude de la journée de travail est prolongée jusqu'à 13 heures, une interruption d'au moins 2 h 30 continues ou deux interruptions d'au moins 1 h 30 continue chacune doivent être respectées. Au-delà de 13 h 00, une interruption d'au moins 3 h 00 continues ou deux interruptions d'au moins 2 h 00 continues chacune doivent être respectées. Au cours de ces interruptions, le salarié n'exerce aucune activité et dispose librement de son temps. Le lieu d'interruption doit comporter les commodités d'usage, de restaurations et de repos.\n\nTemps d'attente\n\nEst considéré comme temps d'attente, le temps compris entre la prise en charge du client, l'accompagnement à son lieu de rendez-vous et le retour à son domicile.\nLe temps d'attente est considéré comme temps travail effectif inclus dans le calcul des éventuelles heures supplémentaires et des durées maximales journalières fixées ci-avant.\nEn aucun cas le temps d'attente ne peut être assimilé à une coupure et ainsi décompté du temps de travail.\n\n************************************************************\n\nArticle 7\n\nPériodes d'astreinte\n\nL'astreinte est une période pendant laquelle le salarié, sans être sur son lieu de travail et sans être à la disposition permanente et immédiate de l'employeur, doit être en mesure d'intervenir pour accomplir un travail au service de l'entreprise.\n\nLe salarié peut refuser l'astreinte sans que ce refus ne constitue ni une faute, ni un motif de licenciement.\n\nEn cas d'intervention du salarié pendant une période d'astreinte, la durée de l'intervention est considérée comme du temps de travail effectif, temps de déplacement inclus.\n\nLa période d'astreinte fait l'objet d'une indemnité égale à 25 % du salaire horaire ou d'un repos compensateur équivalent au choix du salarié et à défaut de l'employeur.\n\nLa période d'astreinte est prise en compte pour le calcul de la durée minimale de repos quotidien et des durées de repos hebdomadaire.\n\nL'employeur communique, par écrit, aux salariés concernés la programmation individuelle des périodes d'astreinte dans le respect d'un délai de prévenance de 30 jours, sauf circonstances exceptionnelles dûment justifiées et sous réserve qu'ils en soient avertis au moins sept jours calendaires à l'avance.\n\nEn fin de mois, l'employeur doit remettre au salarié un document récapitulant le nombre d'heures d'astreinte accomplies par celui-ci au cours du mois écoulé ainsi que la compensation correspondante.\n\nCordialement."}, {"id": "id_111", "question": "Bonjour,\n\nJe me permets de vous contacter afin de vous exposer une difficulté que\nje rencontre avec mon employeur.\n\nJe suis chauffeur de taxi salarié en CDI, et il m’est régulièrement\ndemandé de rester disponible sur des plages horaires étendues, même\nen l’absence de mission clairement définie. Notamment, pour la\njournée du vendredi 12 décembre, mon employeur me demande d’être\ndisponible de 8h30 à 17h30, alors qu’aucune course ne m’a été\naffectée à ce jour.\n\nOr, selon les informations que j'ai précédemment obtenues, en l’absence de mission ou d’astreinte clairement\nencadrée, mes horaires de disponibilité doivent correspondre à ceux\nd’ouverture du bureau, soit de 8h00 à 12h00 le vendredi. Mon\nemployeur semble refuser cette organisation, sans fournir de\njustification légale ou de cadre formel d’astreinte.\n\nJe vous remercie par avance pour votre éclairage sur la situation,\nainsi que pour votre aide afin de savoir quelles démarches je peux\nentreprendre pour faire valoir mes droits dans ce contexte.\n\nBien cordialement,", "reponse": "Monsieur,\n\nSuite à votre courriel, veuillez trouver ci-après des éléments de réponse à vos questions, sous réserve de l'appréciation souveraine des juges de fond.\n\nEn l'absence de votre contrat de travail, la convention collective \"taxi\" prévoit aux articles 4-1 et suivants les dispositions suivantes :\n\nArticle 4-1 - Définition du temps de travail effectif des personnels roulants\nIl s'entend du temps de travail s'écoulant entre le début et la fin de la journée de travail, quel que soit le lieu où il s'exécute, à l'exclusion du temps consacré au repas, des temps de pause et plus généralement toutes interruptions entre les deux séquences de travail qui ne sont pas du travail effectif dès lors que le salarié peut vaquer librement à ses occupations personnelles.\n\nLe temps de travail effectif du personnel roulant est donc calculé sur la base de l'amplitude diminuée des temps de pauses ou de coupures dans le respect des règles fixées à l'article 4-2 du présent accord.\n\nArticle 4-2 - Pauses, coupures et temps d'attente\nLa Pause\nLe temps de pause est un arrêt de travail de courte durée. Le salarié peut alors vaquer librement à ses occupations personnelles sans avoir à respecter les directives de l'employeur (par exemple pour téléphoner, prendre un café). La pause n'est donc pas considérée comme du temps de travail effectif.\n\nConformément aux dispositions de l'article L. 3121-16 du Code du Travail, dès que le temps de travail quotidien du salarié atteint 5 h 30, le salarié bénéficie d'une pause d'une durée minimale de 25 minutes. Cette pause de 25 minutes peut être accordée à l'issue des 5 h 30 ou avant que ce temps ne soit écoulé. Il est précisé que cette pause légale ne peut coïncider avec la pause repas.\n\nUn accord d'entreprise ou d'établissement peut fixer une durée de pause supérieure à la durée minimale de 25 minutes.\n\nPause repas\nEn cas de journée continue l'employeur est tenu de donner une coupure pour le repas de midi au minimum de 30 minutes fixée pour chaque salarié en fonction des tâches à exécuter, mais au plus tôt pour la pause déjeuner à partir de 11 h et au plus tard jusqu'à 14 h 30 et au plus tôt pour la pause dîner à partir de 19 h et au plus tard 22 h.\n\nCoupures\nEst ainsi qualifiée, toute période d'interruption d'activité décidée par l'employeur. Ainsi une période de travail peut comporter une ou plusieurs coupure(s). Elle est prise en tout lieu où le salarié est amené à exercer son activité. Néanmoins, l'employeur ne peut imposer plus de deux coupures dans une même journée.\n\nLorsque l'amplitude de la journée de travail est prolongée jusqu'à 13 heures, une interruption d'au moins 2 h 30 continues ou deux interruptions d'au moins 1 h 30 continue chacune doivent être respectées. Au-delà de 13 h 00, une interruption d'au moins 3 h 00 continues ou deux interruptions d'au moins 2 h 00 continues chacune doivent être respectées. Au cours de ces interruptions, le salarié n'exerce aucune activité et dispose librement de son temps. Le lieu d'interruption doit comporter les commodités d'usage, de restaurations et de repos.\n\nTemps d'attente\nEst considéré comme temps d'attente, le temps compris entre la prise en charge du client, l'accompagnement à son lieu de rendez-vous et le retour à son domicile.\n\nLe temps d'attente est considéré comme temps travail effectif inclus dans le calcul des éventuelles heures supplémentaires et des durées maximales journalières fixées ci-avant.\n\nEn aucun cas le temps d'attente ne peut être assimilé à une coupure et ainsi décompté du temps de travail.\n\nJe vous prie de croire, Monsieur, à l’assurance de ma considération distinguée."}, {"id": "id_112", "question": "Bonjour,\n\nJe me permets de vous contacter afin de vous exposer une difficulté que\nje rencontre avec mon employeur.\n\nJe suis chauffeur de taxi salarié en CDI, et il m’est régulièrement\ndemandé de rester disponible sur des plages horaires étendues, même\nen l’absence de mission clairement définie. Notamment, pour la\njournée du vendredi 12 décembre, mon employeur me demande d’être\ndisponible de 8h30 à 17h30, alors qu’aucune course ne m’a été\naffectée à ce jour.\n\nOr, selon les informations que j'ai précédemment obtenues, en l’absence de mission ou d’astreinte clairement\nencadrée, mes horaires de disponibilité doivent correspondre à ceux\nd’ouverture du bureau, soit de 8h00 à 12h00 le vendredi. Mon\nemployeur semble refuser cette organisation, sans fournir de\njustification légale ou de cadre formel d’astreinte.\n\nJe vous remercie par avance pour votre éclairage sur la situation,\nainsi que pour votre aide afin de savoir quelles démarches je peux\nentreprendre pour faire valoir mes droits dans ce contexte.\n\nBien cordialement,", "reponse": "Article L3121-9\nUne période d'astreinte s'entend comme une période pendant laquelle le salarié, sans être sur son lieu de travail et sans être à la disposition permanente et immédiate de l'employeur, doit être en mesure d'intervenir pour accomplir un travail au service de l'entreprise.\nLa durée de cette intervention est considérée comme un temps de travail effectif.\nLa période d'astreinte fait l'objet d'une contrepartie, soit sous forme financière, soit sous forme de repos.\nLes salariés concernés par des périodes d'astreinte sont informés de leur programmation individuelle dans un délai raisonnable.\n\nVotre employeur ne peut vous demander de rester disponible toute une journée sans mission définie, sauf si cela correspond à du temps de travail effectif prévu par votre contrat ou par un accord collectif. S’il s’agit d’une période où vous devez être prêt à partir immédiatement, cela relève plutôt à une astreinte mais cela doit être clairement encadré, annoncé à l’avance et donner lieu à une indemnisation spécifique. Une astreinte ne peut pas être imposée de façon informelle.\n\nSi votre employeur vous demande de rester disponible au point de devoir rester sur votre lieu de travail, alors il ne s’agit pas d’une astreinte mais bien de temps de travail effectif. Dans ce cas, vous êtes considéré comme étant à la disposition de l’employeur et vous ne pouvez pas vaquer librement à vos occupations. Ce temps doit donc être rémunéré comme du temps de travail, même si aucune course ne vous est attribuée.\n\nSi votre employeur impose ces plages horaires sans les reconnaître comme du temps de travail ou sans cadre d’astreinte défini, vous êtes en droit de demander une justification et de faire valoir vos droits.\n\nVous pouvez demander à votre employeur une clarification écrite sur le fondement de cette exigence.\n\nSi le désaccord persiste, il est possible de saisir le Prud’hommes pour faire reconnaître ces périodes comme du temps de travail."}, {"id": "id_113", "question": "Bonjour,\n\nJe me permets de vous contacter afin de vous exposer une difficulté que\nje rencontre avec mon employeur.\n\nJe suis chauffeur de taxi salarié en CDI, et il m’est régulièrement\ndemandé de rester disponible sur des plages horaires étendues, même\nen l’absence de mission clairement définie. Notamment, pour la\njournée du vendredi 12 décembre, mon employeur me demande d’être\ndisponible de 8h30 à 17h30, alors qu’aucune course ne m’a été\naffectée à ce jour.\n\nOr, selon les informations que j'ai précédemment obtenues, en l’absence de mission ou d’astreinte clairement\nencadrée, mes horaires de disponibilité doivent correspondre à ceux\nd’ouverture du bureau, soit de 8h00 à 12h00 le vendredi. Mon\nemployeur semble refuser cette organisation, sans fournir de\njustification légale ou de cadre formel d’astreinte.\n\nJe vous remercie par avance pour votre éclairage sur la situation,\nainsi que pour votre aide afin de savoir quelles démarches je peux\nentreprendre pour faire valoir mes droits dans ce contexte.\n\nBien cordialement,", "reponse": "Monsieur,\n\nL'article L3121-1 Code du travail dispose que : \"La durée du travail effectif est le temps pendant lequel le salarié est à la disposition de l'employeur et se conforme à ses directives sans pouvoir vaquer librement à des occupations personnelles.\"\n\nJe vous transmets via les liens ci-après la convention collective citée (dont les dispositions relatives à la durée du travail) : Convention collective nationale des taxis du 11 septembre 2001 - Textes Attachés - Accord du 5 février 2020 relatif à l'aménagement du temps de travail - Légifrance\n\nEn cas de litige relatif à l'existence ou au nombre d'heures de travail effectuées, il appartient au salarié de présenter au tribunal (saisine du Conseil des prud'hommes*), à l'appui de sa demande, des éléments suffisamment précis quant aux heures non rémunérées qu'il prétend avoir accomplies afin de permettre à l'employeur, qui assure le contrôle des heures de travail effectuées, d'y répondre utilement en produisant ses propres éléments.\nAu vu de l'ensemble de ces éléments, le juge forme sa conviction après avoir ordonné, en cas de besoin, toutes les mesures d'instruction qu'il estime utiles.\nSi le décompte des heures de travail accomplies par chaque salarié est assuré par un système d'enregistrement automatique, celui-ci doit être fiable et infalsifiable.\n(C. trav., art. L. 3171-4 Cass. soc., 8 sept. 2021, n° 19-25.502 Cass. soc., 18 mars 2020, n° 18-10.919, n° 373 FP - P + B + R + I Cass. soc., 3 juill. 1996, n° 93-41.645, n° 3114 P + B)\n\nEn cas de litige relatif à l'existence ou au nombre d'heures supplémentaires, selon une jurisprudence constante, c'est au salarié de présenter, en premier lieu, à l'appui de sa demande, des éléments suffisamment précis relatifs aux heures non rémunérées qu'il prétend avoir accomplies. La charge de la preuve est ensuite transférée à l'employeur qui doit répondre utilement au salarié en produisant ses propres éléments.\nAu vu de l'ensemble de ces éléments, le juge forme sa conviction après avoir ordonné, en cas de besoin, toutes les mesures d'instruction qu'il estime utiles.\nCette solution résulte d'une combinaison des articles L. 3171-2, L. 3171-3 et L. 3171-4 du code du travail. (♦C. trav., art. L. 3171-2, L. 3171-3 et L. 3171-4)\n\nL'article L. 1222-1 du code du travail dispose que : \"Le contrat de travail est exécuté de bonne foi.\"\nSi ce n'est pas le cas, le Conseil de prud'hommes* est la juridiction compétente qui règle les litiges individuels entre employeur et salarié survenus à l'occasion de tout contrat de travail.\nLorsqu'ils ont subi un préjudice du fait du non-respect par l'employeur des dispositions légales, réglementaires ou conventionnelles, les salariés peuvent prétendre à l'attribution de dommages et intérêts. L'employeur ne peut invoquer le fait que les salariés concernés n'avaient pas contesté l'infraction. (♦Cass. soc., 29 janv. 1981, n° 79-41.406)\n\nPour un signalement ou une demande d'intervention concernant l'hygiène, la sécurité et les conditions de travail en entreprise, vous pouvez écrire à l'agent de contrôle compétent géographiquement (coordonnées des sections d’inspection du travail accessibles sur la cartographie via le lien suivant : Annuaire de l'inspection du travail en Normandie (arcgis.com)\nLes agents de l'inspection du travail ne sont pas juges du contrat de travail. Ils n'interviennent pas dans les litiges individuels. Dans ces situations, il faut saisir le Conseil de prud'hommes*\n\n*la saisine du Conseil des prud'hommes (juridiction compétente pour le règlement des litiges) :\n- https://travail-emploi.gouv.fr/droit-du-travail/le-reglement-des-conflits-individuels-et-collectifs/article/le-conseil-de-prud-hommes\n- https://www.service-public.fr/particuliers/vosdroits/R45128\n- https://normandie.dreets.gouv.fr/Les-defenseurs-syndicaux-modification-de-la-liste-pour-la-Normandie (défenseur syndical)"}, {"id": "id_114", "question": "Bonjour,\n\nJe me permets de vous contacter afin d’obtenir des précisions concernant la réglementation applicable au temps d’habillage et de déshabillage dans mon entreprise.\n\nJe travaille dans un atelier d’usinage, où le port d’un bleu de travail est obligatoire et mentionné sur les fiches de poste. L’habillage et le déshabillage doivent être effectués sur le lieu de travail. De plus, le vestiaire est situé assez loin du poste d’usinage, ce qui augmente le temps nécessaire pour s’habiller, se déshabiller, ainsi que les déplacements associés.\n\nDans ce contexte, je souhaiterais savoir si ce temps, ainsi que les déplacements liés à l’emplacement du vestiaire doit être rémunéré ou faire l’objet d’une contrepartie (financière ou en repos), conformément aux dispositions du Code du travail.\n\nJe vous remercie par avance pour les informations et précisions que vous pourrez me transmettre.\n", "reponse": "Monsieur,\n\nNous vous invitons à prendre connaissance de ces informations :\n\n=>Le temps d'habillage du salarié (tenue de travail) est-il pris en compte ? - Code du travail numérique\n\n=> Simulateur - Trouver sa convention collective - Code du travail numérique\n\nCordialement.\nService Renseignements en Droit du Travail"}, {"id": "id_115", "question": "Bonjour,\n\nJe me permets de vous contacter afin d’obtenir des précisions concernant la réglementation applicable au temps d’habillage et de déshabillage dans mon entreprise.\n\nJe travaille dans un atelier d’usinage, où le port d’un bleu de travail est obligatoire et mentionné sur les fiches de poste. L’habillage et le déshabillage doivent être effectués sur le lieu de travail. De plus, le vestiaire est situé assez loin du poste d’usinage, ce qui augmente le temps nécessaire pour s’habiller, se déshabiller, ainsi que les déplacements associés.\n\nDans ce contexte, je souhaiterais savoir si ce temps, ainsi que les déplacements liés à l’emplacement du vestiaire doit être rémunéré ou faire l’objet d’une contrepartie (financière ou en repos), conformément aux dispositions du Code du travail.\n\nJe vous remercie par avance pour les informations et précisions que vous pourrez me transmettre.\n", "reponse": "Bonjour,\n\n\nPour faire suite à votre demande, et sous réserve de l'appréciation souveraine des juges du fond;\n\nEn principe, le temps d'habillage et de déshabillage ne constitue pas un temps de travail effectif (et n'est donc pas rémunéré). Toutefois, le temps d'habillage et de déshabillage peut être assimilé à du temps de travail effectif par un accord collectif ou par contrat de travail ou par usage.\n\nEn revanche, si les salariés doivent obligatoirement se changer dans les locaux de l'entreprise, le temps d'habillage/déshabillage est considéré comme du temps de travail effectif. Attention, Il ne suffit pas que le port d'une tenue soit obligatoire pour considérer que le temps d'habillage soit du temps de travail effectif. Il ne s'agit pas de temps de travail effectif si les salariés choisissent volontairement de se changer sur leur lieu de travail (Cour de cassation, civile, Chambre sociale, 28 octobre 2009, 08-41.953 08-41.954, Publié au bulletin).\n\nEn cas de litige, le juge recherche si les salariés se tiennent, durant les périodes d'habillage et de déshabillage, à la disposition de l'employeur et doivent se conformer à ses directives sans pouvoir vaquer librement à des occupations personnelles. Si tel est le cas, il s'agit de temps de travail effectif.\n\nEn tout état de cause, des contreparties au temps d'habillage (même s'il n'est pas considéré comme du temps de travail effectif) doivent être prévues sous la forme d'un repos ou sous une forme financière si les conditions cumulatives suivantes sont réunies :\n\n-   le port d'une tenue de travail est imposé par des dispositions légales, conventionnelles, un règlement intérieur ou par le contrat de travail\n-   les opérations d'habillage et de déshabillage doivent se faire dans l'entreprise ou le lieu de travail (article L.3121-3 du Code du travail)\n\n\n\n\nRestant à votre disposition pour toutes informations supplémentaires.\n\nCordialement,"}, {"id": "id_116", "question": "Bonjour,\n\nJe me permets de vous contacter afin d’obtenir des précisions concernant la réglementation applicable au temps d’habillage et de déshabillage dans mon entreprise.\n\nJe travaille dans un atelier d’usinage, où le port d’un bleu de travail est obligatoire et mentionné sur les fiches de poste. L’habillage et le déshabillage doivent être effectués sur le lieu de travail. De plus, le vestiaire est situé assez loin du poste d’usinage, ce qui augmente le temps nécessaire pour s’habiller, se déshabiller, ainsi que les déplacements associés.\n\nDans ce contexte, je souhaiterais savoir si ce temps, ainsi que les déplacements liés à l’emplacement du vestiaire doit être rémunéré ou faire l’objet d’une contrepartie (financière ou en repos), conformément aux dispositions du Code du travail.\n\nJe vous remercie par avance pour les informations et précisions que vous pourrez me transmettre.\n", "reponse": "Bonjour Monsieur,\n\nEn principe, le temps d'habillage et de déshabillage ne constitue pas en principe un temps de travail effectif. Toutefois, le temps d'habillage et de déshabillage peut être assimilé à du temps de travail effectif par un accord collectif ou par contrat de travail ou par usage (C. trav; art.L3121-7 et 8). Si ce temps d'habillage et de déshabillage n'est pas considéré comme du temps de travail effectif, des contreparties doivent être prévues sous la forme d'un repos ou sous une forme financière si les conditions cumulatives suivantes sont réunies :\n\n-   le port d'une tenue de travail est imposé par des dispositions légales, conventionnelles, un règlement intérieur ou par le contrat de travail ;\n-   les opérations d'habillage et de déshabillage doivent se faire dans l'entreprise ou le lieu de travail (C. trav; art.L.3121-3).\n\nConcernant le temps de déplacement dans l'enceinte de l'entreprise pour vous rendre aux vestiaires, avant la prise de poste, le fait de vous déplacer dans l'enceinte de l'entreprise ne peut conduire à considérer ce temps de déplacement comme un temps de travail effectif. En effet, il convient de déterminer si vous êtes libéré de toute activité professionnelle ou pas pendant ce temps.\nIl faut vérifier si ces temps de déplacement remplissent les critères de l'article L.3121-1 du code du travail, c'est-à-dire si le salarié est à la disposition de l'employeur et se conforme à ses directives sans pouvoir vaquer librement à des occupations personnelles (Cass. soc;7 juin 2023,n°21-12.841).\nPar contre, à partir du moment où vous sortez du vestiaire, avec votre tenue de travail obligatoire pour vous rendre au poste d'usinage, ce temps de déplacement doit être assimilé à un temps de travail effectif car vous êtes à la disposition de l'employeur (Cass. soc; 13 juillet 2004,n°02-15.142)."}, {"id": "id_117", "question": "Bonjour,\n\nJe me permets de vous contacter afin d’obtenir des précisions concernant la réglementation applicable au temps d’habillage et de déshabillage dans mon entreprise.\n\nJe travaille dans un atelier d’usinage, où le port d’un bleu de travail est obligatoire et mentionné sur les fiches de poste. L’habillage et le déshabillage doivent être effectués sur le lieu de travail. De plus, le vestiaire est situé assez loin du poste d’usinage, ce qui augmente le temps nécessaire pour s’habiller, se déshabiller, ainsi que les déplacements associés.\n\nDans ce contexte, je souhaiterais savoir si ce temps, ainsi que les déplacements liés à l’emplacement du vestiaire doit être rémunéré ou faire l’objet d’une contrepartie (financière ou en repos), conformément aux dispositions du Code du travail.\n\nJe vous remercie par avance pour les informations et précisions que vous pourrez me transmettre.\n", "reponse": "Monsieur,\n\nEn réponse à votre requête :\n\nConvention collective nationale de la métallurgie\n\nArticle 96-1\n\nLe temps d'habillage et déshabillage\n\nLe temps nécessaire aux opérations d'habillage et de déshabillage visé à l'article L. 3121-3 du code du travail n'est pas du temps de travail effectif. Il fait l'objet d'une contrepartie lorsque le port d'une tenue de travail est imposé par des dispositions législatives ou conventionnelles, ou par le règlement intérieur ou le contrat de travail et qu'elle doit être mise et ôtée dans l'entreprise ou sur le lieu de travail, notamment, en raison d'impératifs liés à des raisons d'hygiène ou de sécurité.\n\nLa contrepartie fixée par l'employeur est adaptée aux conditions d'habillage et de déshabillage imposées par l'entreprise. En tout état de cause, cette contrepartie ne peut être inférieure, pour chaque semaine comportant un temps d'habillage et de déshabillage visé à l'article L. 3121-3 du code du travail, à une indemnité égale à la moitié du taux horaire du salaire minimum hiérarchique applicable au salarié. Cette indemnité peut être versée en une seule fois dans le cadre de chaque période de 12 mois civils.\n\nCette contrepartie peut être convertie, à l'initiative de l'employeur, ou à la demande du salarié et après accord de l'employeur, en un repos équivalent, le cas échéant, attribué en une seule fois dans le cadre de chaque période de 12 mois civils. L'employeur en fixe les modalités de prise.\n\nEn application de l'article L. 2253-3 du code du travail, les dispositions du présent article ne sont pas applicables lorsqu'un accord d'entreprise prévoit des contreparties au titre du temps d'habillage et de déshabillage, quels que soient le montant et les modalités de calcul ou de versement de la contrepartie prévue par cet accord d'entreprise.\n\nA défaut d'accord d'entreprise, indemnité, versée pour chaque semaine comportant un temps d'habillage et de déshabillage, fixée par l'employeur, sans pouvoir être inférieure à la moitié du taux horaire du salaire minimum hiérarchique applicable au salarié.\nA l'initiative de l'employeur ou à la demande du salarié après accord de l'employeur, possibilité de convertir l'indemnité en repos équivalent.\n\nCordialement,"}, {"id": "id_118", "question": "Bonjour,\n\nJe me permets de vous contacter afin d’obtenir des précisions concernant la réglementation applicable au temps d’habillage et de déshabillage dans mon entreprise.\n\nJe travaille dans un atelier d’usinage, où le port d’un bleu de travail est obligatoire et mentionné sur les fiches de poste. L’habillage et le déshabillage doivent être effectués sur le lieu de travail. De plus, le vestiaire est situé assez loin du poste d’usinage, ce qui augmente le temps nécessaire pour s’habiller, se déshabiller, ainsi que les déplacements associés.\n\nDans ce contexte, je souhaiterais savoir si ce temps, ainsi que les déplacements liés à l’emplacement du vestiaire doit être rémunéré ou faire l’objet d’une contrepartie (financière ou en repos), conformément aux dispositions du Code du travail.\n\nJe vous remercie par avance pour les informations et précisions que vous pourrez me transmettre.\n", "reponse": "Bonjour,\n\n\nLe temps nécessaire aux opérations d’habillage et de déshabillage est considéré comme du temps de travail particulier lorsqu’il remplit deux conditions cumulatives (Article L. 3121-3 du Code du travail) : https://www.legifrance.gouv.fr/codes/article_lc/LEGIARTI000033020510e\nLe port d’une tenue de travail doit être imposé (par la loi, une convention collective, le règlement intérieur ou le contrat de travail) et l’habillage/déshabillage doit être effectué dans l’entreprise ou sur le lieu de travail (ex. : atelier, chantier).\n\nConcernant la contrepartie, la priorité est accordée aux accords collectifs(convention ou un accord d’entreprise (ou, à défaut, de branche) doit prévoir ces contreparties . A défaut d’accord c’est le contrat de travail qui fixe le choix entre contreparties ou assimilation à du temps de travail effectif.\nLe temps de travail effectif est définit comme le temps où le salarié est à la disposition de l’employeur et ne peut vaquer librement à ses occupations personnelles (https://www.legifrance.gouv.fr/codes/article_lc/LEGIARTI000033020517/2016-08-10). Si les déplacements vers le vestiaire sont imposés par l’employeur (ex. : vestiaire éloigné, absence de vestiaire proche du poste), ils pourraient être considérés comme du temps de travail effectif et donc rémunérés.\n\nBonne réception,"}, {"id": "id_119", "question": "Bonjour,\n\nJe me permets de vous contacter afin d’obtenir des précisions concernant la réglementation applicable au temps d’habillage et de déshabillage dans mon entreprise.\n\nJe travaille dans un atelier d’usinage, où le port d’un bleu de travail est obligatoire et mentionné sur les fiches de poste. L’habillage et le déshabillage doivent être effectués sur le lieu de travail. De plus, le vestiaire est situé assez loin du poste d’usinage, ce qui augmente le temps nécessaire pour s’habiller, se déshabiller, ainsi que les déplacements associés.\n\nDans ce contexte, je souhaiterais savoir si ce temps, ainsi que les déplacements liés à l’emplacement du vestiaire doit être rémunéré ou faire l’objet d’une contrepartie (financière ou en repos), conformément aux dispositions du Code du travail.\n\nJe vous remercie par avance pour les informations et précisions que vous pourrez me transmettre.\n", "reponse": "Madame, Monsieur,\n\nSuite à votre courriel, en l'absence des dispositions conventionnelles, vous trouverez les articles du code du travail qui prévoit que :\n\nArticle L. 3121-3 : \"Le temps nécessaire aux opérations d'habillage et de déshabillage, lorsque le port d'une tenue de travail est imposé par des dispositions légales, des stipulations conventionnelles, le règlement intérieur ou le contrat de travail et que l'habillage et le déshabillage doivent être réalisés dans l'entreprise ou sur le lieu de travail, fait l'objet de contreparties. Ces contreparties sont accordées soit sous forme de repos, soit sous forme financière.\"\n\nArticle L. 3121-4 : Le temps de déplacement professionnel pour se rendre sur le lieu d'exécution du contrat de travail n'est pas un temps de travail effectif.\nToutefois, s'il dépasse le temps normal de trajet entre le domicile et le lieu habituel de travail, il fait l'objet d'une contrepartie soit sous forme de repos, soit sous forme financière. La part de ce temps de déplacement professionnel coïncidant avec l'horaire de travail n'entraîne aucune perte de salaire.\n\nArticle L. 3121-7 : Une convention ou un accord d'entreprise ou d'établissement ou, à défaut, une convention ou un accord de branche prévoit soit d'accorder des contreparties aux temps d'habillage et de déshabillage mentionnés à l'article L. 3121-3, soit d'assimiler ces temps à du temps de travail effectif.\nUne convention ou un accord d'entreprise ou d'établissement ou, à défaut, une convention ou un accord de branche prévoit des contreparties lorsque le temps de déplacement professionnel mentionné à l'article L. 3121-4 dépasse le temps normal de trajet.\n\n\nPrécisons que rien n'est prévu pour le temps de déplacement entre l'atelier et les vestiaires, vous êtes à la disposition de votre employeur.\n\nTous ces éléments sont donnés sous réserve de l’appréciation souveraine des juges du fond."}, {"id": "id_120", "question": "Bonjour,\n\nJe me permets de vous contacter afin d’obtenir des précisions concernant la réglementation applicable au temps d’habillage et de déshabillage dans mon entreprise.\n\nJe travaille dans un atelier d’usinage, où le port d’un bleu de travail est obligatoire et mentionné sur les fiches de poste. L’habillage et le déshabillage doivent être effectués sur le lieu de travail. De plus, le vestiaire est situé assez loin du poste d’usinage, ce qui augmente le temps nécessaire pour s’habiller, se déshabiller, ainsi que les déplacements associés.\n\nDans ce contexte, je souhaiterais savoir si ce temps, ainsi que les déplacements liés à l’emplacement du vestiaire doit être rémunéré ou faire l’objet d’une contrepartie (financière ou en repos), conformément aux dispositions du Code du travail.\n\nJe vous remercie par avance pour les informations et précisions que vous pourrez me transmettre.\n", "reponse": "Monsieur,\n\nVous trouverez via les liens ci-après :\n- la règlementation concernant : Le temps d'habillage du salarié (tenue de travail) est-il pris en compte ? | Service Public\n- Simulateur - Trouver sa convention collective - Code du travail numérique\n\nLe seul fait que les salariés se trouvent dans l'enceinte de l'entreprise, avant la prise de poste, ne suffit pas à caractériser les temps de déplacement dans cette enceinte en temps de travail effectif.\nIl y a lieu de déterminer si les salariés sont libérés de toute activité professionnelle ou pas. Plus précisément, il est nécessaire de vérifier si ces temps de déplacement remplissent les critères de l'article L. 3121-1 du code du travail, c'est-à-dire si le salarié est à la disposition de l'employeur et se conforme à ses directives sans pouvoir vaquer librement à des occupations personnelles. (Cass. soc., 7 juin 2023, n° 21-12.841, n° 673 FS - B)\n\n1°Cas dans lesquels le temps de déplacement dans l'entreprise est qualifié de temps de travail effectif\nA été qualifié de temps de travail effectif, le temps de déplacement :\n- entre les pointeuses et les vestiaires ou les salles de repos, qui oblige certains salariés à se déplacer à l'intérieur du magasin. Ce temps a été considéré comme du temps de travail effectif car la détermination de cette organisation relevait du pouvoir de l'employeur ; (Cass. soc., 13 juill. 2004, n° 02-15.142, n° 1630 F - P + B)\n- entre l'arrivée des salariés d'Eurodisney dans un local dit « costuming » situé entre les deux parcs et le moment où ils pointent le lieu de pointage. En l'espèce, les appareils de pointage étaient installés près du poste d'affectation de chaque salarié. En fin de poste, le trajet inverse débutait par le badgeage en sortie, puis les salariés allaient enlever leur costume. La Cour de cassation relève que ce trajet, de durée variable, s'effectue soit à pied, à travers des zones ouvertes au public qui peut solliciter les salariés, soit en navette où ils se trouvent, le cas échéant, en présence de leur supérieur hiérarchique. Dans ces navettes, des panneaux leur interdisent de manger et de fumer pendant le trajet. Pendant ce temps , les salariés étaient donc à la disposition de l'employeur et devaient se conformer à ses directives sans pouvoir vaquer à des occupations personnelles. (Cass. soc., 13 janv. 2009, n° 07-40.638)\n\n2°Cas dans lesquels le temps de déplacement dans l'entreprise n'est pas qualifié de temps de travail effectif\nEn revanche, la seule circonstance que le salarié soit tenu de respecter ces contraintes et de se déplacer « à l'intérieur de l'enceinte sécurisée ne permet pas de considérer que ce temps de déplacement constitue un temps de travail effectif». Ainsi un salarié, travaillant pour le compte d'une société d'avitaillement et de stockage de carburant dans un aéroport, réclamait le paiement d'un rappel de salaire, au titre d'une période de travail effectif, pour le temps passé entre son arrivée à l'aéroport et sa prise de poste. Le salarié était, en effet, tenu de se soumettre aux contrôles de sécurité et de prendre une navette spécifique. (Cass. soc., 9 mai 2019, n° 17-20.740, n° 722 FS - P + B)"}, {"id": "id_121", "question": "Bonjour,\n\nJe me permets de venir vers vous car j'aurai souhaité avoir une information concernant une situation que j'ai à mon travail.\n\nVoilà je travaille dans une entreprise adaptée au sein d'un centre de formation et nous sommes rattaché à la convention collective des organismes de formation.\n\nJ'ai été embauchée avec un coefficient de 120 mais je me suis aperçue que l'employeur n'a pas pris en compte le taux horaire en lien avec cette convention et m'a rémunéré sur le taux horaire du smic.\n\nSuite à diverse changement il y'a eu une nouvelle pesée de poste et là mon coefficient à changer et est passé à 170 palier 6 qui me situe à un taux horaire à 12.31 par rapport à cette convention mais là encore pas de changement au niveau de mon taux. En effet, je constate qu'il y a bien une modification apportée sur mon bulletin de salaire avec le montant du salaire minimum annuel conventionnel qui correspond bien à mon nouveau coefficient mais je reste sur le taux horaire du smic. \n\nPars ailleurs sur l'avenant de la convention du 18 novembre 2024 il y' a un paragraphe disant \"S'agissant de salaires minima annuels, l'appréciation de leur respect se fait au terme au terme de l'année. Si au 31 décembre 2025, le salarié bénéficiaire n'a pas perçut le salaire minimum annuel conventionnel prévu pour l'année, il bénéficie d'une régularisation de salaire dont le montant est égal à la différence entre le salaire minimum conventionnel qui lui est dû pour l'année civile 2025 et salaire annuel réellement perçu.\"\n\n\nPouvez-vous me dire si mon employeur à le droit de me laisser sur le taux horaire du smic en faisant une régularisation à chaque fin d'année ou bien si celui-ci doit prendre en compte le taux horaire de la convention et l'appliqué sur mon bulletin de salaire ?\n\nPouvez-vous me dire également si l'employeur doit faire un avenant au contrat pour le changement du coefficient ?", "reponse": "Bonjour,\n\nEn principe, la comparaison entre la rémunération du salarié et le minimum conventionnel est effectuée chaque mois. Cependant, la convention collective peut prévoir une périodicité différente et indiquer que le contrôle du respect de la rémunération minimale conventionnelle s'effectue sur l’année écoulée, en comparant le minimum conventionnel mensuel et le douzième de la rémunération annuelle (Cour de cassation, civile, Chambre sociale, 20 novembre 2019, 18-11.811, Publié au bulletin).\n\nCela ne signifie pas que votre employeur peut vous limiter au taux horaire du SMIC sur vos bulletins de salaire mensuels en se contentant d'une régularisation annuelle. L'employeur doit respecter le salaire minimum prévu par la convention collective dès le début du contrat et sur chaque période de paie, en appliquant le taux horaire correspondant à votre coefficient (exemple : 12,31 € pour le palier 6, coefficient 170). En revanche, si le minimum conventionnel se retrouve à un niveau inférieur au SMIC (lorsque celui-ci est revalorisé), le temps que les branches professionnelles négocient pour réajuster les grilles de salaires, l'employeur doit compléter le montant du salaire versé de façon à atteindre le SMIC.\n​\nConcernant la modification de votre coefficient : la classification au sein d’une convention collective peut être modifiée. Tous les 5 ans, les organismes négociant la convention de branche sont en effet tenues d'étudier s’il y a lieu de modifier la classification (article L.2241-15 du Code du travail). A cette occasion, l’employeur peut être amené à modifier le coefficient du salarié pour s’adapter à la nouvelle classification. Dans ce cas, il ne peut y avoir d’opposition à cette modification qui s’impose au salarié. Il est toutefois indispensable de faire un avenant si ce changement de classification constitue une modification du contrat de travail (modification des responsabilités, baisse de la rémunération, d'un élément explicitement mentionné au contrat de travail...). S'il s'agit une simple correction administrative sans impact réel (sans baisse de salaire ou de fonctions), aucun avenant n'est requis, mais l'employeur doit notifier le changement et ajuster immédiatement le salaire.\n\nUn salarié qui ne perçoit pas le salaire minimum conventionnel auquel il a droit peut obtenir un rappel de salaire à ce titre (exemple de jurisprudence : Cour de Cassation, Chambre sociale, du 28 mars 2001, 99-40.829, Inédit). Si vous estimez avoir subi un préjudice, vous pouvez réclamer les arriérés par lettre recommandée, puis saisir le conseil de prud'hommes si vous n'obtenez pas satisfaction.\n\nCes éléments vous sont donnés sous réserve de l’appréciation souveraine des juridictions compétentes.\n\nJe reste à votre disposition pour toute précision,"}, {"id": "id_122", "question": "Bonjour,\n\nJe me permets de venir vers vous car j'aurai souhaité avoir une information concernant une situation que j'ai à mon travail.\n\nVoilà je travaille dans une entreprise adaptée au sein d'un centre de formation et nous sommes rattaché à la convention collective des organismes de formation.\n\nJ'ai été embauchée avec un coefficient de 120 mais je me suis aperçue que l'employeur n'a pas pris en compte le taux horaire en lien avec cette convention et m'a rémunéré sur le taux horaire du smic.\n\nSuite à diverse changement il y'a eu une nouvelle pesée de poste et là mon coefficient à changer et est passé à 170 palier 6 qui me situe à un taux horaire à 12.31 par rapport à cette convention mais là encore pas de changement au niveau de mon taux. En effet, je constate qu'il y a bien une modification apportée sur mon bulletin de salaire avec le montant du salaire minimum annuel conventionnel qui correspond bien à mon nouveau coefficient mais je reste sur le taux horaire du smic. \n\nPars ailleurs sur l'avenant de la convention du 18 novembre 2024 il y' a un paragraphe disant \"S'agissant de salaires minima annuels, l'appréciation de leur respect se fait au terme au terme de l'année. Si au 31 décembre 2025, le salarié bénéficiaire n'a pas perçut le salaire minimum annuel conventionnel prévu pour l'année, il bénéficie d'une régularisation de salaire dont le montant est égal à la différence entre le salaire minimum conventionnel qui lui est dû pour l'année civile 2025 et salaire annuel réellement perçu.\"\n\n\nPouvez-vous me dire si mon employeur à le droit de me laisser sur le taux horaire du smic en faisant une régularisation à chaque fin d'année ou bien si celui-ci doit prendre en compte le taux horaire de la convention et l'appliqué sur mon bulletin de salaire ?\n\nPouvez-vous me dire également si l'employeur doit faire un avenant au contrat pour le changement du coefficient ?", "reponse": "Madame,\n\nEn réponse à votre interrogation, je vous communique ces dispositions de la CCN des organismes de formation :\n\nEn effet, cet extrait de l'Annexe 1, extrait de l'Avenant du 18 novembre 2024 (Étendu par arr. 25 févr. 2025, JO 18 mars, applicable à compter du jour de sa signature) :\n\nS'agissant de salaires minima annuels, l'appréciation de leur respect se fait au terme de l'année (ou à la date de rupture du contrat de travail en cas de rupture antérieure au 31 décembre).\nSi, au 31 décembre 2025, le salarié bénéficiaire n'a pas perçu le salaire minimum annuel conventionnel prévu pour l'année, il bénéficie d'une régularisation de salaire dont le montant est égal à la différence entre le salaire minimum conventionnel qui lui est dû pour l'année civile 2025 et le salaire annuel réellement perçu.\n\nMais aussi cet article :\n\nArticle 3\n\nMention du salaire minima conventionnel annuel brut sur le bulletin de salaire.\nLes partenaires sociaux rappellent que chaque entreprise doit matérialiser à titre informatif sur le bulletin de paye le salaire minimum conventionnel annuel brut correspondant au niveau de classification de chacun des salariés qu'elle emploie.\n\n\nLe taux horaire correct doit donc être appliqué chaque mois selon l'accord étendu.\n\nLa régularisation en fin d'année pourrait porter, par exemple, sur les salaires de mois de l'année entre la signature de l'accord et l’extension de l'accord au Journal officiel.\n\nLa qualification, le classement ou le coefficient figurant au contrat sont considérés comme des éléments essentiels du contrat.\nL’employeur ne peut pas les modifier unilatéralement : un avenant doit être établi.\nNéanmoins, si la variation du coefficient est la conséquence d’un changement de la convention collective, d’un accord de branche ou d’un texte applicable, la modification peut être opposable au salarié sans avenant (mais doit apparaître sur le bulletin de paie dès son entrée en vigueur).\nDans ce cas l’employeur met simplement à jour la fiche de paie, la classification.\n\nCordialement."}, {"id": "id_123", "question": "Bonjour,\n\nJe me permets de venir vers vous car j'aurai souhaité avoir une information concernant une situation que j'ai à mon travail.\n\nVoilà je travaille dans une entreprise adaptée au sein d'un centre de formation et nous sommes rattaché à la convention collective des organismes de formation.\n\nJ'ai été embauchée avec un coefficient de 120 mais je me suis aperçue que l'employeur n'a pas pris en compte le taux horaire en lien avec cette convention et m'a rémunéré sur le taux horaire du smic.\n\nSuite à diverse changement il y'a eu une nouvelle pesée de poste et là mon coefficient à changer et est passé à 170 palier 6 qui me situe à un taux horaire à 12.31 par rapport à cette convention mais là encore pas de changement au niveau de mon taux. En effet, je constate qu'il y a bien une modification apportée sur mon bulletin de salaire avec le montant du salaire minimum annuel conventionnel qui correspond bien à mon nouveau coefficient mais je reste sur le taux horaire du smic. \n\nPars ailleurs sur l'avenant de la convention du 18 novembre 2024 il y' a un paragraphe disant \"S'agissant de salaires minima annuels, l'appréciation de leur respect se fait au terme au terme de l'année. Si au 31 décembre 2025, le salarié bénéficiaire n'a pas perçut le salaire minimum annuel conventionnel prévu pour l'année, il bénéficie d'une régularisation de salaire dont le montant est égal à la différence entre le salaire minimum conventionnel qui lui est dû pour l'année civile 2025 et salaire annuel réellement perçu.\"\n\n\nPouvez-vous me dire si mon employeur à le droit de me laisser sur le taux horaire du smic en faisant une régularisation à chaque fin d'année ou bien si celui-ci doit prendre en compte le taux horaire de la convention et l'appliqué sur mon bulletin de salaire ?\n\nPouvez-vous me dire également si l'employeur doit faire un avenant au contrat pour le changement du coefficient ?", "reponse": "Madame,\n\n\nPour faire suite à votre message, veuillez trouver les éléments de réponse suivants :\n\nComme indiqué dans l'avenant de 2024, l'employeur n'est pas tenu à un salaire minimum horaire, mais uniquement à un minimum annuel. La seule exigence légale en matière de taux horaire est donc le SMIC.\n\nL'employeur est en effet en droit de maintenir un taux horaire au niveau du SMIC et de procéder chaque année à une régularisation pour atteindre le minimum annuel.\n\nEn revanche, un avenant aurait bien dû vous être proposé pour acter le nouveau coefficient et la nouvelle classification de votre emploi. Cet avenant aurait pu être l'occasion de négocier un taux horaire minimal supérieur au SMIC.\n\nTous ces éléments sont donnés sous réserve de l’appréciation souveraine des juges du fond.\n\nVeuillez agréer, Madame, l’expression de nos salutations distinguées.\n\n*Pour plus d’informations sur le droit du travail, vous pouvez consulter le Code du Travail Numérique\n\nhttps://code.travail.gouv.fr/\n\nou\n\nhttps://www.service-public.fr/particuliers/vosdroits/N19806\n\nService renseignements en droit du travail (EG)\n\nDirection Départementale de l’Emploi, du Travail et des Solidarités (DDETS) du Calvados\n\n3 Place Saint Clair"}, {"id": "id_124", "question": "Bonjour,\n\nJe me permets de venir vers vous car j'aurai souhaité avoir une information concernant une situation que j'ai à mon travail.\n\nVoilà je travaille dans une entreprise adaptée au sein d'un centre de formation et nous sommes rattaché à la convention collective des organismes de formation.\n\nJ'ai été embauchée avec un coefficient de 120 mais je me suis aperçue que l'employeur n'a pas pris en compte le taux horaire en lien avec cette convention et m'a rémunéré sur le taux horaire du smic.\n\nSuite à diverse changement il y'a eu une nouvelle pesée de poste et là mon coefficient à changer et est passé à 170 palier 6 qui me situe à un taux horaire à 12.31 par rapport à cette convention mais là encore pas de changement au niveau de mon taux. En effet, je constate qu'il y a bien une modification apportée sur mon bulletin de salaire avec le montant du salaire minimum annuel conventionnel qui correspond bien à mon nouveau coefficient mais je reste sur le taux horaire du smic. \n\nPars ailleurs sur l'avenant de la convention du 18 novembre 2024 il y' a un paragraphe disant \"S'agissant de salaires minima annuels, l'appréciation de leur respect se fait au terme au terme de l'année. Si au 31 décembre 2025, le salarié bénéficiaire n'a pas perçut le salaire minimum annuel conventionnel prévu pour l'année, il bénéficie d'une régularisation de salaire dont le montant est égal à la différence entre le salaire minimum conventionnel qui lui est dû pour l'année civile 2025 et salaire annuel réellement perçu.\"\n\n\nPouvez-vous me dire si mon employeur à le droit de me laisser sur le taux horaire du smic en faisant une régularisation à chaque fin d'année ou bien si celui-ci doit prendre en compte le taux horaire de la convention et l'appliqué sur mon bulletin de salaire ?\n\nPouvez-vous me dire également si l'employeur doit faire un avenant au contrat pour le changement du coefficient ?", "reponse": "Madame,\n\nLa rémunération ne peut pas être inférieure aux minima légaux ou conventionnels.\n\nL'avenant du 18 novembre 2024 à la convention collective des organismes de formation (IDCC 1516) s'impose à votre entreprise si elle entre dans son champ d'application, et prévoit bien une régularisation annuelle des salaires minima au 31 décembre.\n\nLa procédure de régularisation annuelle est conforme à la convention collective des organismes de formation, qui apprécie le respect des salaires minima sur l'année civile entière et non mois par mois.\n\nQuand le changement de coefficient résulte directement d’une nouvelle grille issue de la convention collective (reclassification « mécanique » imposée à tout le monde), il peut s’appliquer sans avenant individuel, mais le bulletin doit alors être mis à jour.\n\nBien cordialement,"}, {"id": "id_125", "question": "Bonjour,\n\nJe me permets de venir vers vous car j'aurai souhaité avoir une information concernant une situation que j'ai à mon travail.\n\nVoilà je travaille dans une entreprise adaptée au sein d'un centre de formation et nous sommes rattaché à la convention collective des organismes de formation.\n\nJ'ai été embauchée avec un coefficient de 120 mais je me suis aperçue que l'employeur n'a pas pris en compte le taux horaire en lien avec cette convention et m'a rémunéré sur le taux horaire du smic.\n\nSuite à diverse changement il y'a eu une nouvelle pesée de poste et là mon coefficient à changer et est passé à 170 palier 6 qui me situe à un taux horaire à 12.31 par rapport à cette convention mais là encore pas de changement au niveau de mon taux. En effet, je constate qu'il y a bien une modification apportée sur mon bulletin de salaire avec le montant du salaire minimum annuel conventionnel qui correspond bien à mon nouveau coefficient mais je reste sur le taux horaire du smic. \n\nPars ailleurs sur l'avenant de la convention du 18 novembre 2024 il y' a un paragraphe disant \"S'agissant de salaires minima annuels, l'appréciation de leur respect se fait au terme au terme de l'année. Si au 31 décembre 2025, le salarié bénéficiaire n'a pas perçut le salaire minimum annuel conventionnel prévu pour l'année, il bénéficie d'une régularisation de salaire dont le montant est égal à la différence entre le salaire minimum conventionnel qui lui est dû pour l'année civile 2025 et salaire annuel réellement perçu.\"\n\n\nPouvez-vous me dire si mon employeur à le droit de me laisser sur le taux horaire du smic en faisant une régularisation à chaque fin d'année ou bien si celui-ci doit prendre en compte le taux horaire de la convention et l'appliqué sur mon bulletin de salaire ?\n\nPouvez-vous me dire également si l'employeur doit faire un avenant au contrat pour le changement du coefficient ?", "reponse": "Bonjour madame,\n\nEn effet, l'avenant du 18 novembre 2024 (étendu par arrêté du 25 février 2025, publié au JO du 18 mars 2025, applicable à compter du jour de sa signature) prévoit :\n- pour le palier 6 (coef de 158 à 170) un salaire minimum conventionnel annuel brut de 22 405.82 €\n\nIl est par ailleurs précisé dans cet avenant :\n\n\"[...]S'agissant de salaires minima annuels, l'appréciation de leur respect se fait au terme de l'année (ou à la date de rupture du contrat de travail en cas de rupture antérieure au 31 décembre). Si, au 31 décembre 2025, le salarié bénéficiaire n'a pas perçu le salaire minimum annuel conventionnel prévu pour l'année, il bénéficie d'une régularisation de salaire dont le montant est égal à la différence entre le salaire minimum conventionnel qui lui est dû pour l'année civile 2025 et le salaire annuel réellement perçu.\n\nArticle 3\n\nMention du salaire minima conventionnel annuel brut sur le bulletin de salaire\n\nLes partenaires sociaux rappellent que chaque entreprise doit matérialiser à titre informatif sur le bulletin de paye le salaire minimum conventionnel annuel brut correspondant au niveau de classification de chacun des salariés qu'elle emploie.[...]\"\n\nVotre employeur doit donc procéder à une éventuelle régularisation au 31 décembre 2025.\n\nConcernant votre changement de coefficient, l'avenant n'est pas obligatoire, vos fiches de paie font foi devant la loi.\n\nCordialement"}, {"id": "id_126", "question": "Bonjour,\n\n\n\n1ère question concerne les élections du CSE :\n\nNos dernières élections du CSE étaient en janvier 2023 pour un effectif de 56 salariés, donc 8 représentants.\n\nEn janvier 2025, nous avons dû faire un licenciement économique et depuis ce jour nous sommes 42 salariés.\n\nEn février 2026, ça fera 12 mois consécutifs que nous sommes en dessous du seuil des 50 salariés, donc il nous faudrait 4 représentants\n\nDevons nous refaire les élections des membres du CSE ou pouvons-nous attendre la fin du mandat des 7 représentants restant (le 8è faisant parti des licenciés économique) soit janvier 2027 ?\n\n\n\n2ème question les budgets :\n\nEst-ce nous devons continuer à approvisionner les budgets fonctionnement et ASC ?\n\nSi non, que devient l’argent restant sur les comptes ?\n\n\n\nCordialement,", "reponse": "Monsieur,\n\nEn réponse à votre interrogation sur l'organisation des élections et concernant le sort des institutions représentatives en cas de variation de l'effectif,\n\nEn cas de baisse de l'effectif en dessous de 50 salariés pendant les 12 mois précédant le renouvellement de l'instance, l'article L. 2312-3 prévoit que « lors de son renouvellement », le CSE exerce exclusivement les attributions applicables aux entreprises de 11 à 49 salariés et cesse d'exercer les attributions applicables aux entreprises de 50 salariés et plus.\nC. trav., art. L. 2312-3\nC'est donc seulement suite à l'élection du nouveau CSE que ses attributions sont réduites.\n\nSi la baisse de l'effectif intervient en cours de mandat, les membres du CSE conservent donc leurs attributions jusqu'à l'échéance.\n\nPour déterminer le nombre de représentants du personnel à élire à l'occasion du renouvellement de l'institution, il convient d'apprécier l'effectif théorique à la date du premier tour de scrutin\n\n(Cass. soc., 7 mars 1990, n° 89-60.156, n° 946 P ; Cass. soc., 21 juill. 1986, n° 85-60.475 ; Cass. soc., 5 févr. 2020, n° 19-13.550), en se référant à l'effectif moyen de l'entreprise au cours de l'année précédant les élections.\n\n(Cass. soc., 26 sept. 1990, n° 89-61.133 ; Cass. soc., 3 oct. 1995, n° 94-60.480).\nLes dispositions fixant la période de référence pour évaluer l'effectif en vue de la mise en place d'un comité d'entreprise et celles concernant les conditions de sa suppression ne sont en effet pas applicables en cas de diminution de l'effectif n'entraînant qu'une réduction du nombre de représentants à élire\n\n(Cass. soc., 26 sept. 1990, n° 89-61.133).\n\nPour compléter :\n\n=> Accueil - Elections professionnelles (entreprises d'au moins 11 salariés et représentativité syndicale)\n\n=> Nos outils et simulateurs - Elections professionnelles (entreprises d'au moins 11 salariés et représentativité syndicale)"}, {"id": "id_127", "question": "Bonjour,\n\n\n\n1ère question concerne les élections du CSE :\n\nNos dernières élections du CSE étaient en janvier 2023 pour un effectif de 56 salariés, donc 8 représentants.\n\nEn janvier 2025, nous avons dû faire un licenciement économique et depuis ce jour nous sommes 42 salariés.\n\nEn février 2026, ça fera 12 mois consécutifs que nous sommes en dessous du seuil des 50 salariés, donc il nous faudrait 4 représentants\n\nDevons nous refaire les élections des membres du CSE ou pouvons-nous attendre la fin du mandat des 7 représentants restant (le 8è faisant parti des licenciés économique) soit janvier 2027 ?\n\n\n\n2ème question les budgets :\n\nEst-ce nous devons continuer à approvisionner les budgets fonctionnement et ASC ?\n\nSi non, que devient l’argent restant sur les comptes ?\n\n\n\nCordialement,", "reponse": "Bonjour,\n\nLe mandat des membres du CSE est fixé pour 4 ans (sauf accord collectif prévoyant une durée différente) et ne peut être remis en cause par une simple variation d’effectif, sauf si l’entreprise passe sous le seuil de 11 salariés pendant 12 mois consécutifs (La réduction du nombre de membres du CSE n’est pas automatique en cas de baisse d’effectif et ne s’applique qu’au renouvellement suivant si l’effectif reste sous le seuil de 50 salariés pendant 12 mois consécutifs avant la fin du mandat\nVotre effectif est passé sous 50 salariés en janvier 2025, mais la condition des 12 mois consécutifs ne sera remplie qu’en février 2026. ( https://www.legifrance.gouv.fr/codes/article_lc/LEGIARTI000035650745/)\n\nÀ la fin du mandat actuel (janvier 2027), si l’effectif est toujours inférieur à 50 salariés depuis 12 mois, vous pourrez alors réduire le nombre de membres (passant de 8 à 4 titulaires) et organiser de nouvelles élections avec ce nouveau nombre de sièges.\nJe vous invite à prendre connaissance du document transmis en PJ, relatant les questions récurrentes en matière d'organisation du CSE , vous y trouverez, réponse 66 (p.43), les éléments de réponses.\n\nEn dessous de 50 salariés, le CSE n’a plus droit à un budget de fonctionnement (0,20 % ou 0,22 % de la masse salariale), vous n'êtes donc plus obligé de verser cette subvention à partir du moment où l’effectif repasse sous 50 salariés pendant 12 mois consécutifs, sauf si un accord d’entreprise prévoyait un budget ASC, celui-ci reste valable jusqu’à son terme ou renégociation. Je précise cependant que vous pouvez volontairement choisir de maintenir cette contribution.\n\nSi les budgets sont supprimés (ou réduits), les sommes restantes ne sont pas perdues et doivent être utilisées ou transférées selon les règles : https://travail-emploi.gouv.fr/le-fonctionnement-et-les-moyens-dactions-du-cse\nJe vous invite à consulter le lien suivant :\nLe fonctionnement et les moyens d'actions du CSE | Travail-emploi.gouv.fr | Ministère du Travail et des Solidarités\n\nBonne réception,\nCordialement\n"}, {"id": "id_128", "question": "Bonjour,\n\n\n\n1ère question concerne les élections du CSE :\n\nNos dernières élections du CSE étaient en janvier 2023 pour un effectif de 56 salariés, donc 8 représentants.\n\nEn janvier 2025, nous avons dû faire un licenciement économique et depuis ce jour nous sommes 42 salariés.\n\nEn février 2026, ça fera 12 mois consécutifs que nous sommes en dessous du seuil des 50 salariés, donc il nous faudrait 4 représentants\n\nDevons nous refaire les élections des membres du CSE ou pouvons-nous attendre la fin du mandat des 7 représentants restant (le 8è faisant parti des licenciés économique) soit janvier 2027 ?\n\n\n\n2ème question les budgets :\n\nEst-ce nous devons continuer à approvisionner les budgets fonctionnement et ASC ?\n\nSi non, que devient l’argent restant sur les comptes ?\n\n\n\nCordialement,", "reponse": "Monsieur,\n\nSuite à votre courriel, les services de renseignements donnent des informations juridiques générales relatives au Code du travail, aux conventions collectives et à la jurisprudence sociale aux salariés et aux employeurs du secteur privé.\n\nVotre demande est de la compétence de l'agent de contrôle du secteur géographique de l'entreprise. N'ayant pas d'informations sur les coordonnées de l'entreprise, vous voudrez bien vous rapprocher par mail soit :\nddets-uc1@calvados.gouv.fr ou ddets-uc2@calvados.gouv.fr\n\nTous ces éléments sont donnés sous réserve de l’appréciation souveraine des juges du fond.\n\nJe vous prie de croire, Monsieur, à l’assurance de ma considération distinguée."}, {"id": "id_129", "question": "Bonjour,\n\n\n\n1ère question concerne les élections du CSE :\n\nNos dernières élections du CSE étaient en janvier 2023 pour un effectif de 56 salariés, donc 8 représentants.\n\nEn janvier 2025, nous avons dû faire un licenciement économique et depuis ce jour nous sommes 42 salariés.\n\nEn février 2026, ça fera 12 mois consécutifs que nous sommes en dessous du seuil des 50 salariés, donc il nous faudrait 4 représentants\n\nDevons nous refaire les élections des membres du CSE ou pouvons-nous attendre la fin du mandat des 7 représentants restant (le 8è faisant parti des licenciés économique) soit janvier 2027 ?\n\n\n\n2ème question les budgets :\n\nEst-ce nous devons continuer à approvisionner les budgets fonctionnement et ASC ?\n\nSi non, que devient l’argent restant sur les comptes ?\n\n\n\nCordialement,", "reponse": "Bonjour Monsieur,\n\nEn réponse à vos interrogations relatives au Comité social et économique (CSE), les dispositions du Code du travail encadrent strictement les situations de variation d'effectif et les attributions financières.\n\n1. Élections du CSE suite à la baisse d'effectif sous 50 salariés\nL'article L.2312-3 dispose\n\n> Art. L. 2312-3  (Ord. no 2017-1386 du 22 sept. 2017, art. 1er) Lors de son renouvellement, le comité social et économique exerce exclusivement les attributions prévues à la section 2 et cesse d'exercer les attributions prévues à la section 3 lorsque l'effectif de cinquante salariés n'a pas été atteint pendant les douze mois précédant le renouvellement de l'instance.\n\n\nCela signifie que c'est seulement suite à l'élection du nouveau CSE que ses attributions sont réduites. Si la baisse de l'effectif intervient en cours de mandat, les membres du CSE conservent donc leurs attributions jusqu'à l'échéance.\n\nLe franchissement inverse du seuil de 50 salariés pendant 12 mois consécutifs n'impose pas d'élections complémentaires et n'affecte pas les mandats en cours, dont le terme reste inchangé jusqu'à leur expiration naturelle (ici janvier 2027 pour vos 7 représentants restants).\nAinsi, aucune nouvelle élection n'est requise avant la fin du mandat ; le CSE continue avec les 7 membres actuels.\n\n2. Budgets de fonctionnement et ASC\nEn application de l’article L.2315-61 du code du travail, la contribution patronale au budget de fonctionnement du CSE est obligatoire uniquement dans les entreprises d’au moins 50 salariés.\nDe même, l’article L.2312-81 du code du travail prévoit que la contribution destinée au financement des activités sociales et culturelles (ASC) est due dans les entreprises d’au moins 50 salariés, sous réserve des usages ou engagements existants.\n\nDès que l’effectif est sous ce seuil pendant 12 mois consécutifs (février 2026 dans votre cas), l’employeur cesse d’approvisionner ces budgets.\n\nS’agissant des sommes déjà versées et figurant sur les comptes du CSE, celles-ci demeurent la propriété du comité.\nConformément aux articles L.2315-61 et L.2312-84 du code du travail, ces sommes peuvent continuer à être utilisées par le CSE dans le cadre de ses attributions.\nEn l’absence de dissolution du CSE, aucun texte ne prévoit la restitution automatique des excédents à l’employeur du seul fait de la baisse de l’effectif.\n\nLa dévolution de l’actif du CSE à l’employeur n’est prévue par la loi qu’en cas de cessation définitive du comité.\n\nCordialement,"}, {"id": "id_130", "question": "Bonjour,\n\n\n\n1ère question concerne les élections du CSE :\n\nNos dernières élections du CSE étaient en janvier 2023 pour un effectif de 56 salariés, donc 8 représentants.\n\nEn janvier 2025, nous avons dû faire un licenciement économique et depuis ce jour nous sommes 42 salariés.\n\nEn février 2026, ça fera 12 mois consécutifs que nous sommes en dessous du seuil des 50 salariés, donc il nous faudrait 4 représentants\n\nDevons nous refaire les élections des membres du CSE ou pouvons-nous attendre la fin du mandat des 7 représentants restant (le 8è faisant parti des licenciés économique) soit janvier 2027 ?\n\n\n\n2ème question les budgets :\n\nEst-ce nous devons continuer à approvisionner les budgets fonctionnement et ASC ?\n\nSi non, que devient l’argent restant sur les comptes ?\n\n\n\nCordialement,", "reponse": "Monsieur,\n\nVous trouverez via les liens ci-après la règlementation relative :\nAccueil - Elections professionnelles (entreprises d'au moins 11 salariés et représentativité syndicale)Comité social et économique (CSE) | Travail-emploi.gouv.fr | Ministère du Travail et des Solidarités\n\nAinsi que : : Annuaire de l'inspection du travail en Normandie (arcgis.com)"}, {"id": "id_131", "question": "Bonjour,\n\n\n\n1ère question concerne les élections du CSE :\n\nNos dernières élections du CSE étaient en janvier 2023 pour un effectif de 56 salariés, donc 8 représentants.\n\nEn janvier 2025, nous avons dû faire un licenciement économique et depuis ce jour nous sommes 42 salariés.\n\nEn février 2026, ça fera 12 mois consécutifs que nous sommes en dessous du seuil des 50 salariés, donc il nous faudrait 4 représentants\n\nDevons nous refaire les élections des membres du CSE ou pouvons-nous attendre la fin du mandat des 7 représentants restant (le 8è faisant parti des licenciés économique) soit janvier 2027 ?\n\n\n\n2ème question les budgets :\n\nEst-ce nous devons continuer à approvisionner les budgets fonctionnement et ASC ?\n\nSi non, que devient l’argent restant sur les comptes ?\n\n\n\nCordialement,", "reponse": "Bonjour,\n\nS'agissant d'une question relative aux élections du CSE, je vous invite à vous adresser à l'inspecteur du travail à l'adresse ddetspp-uc1@orne.gouv.fr en précisant bien le nom et l'adresse de votre entreprise.\n\nJe reste à votre disposition pour toute précision.\n\nRespectueusement,"}, {"id": "id_132", "question": "Bonjour,\n\n\n\n1ère question concerne les élections du CSE :\n\nNos dernières élections du CSE étaient en janvier 2023 pour un effectif de 56 salariés, donc 8 représentants.\n\nEn janvier 2025, nous avons dû faire un licenciement économique et depuis ce jour nous sommes 42 salariés.\n\nEn février 2026, ça fera 12 mois consécutifs que nous sommes en dessous du seuil des 50 salariés, donc il nous faudrait 4 représentants\n\nDevons nous refaire les élections des membres du CSE ou pouvons-nous attendre la fin du mandat des 7 représentants restant (le 8è faisant parti des licenciés économique) soit janvier 2027 ?\n\n\n\n2ème question les budgets :\n\nEst-ce nous devons continuer à approvisionner les budgets fonctionnement et ASC ?\n\nSi non, que devient l’argent restant sur les comptes ?\n\n\n\nCordialement,", "reponse": "Monsieur,\n\nVous pouvez maintenir le CSE actuel jusqu’à la fin du mandat en janvier 2027, sans organiser de nouvelles élections uniquement parce que l’effectif est passé sous 50 salariés. Le CSE reste en place tant que l’effectif est au moins de 11 salariés pendant 12 mois consécutifs, ce qui est votre cas avec 42 salariés.\n\nBien cordialement,\nL.CANIVEZ"}, {"id": "id_133", "question": "Bonjour comment allez-vous j ai besoin de renseignements et je voudrais faire un signalement au sujet du confort au travail. Alors je voudrais savoir si j ai le droit de refuser mon rdv de visite médicale sur un jour de repos. Pour le confort au travail nous travaillons avec un petit chauffage qui chauffe très très mal en plus moi et mon collègue sont près de la vitrine et de la porte entrez ou les clients rentre ,le midi ont mange ds une salle réfectoire sans chauffage bref et j en passe \nsurtout je souhaite faire se signalement en inconnu merci à vous", "reponse": "Madame, Monsieur,\n\nPour faire suite à votre message, veuillez trouver les éléments de réponse suivants :\n\nS'agissant des visites auprès du médecin du travail, elles constituent du temps de travail effectif. Vous êtes donc en droit de refuser un rendez-vous pris sur un jour de repos.\n\n\nIl conviendra donc de demander à l'employeur un report de la visite.\n\nQuant au signalement concernant les conditions de travail, il ne peut être anonyme. Cependant nos services ne divulguent pas le nom des personnes qui ont signalé les faits, sauf à obtenir leur accord au préalable.\n\nSi vous souhaitez adresser un signalement, il vous faudra indiquer le nom et l'adresse de l'entreprise afin que le courrier soit transmis à l'agent de contrôle en charge du secteur concerné.\n\nTous ces éléments sont donnés sous réserve de l’appréciation souveraine des juges du fond.\n\nVeuillez agréer, Madame, Monsieur, l’expression de nos salutations distinguées.\n\n*Pour plus d’informations sur le droit du travail, vous pouvez consulter le Code du Travail Numérique\n\nhttps://code.travail.gouv.fr/\n\nou\n\nhttps://www.service-public.fr/particuliers/vosdroits/N19806"}, {"id": "id_134", "question": "Bonjour comment allez-vous j ai besoin de renseignements et je voudrais faire un signalement au sujet du confort au travail. Alors je voudrais savoir si j ai le droit de refuser mon rdv de visite médicale sur un jour de repos. Pour le confort au travail nous travaillons avec un petit chauffage qui chauffe très très mal en plus moi et mon collègue sont près de la vitrine et de la porte entrez ou les clients rentre ,le midi ont mange ds une salle réfectoire sans chauffage bref et j en passe \nsurtout je souhaite faire se signalement en inconnu merci à vous", "reponse": "Bonjour,\n\n-   Concernant la visite médicale, le temps nécessité par la visite est :\n\n-   soit pris sur les heures de travail des salariés sans qu'il puisse pour cela être effectué une retenue de salaire\n-   soit rémunéré comme temps de travail normal lorsque ces examens ne peuvent avoir lieu pendant les heures de travail.\n\nLes frais de transport nécessités par ces examens sont pris en charge par les employeurs (article R.4624-39 du Code du travail)\n\nAinsi, l'employeur peut vous demander de passer cette visite en dehors de vos horaires à condition que cela ne conduise pas à vous priver du repos quotidien de 11 heures de repos consécutives. En effet, la visite médicale ne doit pas conduire à priver le salarié de ce repos minimal. Le salarié ne peut être convoqué pendant ce temps de repos.\n\n\n-   Confort de travail :\n\nIl n'existe aucune disposition dans le Code du travail qui prévoit la température précise à laquelle doivent être chauffés les locaux d'une entreprise. Cette température doit toutefois être \"convenable\" dans tous les locaux fermés, y compris les entrepôts :\n\n> Les locaux fermés affectés au travail sont chauffés pendant la saison froide.\n> Le chauffage fonctionne de manière à maintenir une température convenable et à ne donner lieu à aucune émanation délétère. (article R.4223-13)\n\nPour assurer de bonnes conditions de travail, l’employeur doit assurer une ambiance thermique adaptée à l’activité physique des travailleurs. Cela résulte encore une fois de l'obligation pour l'employeur de mettre en œuvre les mesures nécessaires pour assurer la sécurité et protéger la santé physique et mentale des travailleurs (article L.4121-1 du Code du travail). Chaque situation de travail doit faire l'objet d'une évaluation des risques professionnels, en prenant toujours en compte le type d'activité effectuée.\n\nPour information, l’Institut National de Recherche et de Sécurité recommande :\n- 21°C pour un travail mental statique,\n- 18 à 19°C pour un travail manuel léger, assis ou debout,\n- 17°C pour un travail manuel pénible, debout,\n- 15 à 16°C pour un travail très pénible.\n\nUne température froide n'empêche pas le salarié de travailler si l'employeur la prend en compte, étudie les risques et prend les mesures nécessaires.\n\nSi vous estimez que la température excessivement froide nuit à votre santé, vous pouvez demander à bénéficier d’une visite auprès du médecin du travail (article R.4624-34 du Code du travail). En cas de besoin, celui-ci pourra proposer un aménagement du poste de travail. Vous pouvez également alerter le CSE sur cette question du confort thermique.\n\nUn salarié travaillant dans des locaux fermés non chauffés ou insuffisamment chauffés peut solliciter du Conseil de prud’hommes la condamnation de l’employeur à des dommages et intérêts, sous réserve de démontrer un préjudice.\n\nS'agissant d'une question de santé et de sécurité, vous pouvez également solliciter l'inspection du travail pour lui signaler la situation, celui-ci pourra le cas échéant faire un contrôle sur place (voir les coordonnées de l'inspecteur du travail sur cette page).\n\n→ Je vous précise que les agents de l'inspection du travail sont soumis à une obligation de confidentialité : l'inspecteur n'évoquera pas votre situation particulière avec l'employeur, sauf si vous l'y autorisez explicitement.\n\nCes éléments vous sont donnés sous réserve de l’appréciation souveraine des juridictions compétentes.\n\nJe reste à votre disposition pour toute précision,"}, {"id": "id_135", "question": "Bonjour comment allez-vous j ai besoin de renseignements et je voudrais faire un signalement au sujet du confort au travail. Alors je voudrais savoir si j ai le droit de refuser mon rdv de visite médicale sur un jour de repos. Pour le confort au travail nous travaillons avec un petit chauffage qui chauffe très très mal en plus moi et mon collègue sont près de la vitrine et de la porte entrez ou les clients rentre ,le midi ont mange ds une salle réfectoire sans chauffage bref et j en passe \nsurtout je souhaite faire se signalement en inconnu merci à vous", "reponse": "Bonjour,\n\nLa visite médicale peut exceptionnellement avoir lieu en dehors de vos heures de travail si l’examen ne peut pas se dérouler pendant celles-ci.\n\nDans ce cas, le temps passé à la visite doit être considéré comme du temps de travail et donc rémunéré. De plus, les frais engagés pour vous rendre à cette visite (kilométrage, transport, etc.) doivent être pris en charge par votre employeur.\n\nSi vous souhaitez faire un signalement à l’Inspection du travail, vous pouvez tout à fait le faire par mail à l’adresse suivante : ddets-inspection-uc1@aisne.gouv.fr (secteur laon/soissons) ddets-inspection-uc2@aisne.gouv.fr (secteur saint-quentin/chauny)\n\nVotre signalement sera traité de manière anonyme : votre nom n’apparaîtra pas lorsque l’inspection contactera l’employeur ou mènera des vérifications. Vous n’avez donc pas à vous inquiéter de la confidentialité.\n\nPour que votre demande soit correctement prise en compte, pensez simplement à fournir plus d’informations, (le nom de l’entreprise, l’adresse du lieu de travail, les conditions de travail problématiques chauffage insuffisant, température trop basse, salle de repas sans chauffage, poste près de la porte ouverte au froid, etc.),"}, {"id": "id_136", "question": "Bonjour comment allez-vous j ai besoin de renseignements et je voudrais faire un signalement au sujet du confort au travail. Alors je voudrais savoir si j ai le droit de refuser mon rdv de visite médicale sur un jour de repos. Pour le confort au travail nous travaillons avec un petit chauffage qui chauffe très très mal en plus moi et mon collègue sont près de la vitrine et de la porte entrez ou les clients rentre ,le midi ont mange ds une salle réfectoire sans chauffage bref et j en passe \nsurtout je souhaite faire se signalement en inconnu merci à vous", "reponse": "Bonjour Madame,\n\nEn réponse à votre requête et au vu des éléments fournis ;\n\nLe temps consacré aux visites et examens médicaux, y compris les examens complémentaires, est :\n\n-   Soit pris sur les heures de travail. Dans ce cas, le salarié est payé comme s'il avait travaillé.\n-   Soit rémunéré comme du temps de travail effectif lorsque ces examens ne peuvent pas avoir lieu pendant les heures de travail.\n\nLe temps de transport et les frais rendus nécessaires pour ces visites et examens sont pris en charge par l'employeur.\n\nJe reste à votre disposition pour tout renseignement complémentaire.\n\nCordialement."}, {"id": "id_137", "question": "Bonjour comment allez-vous j ai besoin de renseignements et je voudrais faire un signalement au sujet du confort au travail. Alors je voudrais savoir si j ai le droit de refuser mon rdv de visite médicale sur un jour de repos. Pour le confort au travail nous travaillons avec un petit chauffage qui chauffe très très mal en plus moi et mon collègue sont près de la vitrine et de la porte entrez ou les clients rentre ,le midi ont mange ds une salle réfectoire sans chauffage bref et j en passe \nsurtout je souhaite faire se signalement en inconnu merci à vous", "reponse": "Bonjour,\n\nJe vous transmets via le lien ci-après une fiche d'information reprenant la législation concernant  : https://www.service-public.gouv.fr/particuliers/vosdroits/F2211\n\nLe temps consacré aux visites et examens médicaux, y compris les examens complémentaires, est :\n- Soit pris sur les heures de travail. Dans ce cas, le salarié est payé comme s'il avait travaillé.\n- Soit rémunéré comme du temps de travail effectif lorsque ces examens ne peuvent pas avoir lieu pendant les heures de travail.\n- Le temps de transport et les frais rendus nécessaires pour ces visites et examens sont pris en charge par l'employeur.​\nUn refus injustifié expose à des sanctions disciplinaires, y compris licenciement pour faute (Cass. soc. 29 mai 1986, n° 83-45.409)\n\nL'employeur, qui est tenu à une obligation de sécurité de résultat dont il doit assurer l'effectivité, a l'obligation d'organiser les visites médicales pour ses salariés.\nLe manquement à son obligation d'organiser une visite médicale d'embauche ou des visites médicales périodiques cause nécessairement un préjudice au salarié ouvrant droit à des dommages-intérêts** (Cass. soc., 6 nov. 2013, n° 12-16.529 ; Cass. soc., 12 févr. 2014, n° 12-26.241 ; Cass. soc., 9 déc. 2015, n° 14-20.377).\nEn ce qui concerne vos conditions de travail (chauffage défectueux), celles-ci relèvent des obligations de l'employeur en santé et sécurité (art.L4121-1 du Code du travail), en application des principes généraux de prévention du Code du travail. L'employeur doit aussi veiller à ce que les locaux fermés soient chauffés pendant la saison froide. Le chauffage doit être assuré de telle façon qu'il maintienne une température convenable et qu'il ne donne lieu à aucune émanation délétère (art R. 4223-13 du Code du travail).\n\n\nL'article L. 1222-1 du code du travail dispose que : \"Le contrat de travail est exécuté de bonne foi.\"\nSi ce n'est pas le cas, le Conseil de prud'hommes* est la juridiction compétente qui règle les litiges individuels entre employeur et salarié survenus à l'occasion de tout contrat de travail.\nLorsqu'ils ont subi un préjudice du fait du non-respect par l'employeur des dispositions légales, réglementaires ou conventionnelles, les salariés peuvent prétendre à l'attribution de dommages et intérêts. L'employeur ne peut invoquer le fait que les salariés concernés n'avaient pas contesté l'infraction. (♦Cass. soc., 29 janv. 1981, n° 79-41.406)\nIl relève donc du pouvoir des juges de rendre une décision notamment sur le respect du contrat et des congés payés.\n\nLes agents de l'inspection du travail ne sont pas juges du contrat de travail. Ils n'interviennent pas dans les litiges individuels. Dans ces situations, il faut saisir le Conseil de prud'hommes\n\nLes services de renseignements donnent des informations juridiques générales relatives au Code du travail, aux conventions collectives et à la jurisprudence sociale aux salariés et aux employeurs du secteur privé.\nIls ne donnent aucun avis, ne rendent aucune décision.\nIls ne son
